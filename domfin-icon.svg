<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ДомФин">
  <defs>
    <linearGradient id="df-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12807E"/>
      <stop offset="1" stop-color="#0A4A49"/>
    </linearGradient>
    <linearGradient id="df-leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CFF4EE"/>
      <stop offset="1" stop-color="#7FD8D0"/>
    </linearGradient>
    <linearGradient id="df-leaf2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A6E7DF"/>
      <stop offset="1" stop-color="#5FBFB7"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="118" fill="url(#df-bg)"/>

  <!-- growth curve (rising line = capital growth) -->
  <path d="M150 372 C 190 372 214 342 256 300" fill="none" stroke="#EAF7F4" stroke-width="15" stroke-linecap="round" opacity="0.30"/>

  <!-- stem -->
  <path d="M256 404 V250" fill="none" stroke="#EAF7F4" stroke-width="16" stroke-linecap="round"/>

  <!-- left leaf -->
  <path d="M251 300 C 197 292 159 248 154 184 C 213 208 247 250 251 300 Z" fill="url(#df-leaf2)"/>
  <!-- right leaf -->
  <path d="M261 300 C 315 292 353 248 358 184 C 299 208 265 250 261 300 Z" fill="url(#df-leaf2)"/>
  <!-- center leaf -->
  <path d="M256 262 C 222 220 222 160 256 110 C 290 160 290 220 256 262 Z" fill="url(#df-leaf)"/>
  <!-- center vein -->
  <path d="M256 250 V138" fill="none" stroke="#12807E" stroke-width="7" stroke-linecap="round" opacity="0.35"/>

  <!-- small accent seed/coin at base -->
  <circle cx="256" cy="404" r="13" fill="#EAF7F4"/>
</svg>
