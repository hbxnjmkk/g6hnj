<html lang="ru">
<head>

<style>
:root{
  --bg:#EEF2F7; --bg2:#FFFFFF; --panel:#FFFFFF; --panel2:#F1F5F9;
  --line:#E4EAF1; --line2:#D2DBE6;
  --ink:#1E2B3A; --ink2:#566472; --ink3:#8A98A7;
  --gold:#D69B26; --gold2:#BE8514; --on-accent:#1a1204;
  --teal:#2A8CAE; --green:#2E9E6B; --amber:#D68A1E; --red:#D64541; --violet:#8A6FD0;
  --grp1:#3D7BE0; --grp2:#2494B0; --grp3:#2E9E6B; --grp4:#9163C9; --grp5:#C68A12; --grpI:#33A972;
  --shadow:0 10px 30px rgba(30,45,66,.14);
  --r:16px; --r2:12px; --r3:10px;
  --nav-h:64px; --top-h:56px; --sidebar-w:236px;
  --f-num:"SF Mono",ui-monospace,"Roboto Mono",Menlo,Consolas,monospace;
  font-synthesis:none;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* ===== Темы и акценты (пункт 14) ===== */
html[data-theme="dark"]{
  --bg:#0E1621; --bg2:#141F2C; --panel:#18242F; --panel2:#20303F;
  --line:#243444; --line2:#33475C;
  --ink:#E9EFF6; --ink2:#AAB9C8; --ink3:#7C8C9E;
  --shadow:0 12px 34px rgba(0,0,0,.5);
}
html[data-accent="blue"]{ --gold:#3D7BE0; --gold2:#2E63C0; --on-accent:#fff }
html[data-accent="green"]{ --gold:#2E9E6B; --gold2:#247F55; --on-accent:#fff }
html[data-accent="violet"]{ --gold:#8A6FD0; --gold2:#6E54B6; --on-accent:#fff }
html[data-accent="teal"]{ --gold:#2A8CAE; --gold2:#1F7090; --on-accent:#fff }
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);overflow-x:hidden;max-width:100%;width:100%;touch-action:manipulation;-webkit-text-size-adjust:100%;
  font-family:-apple-system,"SF Pro Text","SF Pro Display",system-ui,"Segoe UI",Roboto,Inter,sans-serif;
  font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
body{min-height:100dvh}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink);background:var(--panel2);
  border:1px solid var(--line2);border-radius:var(--r3);padding:11px 12px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;font-family:var(--f-num)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* ---------- Layout shell ---------- */
#app{min-height:100dvh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:40;height:var(--top-h);display:flex;align-items:center;gap:10px;
  padding:0 14px;background:color-mix(in srgb,var(--bg2) 78%,transparent);backdrop-filter:blur(14px) saturate(1.5);-webkit-backdrop-filter:blur(14px) saturate(1.5);border-bottom:1px solid var(--line);
  padding-top:env(safe-area-inset-top);overflow:hidden;max-width:100%;box-sizing:border-box}
.topbar .brand{font-weight:700;letter-spacing:.3px;font-size:15px;display:flex;align-items:center;gap:9px;min-width:0;overflow:hidden;flex-shrink:1}
.topbar .brand span:not(.dot){overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brand .dot{width:11px;height:11px;border-radius:3px;background:var(--gold);box-shadow:0 0 12px rgba(227,178,60,.7);flex:none}
.topbar .month{margin-left:auto;display:flex;align-items:center;gap:4px;background:var(--panel);border:1px solid var(--line2);
  border-radius:999px;padding:4px 6px;flex:none}
.topbar .month button{width:30px;height:30px;border-radius:999px;font-size:17px;color:var(--ink2);flex:none}
.topbar .month .lbl{min-width:96px;text-align:center;font-weight:600;font-size:13px}
.topbar .sync{width:34px;height:34px;border-radius:999px;display:grid;place-items:center;background:var(--panel);
  border:1px solid var(--line2);font-size:15px;position:relative}
.sync .badge{position:absolute;right:-1px;bottom:-1px;width:9px;height:9px;border-radius:999px;background:var(--ink3);border:2px solid var(--bg2)}
.sync.ok .badge{background:var(--green)} .sync.dirty .badge{background:var(--amber)} .sync.err .badge{background:var(--red)}
.me{height:34px;min-width:34px;padding:0 8px;border-radius:999px;display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line2);font-size:15px;font-weight:600;color:var(--ink);flex:none;max-width:120px}
.me .nm{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mbadge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid transparent;white-space:nowrap}
.topbar .month .lbl{cursor:pointer}
.mpick-year{display:flex;align-items:center;justify-content:center;gap:22px;margin:6px 0 16px;font-size:18px;font-weight:800}
.mpick-year button{width:40px;height:40px;border-radius:999px;background:var(--panel2);border:1px solid var(--line2);font-size:18px;color:var(--ink)}
.mp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.mp-cell{padding:15px 0;border-radius:12px;background:var(--panel2);border:1px solid var(--line2);font-weight:600;font-size:14.5px;color:var(--ink)}
.mp-cell.now{border-color:var(--gold);color:var(--gold)}
.mp-cell.sel{background:var(--gold);color:var(--on-accent);border-color:var(--gold)}

.shell{flex:1;display:flex;min-height:0}
.sidebar{display:none}
.main{flex:1;min-width:0;padding:16px 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 26px);max-width:1180px;margin:0 auto;width:100%}

/* ---------- Bottom nav (mobile) ---------- */
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:45;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);background:color-mix(in srgb,var(--bg2) 80%,transparent);backdrop-filter:blur(14px) saturate(1.5);-webkit-backdrop-filter:blur(14px) saturate(1.5);border-top:1px solid var(--line);
  display:flex;align-items:stretch;justify-content:space-around;transition:height .22s ease}
.bottomnav.min{height:calc(50px + env(safe-area-inset-bottom))}
.bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink3);font-size:10px;font-weight:600;transition:gap .2s ease,font-size .2s ease}
.bottomnav.min button{gap:0;font-size:0}
.bottomnav.min button .ic{font-size:23px}
.bottomnav button .ic{font-size:19px;line-height:1}
.bottomnav button.active{color:var(--gold)}
.bottomnav .more-wrap{position:relative}
.fab{position:fixed;right:18px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);z-index:50;
  width:60px;height:60px;border-radius:999px;background:linear-gradient(145deg,var(--gold),var(--gold2));
  color:var(--on-accent);font-size:32px;font-weight:400;display:grid;place-items:center;box-shadow:0 10px 26px color-mix(in srgb,var(--gold) 45%,transparent),0 2px 0 rgba(255,255,255,.25) inset}
.fab:active{transform:scale(.94)}

/* ---------- Cards / typography ---------- */
.page-title{font-size:21px;font-weight:750;letter-spacing:-.2px;margin:2px 0 3px}
.page-sub{color:var(--ink2);font-size:13px;margin-bottom:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
.card h3{margin:0 0 12px;font-size:14px;font-weight:700;letter-spacing:.2px;color:var(--ink);display:flex;align-items:center;gap:8px}
.card h3 .tag{margin-left:auto;font-size:11px;color:var(--ink3);font-weight:600}
.eyebrow{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:9px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,minmax(0,1fr))} .g3{grid-template-columns:repeat(3,minmax(0,1fr))} .g4{grid-template-columns:repeat(4,minmax(0,1fr))}
.muted{color:var(--ink2)} .dim{color:var(--ink3)}
.right{text-align:right} .center{text-align:center}
.row{display:flex;align-items:center;gap:10px}
.spacer{flex:1}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:var(--panel2);border:1px solid var(--line2)}
.pill.g{color:var(--green);border-color:rgba(63,176,123,.35);background:rgba(63,176,123,.10)}
.pill.a{color:var(--amber);border-color:rgba(224,166,60,.35);background:rgba(224,166,60,.10)}
.pill.r{color:var(--red);border-color:rgba(229,84,78,.4);background:rgba(229,84,78,.12)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--panel2);border:1px solid var(--line2);
  border-radius:var(--r3);padding:10px 14px;font-weight:600;font-size:14px;color:var(--ink)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:linear-gradient(145deg,var(--gold),var(--gold2));color:var(--on-accent);border:none}
.btn.ghost{background:transparent}
.btn.sm{padding:7px 11px;font-size:13px;border-radius:9px}
.btn.danger{color:var(--red);border-color:rgba(229,84,78,.4)}
.btn.block{width:100%}
.iconbtn{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;background:var(--panel2);border:1px solid var(--line2);font-size:16px;flex:none}
.chiprow{display:flex;gap:8px;overflow-x:auto;padding:6px 8px 8px;margin:0 -8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chiprow::-webkit-scrollbar{display:none}
.chip{flex:none;padding:8px 13px;border-radius:999px;background:var(--panel2);border:1px solid var(--line2);font-size:13px;font-weight:600;color:var(--ink2);white-space:nowrap}
.chip.active{background:color-mix(in srgb,var(--gold) 14%,transparent);border-color:var(--gold);color:var(--gold)}

/* KPI */
.kpi{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--r2);padding:13px 14px;min-width:0}
.kpi .k-lbl{font-size:11px;color:var(--ink3);font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.kpi .k-val{font-size:22px;font-weight:750;margin-top:5px;letter-spacing:-.5px;overflow-wrap:anywhere}
.kpi .k-sub{font-size:12px;color:var(--ink2);margin-top:3px}
.k-val.pos{color:var(--green)} .k-val.neg{color:var(--red)} .k-val.gold{color:var(--gold)}

/* progress / meters */
.meter{height:9px;border-radius:999px;background:var(--panel2);overflow:hidden;border:1px solid var(--line)}
/* Календарь по дням (пункт 4) */
.cal-day{display:flex;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line)}
.cal-day:last-child{border-bottom:none}
.cal-day.today{background:color-mix(in srgb,var(--gold) 8%,transparent)}
.cal-day.gap{background:color-mix(in srgb,var(--red) 9%,transparent)}
.cal-dnum{width:46px;flex:none;text-align:center}
.cal-dnum .d{font-size:19px;font-weight:750;line-height:1.05}
.cal-dnum .w{font-size:10px;color:var(--ink3)}
.cal-bal{margin-left:auto;text-align:right;flex:none;padding-left:8px}
.cal-grid{display:none}
.meter>span{display:block;height:100%;border-radius:999px;background:var(--green);transition:width .5s ease}
.meter.warn>span{background:var(--amber)} .meter.bad>span{background:var(--red)}
.linrow{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:6px}

/* list rows */
.lrow{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line)}
.lrow:last-child{border-bottom:none}
.lrow .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:17px;flex:none;background:var(--panel2)}
.lrow .t1{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap} .lrow .t2{font-size:12px;color:var(--ink3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lrow .amt{margin-left:auto;font-weight:700;text-align:right;white-space:nowrap}
.amt.exp{color:var(--ink)} .amt.inc{color:var(--green)}

table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;color:var(--ink3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px 8px;border-bottom:1px solid var(--line2)}
.tbl td{padding:10px 8px;border-bottom:1px solid var(--line)}
.tbl tr:last-child td{border-bottom:none}
.tbl .right{text-align:right}

/* Sheet / modal */
.scrim{position:fixed;inset:0;background:rgba(24,34,47,.42);backdrop-filter:blur(3px);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--bg2);border-top-left-radius:22px;border-top-right-radius:22px;
  border:1px solid var(--line);border-bottom:none;padding:8px 18px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1),opacity .2s,visibility .2s;max-height:92dvh;overflow-y:auto;box-shadow:var(--shadow);
  opacity:0;visibility:hidden;pointer-events:none}
.sheet.show{transform:translateY(0);opacity:1;visibility:visible;pointer-events:auto}
.sheet .grab{width:40px;height:4px;border-radius:999px;background:var(--line2);margin:8px auto 12px}
.sheet h3{margin:0 0 14px;font-size:18px;font-weight:750}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--ink2);font-weight:600;margin-bottom:6px}
.seg{display:flex;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;padding:9px;border-radius:8px;font-weight:600;font-size:13px;color:var(--ink2)}
.seg button.active{background:var(--gold);color:var(--on-accent)}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{padding:9px 12px;border-radius:10px;background:var(--panel2);border:1px solid var(--line2);font-size:13px;font-weight:600;color:var(--ink2)}
.opt.active{border-color:var(--gold);color:var(--gold);background:color-mix(in srgb,var(--gold) 13%,transparent)}
.amount-big{font-size:34px;font-weight:750;text-align:center;letter-spacing:-1px;padding:6px;background:transparent;border:none;border-bottom:2px solid var(--line2);border-radius:0}
.amount-big:focus{border-color:var(--gold)}
.sheet-sticky{position:sticky;top:0;z-index:4;background:var(--bg2);margin:0 -18px 12px;padding:2px 18px 12px;box-shadow:0 8px 12px -10px rgba(0,0,0,.45)}
.sheet-sticky h3{margin:2px 0 12px}

.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(var(--nav-h) + 30px);z-index:80;
  background:#22303F;color:#F4F7FA;border:1px solid var(--line2);border-radius:12px;padding:11px 16px;font-size:13px;font-weight:600;
  box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:30px 16px;color:var(--ink3)}
.empty .big{font-size:34px;margin-bottom:8px;opacity:.6}
.hidden{display:none!important}
/* --- экран-заглушка / блокировка --- */
#app{visibility:hidden}
#gate{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;align-items:center;justify-content:center;padding:24px}
#gate.show{display:flex}
#gate .gbox{width:100%;max-width:300px;display:flex;flex-direction:column;gap:14px;align-items:center}
#gate input{text-align:center;font-size:22px;letter-spacing:2px;padding:15px;border-radius:12px;background:var(--panel2);border:1px solid var(--line2);width:100%}
#gate .gbtn2{width:100%;max-width:240px;padding:15px;border-radius:12px;background:var(--gold);color:#fff;border:none;font-size:17px;font-weight:700;cursor:pointer}
#gate .gver{font-size:11px;color:var(--ink3);opacity:.65;margin-top:10px}
#gate .gbtn{width:46px;height:46px;border-radius:999px;background:var(--panel2);border:1px solid var(--line2);display:grid;place-items:center;font-size:20px;color:var(--ink2)}
#gate .gface{font-size:14px;color:var(--ink3);background:none;border:none;text-decoration:underline}
#gate.shake .gbox{animation:shk .35s}
#gate .gmsg{font-size:13px;color:var(--red);min-height:16px;text-align:center;margin-top:-6px}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}
.donut-wrap{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.legend{flex:1;min-width:160px;display:flex;flex-direction:column;gap:7px}
.legend .li{display:flex;align-items:center;gap:8px;font-size:13px}
.legend .sw{width:10px;height:10px;border-radius:3px;flex:none}
.legend .lv{margin-left:auto;font-weight:600}
.divider{height:1px;background:var(--line);margin:14px 0}
.warnbox{background:rgba(229,84,78,.08);border:1px solid rgba(229,84,78,.3);border-radius:12px;padding:12px 14px;font-size:13px;color:#B23A36;margin-bottom:12px}
.okbox{background:rgba(63,176,123,.08);border:1px solid rgba(63,176,123,.3);border-radius:12px;padding:12px 14px;font-size:13px;color:#1F7A50;margin-bottom:12px}
.infobox{background:rgba(79,176,206,.07);border:1px solid rgba(79,176,206,.28);border-radius:12px;padding:12px 14px;font-size:13px;color:#276B86;margin-bottom:12px}
small.hint{color:var(--ink3);font-size:11.5px}

/* ---------- Desktop / tablet ---------- */
@media(min-width:900px){
  .topbar{height:60px;padding:0 22px}
  .bottomnav,.fab{display:none}
  .shell{}
  .sidebar{display:flex;flex-direction:column;width:var(--sidebar-w);flex:none;align-self:flex-start;background:color-mix(in srgb,var(--panel) 82%,transparent);backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4);
    border-right:1px solid var(--line);padding:14px 12px;position:sticky;top:var(--top-h);height:calc(100dvh - var(--top-h));overflow-y:auto;gap:3px}
  .sidebar .navi{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;color:var(--ink2);font-weight:600;font-size:14px}
  .sidebar .navi .ic{font-size:18px;width:22px;text-align:center}
  .sidebar .navi.active{background:color-mix(in srgb,var(--gold) 13%,transparent);color:var(--gold)}
  .sidebar .navi:hover:not(.active){background:var(--panel2)}
  .sidebar .sgroup{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);font-weight:700;padding:14px 13px 6px}
  .sidebar .desk-add{margin:6px 4px 10px}
  .main{padding:24px 28px 60px}
  .g2{grid-template-columns:repeat(2,minmax(0,1fr))} .dg3{grid-template-columns:repeat(3,minmax(0,1fr))} .dg4{grid-template-columns:repeat(4,minmax(0,1fr))}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:4px 0 16px}
  .cal-cell{min-height:66px;border:1px solid var(--line);border-radius:10px;padding:6px;display:flex;flex-direction:column;gap:2px}
  .cal-cell.gap{border-color:var(--red);background:color-mix(in srgb,var(--red) 8%,transparent)}
  .cal-cell.today{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
  .sheet{left:50%;right:auto;top:50%;bottom:auto;transform:translate(-50%,-46%) scale(.98);width:520px;max-width:94vw;
    border-radius:20px;border:1px solid var(--line);max-height:88dvh}
  .sheet.show{transform:translate(-50%,-50%) scale(1)}
  .sheet .grab{display:none}
}

<script>
/* ============================================================
   Семейная финансовая ERP — single-file app (vanilla JS)
   Данные: localStorage (автосохранение) + Экспорт/Импорт + Dropbox sync (PKCE)

"use strict";
/* --- ранняя диагностика: маркер загрузки + вывод ошибок на экран --- */
(function(){ try{

}catch(e){} })();
const LS_KEY = "famfin.v1";
const LS_ME  = "famfin.me";   // текущий участник — локально на устройстве, НЕ синхронизируется
const LS_GATE= "famfin.gate"; // заглушка пройдена на этом браузере
const LS_FACEID="famfin.faceid"; // id ключа Face ID для этого браузера
const LS_ENCFACE="famfin.encface"; // код шифрования, хранимый на устройстве для входа по Face ID
const LS_QUOTE="famfin.quoteStart"; // дата первого «совета дня» (локально, свой счёт на устройстве)
const LS_ACCT="famfin.acct";  // облачная сессия: {base, refresh, email, keybag}
const LS_DEK="famfin.dek";    // ключ данных, закэшированный на устройстве (режим «оставаться в системе»)
const LS_REMEMBER="famfin.remember"; // «оставаться в системе на этом устройстве» (по умолчанию вкл)
const LS_THEME="famfin.theme";   // light / dark / auto (пункт 14)
const LS_ACCENT="famfin.accent"; // gold / blue / green / violet / teal
const PROD_API_URL="https://hbxnjmkk-famfin-server-41b7.twc1.net";  // адрес API (Timeweb)
const APP_VERSION="v3.6";
const GATE_HASH="19bc0c710fd0ded5"; // хеш кода-заглушки (цифры), сам код в файле не хранится
function simpleHash(s){ let h=5381>>>0,h2=52711>>>0; for(let i=0;i<s.length;i++){const c=s.charCodeAt(i); h=(((h<<5)+h)+c)>>>0; h2=(((h2<<5)+h2)^c)>>>0;} return h.toString(16).padStart(8,"0")+h2.toString(16).padStart(8,"0"); }
const CUR = "₽";
const uid = () => Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const nowISO = () => new Date().toISOString();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const tint=(c,p)=>`color-mix(in srgb, ${c} ${p}%, transparent)`;

/* ---------- money / dates ---------- */
function fmt(n,opt={}){
  n = Math.round(Number(n)||0);
  const s = Math.abs(n).toLocaleString("ru-RU");
  const sign = n<0?"−":(opt.plus&&n>0?"+":"");
  return sign+s+(opt.bare?"":" "+CUR);
}
function fmtK(n){ n=Number(n)||0; const a=Math.abs(n);
  if(a>=1e6) return (n/1e6).toLocaleString("ru-RU",{maximumFractionDigits:2})+" млн";
  if(a>=1e3) return (n/1e3).toLocaleString("ru-RU",{maximumFractionDigits:0})+" тыс";
  return fmt(n,{bare:true});
}
function pct(n){ return (Math.round((Number(n)||0)*1000)/10).toLocaleString("ru-RU")+"%"; }
const MONTHS_RU=["январь","февраль","март","апрель","май","июнь","июль","август","сентябрь","октябрь","ноябрь","декабрь"];
const MONTHS_RU_SHORT=["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
function ym(d){ const x=new Date(d); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0"); }
function ymLabel(k){ const [y,m]=k.split("-").map(Number); return MONTHS_RU[m-1][0].toUpperCase()+MONTHS_RU[m-1].slice(1)+" "+y; }
function ymShort(k){ const [y,m]=k.split("-").map(Number); return MONTHS_RU_SHORT[m-1]+" "+String(y).slice(2); }
function addMonths(k,n){ let [y,m]=k.split("-").map(Number); m=m-1+n; y+=Math.floor(m/12); m=((m%12)+12)%12; return y+"-"+String(m+1).padStart(2,"0"); }
function monthsDiff(a,b){ const [ay,am]=a.split("-").map(Number),[by,bm]=b.split("-").map(Number); return (by-ay)*12+(bm-am); }
function todayISOdate(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

/* ---------- seed / defaults ---------- */
function seedState(){
  const groups=[
    {id:"g1",name:"Обязательные",kind:"expense",color:"var(--grp1)",note:"Fixed — то, что нельзя не платить"},
    {id:"g2",name:"Переменные",kind:"expense",color:"var(--grp2)",note:"Variable — управляемое потребление"},
    {id:"g3",name:"Семья",kind:"expense",color:"var(--grp3)",note:"Care — забота о близких"},
    {id:"g4",name:"Качество жизни",kind:"expense",color:"var(--grp4)",note:"Lifestyle — здесь пространство для манёвра"},
    {id:"g5",name:"Капитал",kind:"capital",color:"var(--grp5)",note:"Wealth — рост чистого капитала"},
    {id:"g6",name:"Пожертвования",kind:"expense",color:"#C77DA6",note:"Giving — отдаём, не копим (это расход)"},
  ];
  const C=[];const S=[];
  function cat(id,g,name,subs,icon){ C.push({id,groupId:g,name,icon:icon||"•"}); (subs||[]).forEach((s,i)=>S.push({id:id+"_"+(i+1),categoryId:id,name:s})); }
  // g1 обязательные
  cat("c_home","g1","Жильё",["Аренда / содержание","Ипотека / платёж"],"🏠");
  cat("c_util","g1","Коммунальные",["Газ","Электричество","Вода","Прочее"],"💡");
  cat("c_comm","g1","Связь",["Интернет","Мобильная связь","Подписки и сервисы"],"📶");
  cat("c_int","g1","Проценты по кредитам",["Проценты банков"],"％");
  cat("c_edu","g1","Образование детей",["Школа","Репетиторы / английский"],"🎓");
  // g2 переменные
  cat("c_food","g2","Продукты",["Продукты домой","Маркетплейсы"],"🛒");
  cat("c_cafe","g4","Кафе",["Кафе и рестораны"],"☕");
  cat("c_fuel","g2","Бензин",["Бензин"],"⛽");
  cat("c_trans","g2","Транспорт",["Платные дороги","Мойка","ТО и ремонт"],"🚗");
  // g3 семья
  cat("c_kids","g3","Дети",["Кружки и спорт","Карманные","Психолог"],"🧒");
  cat("c_health","g3","Здоровье",["Медицина","Аптека"],"➕");
  cat("c_cloth","g3","Одежда",["Одежда","Обувь"],"👕");
  cat("c_pets","g3","Домашние животные",["Корм","Груминг","Ветеринар"],"🐾");
  // g4 качество жизни
  cat("c_fun","g4","Развлечения",["Развлечения"],"🎬");
  cat("c_gift","g4","Подарки",["Подарки","Дни рождения и праздники"],"🎁");
  cat("c_trip","g4","Поездки",["Поездки и путешествия"],"✈️");
  cat("c_beauty","g4","Красота",["Стрижки","Маникюр"],"💇");
  // g5 капитал
  cat("c_cush","g5","Подушка безопасности",["Пополнение резерва"],"🛟");
  cat("c_save","g5","Накопления",["Накопления"],"🏦");
  cat("c_inv","g5","Инвестиции",["Инвестиции"],"📈");
  cat("c_debt","g5","Погашение долга (тело)",["Плановое (тело долга)","Досрочное гашение"],"⚡");
  cat("c_char","g6","Десятина и благотворительность",["Десятина / храм","Благотворительность","Помощь родным"],"🤲");

  const assets=[];
  const liab=[];
  const income=[];
  return {
    version:1, updatedAt:nowISO(),
    settings:{currency:CUR,startMonth:"2026-06",horizon:12,withdrawRatePct:4},
    groups, categories:C, subcategories:S,
    txns:[], plans:{}, recurring:[], planned:[],
    assets, liabilities:liab, incomeSources:income,
    goals:[], netWorthHistory:[],
    members:[],
    lock:{enabled:false,codeHash:null},
    snapshots:{},
    incomePlans:{},
    freq:{},
    __meta:{}
  };
}

/* ---------- persistence ---------- */
let __encEnv=null;
let state = load();
function load(){
  try{ const raw=localStorage.getItem(LS_KEY); if(raw){ const s=JSON.parse(raw); if(s&&s.__enc){ __encEnv=s; return seedState(); } return migrate(s);} }catch(e){}
  const s=seedState(); try{localStorage.setItem(LS_KEY,JSON.stringify(s));}catch(e){} return s;
}
function migrate(s){ s.freq=s.freq||{}; s.members=s.members||[]; s.lock=s.lock||{enabled:false,codeHash:null}; s.snapshots=s.snapshots||{}; s.incomePlans=s.incomePlans||{}; s.goals=s.goals||[]; s.recurring=s.recurring||[]; s.planned=s.planned||[]; s.netWorthHistory=s.netWorthHistory||[];
  // единая модель: старые «повторяющиеся» → плановые с повтором
  if(Array.isArray(s.recurring) && s.recurring.length){
    s.recurring.forEach(r=>{ if(!s.planned.some(p=>p.id===r.id)) s.planned.push({id:r.id,type:r.type||"expense",amount:r.amount,categoryId:r.categoryId,subId:r.subId,memberId:r.memberId,label:r.label,repeat:true,day:r.day||1,active:r.active!==false}); });
    s.recurring=[];
  }
  if(Array.isArray(s.groups) && !s.groups.some(g=>g.id==="g6")){ const idx=s.groups.findIndex(g=>g.id==="gi"); const g6={id:"g6",name:"Пожертвования",kind:"expense",color:"#C77DA6",note:"Giving — отдаём, не копим (это расход)"}; if(idx>=0)s.groups.splice(idx,0,g6); else s.groups.push(g6); }
  if(Array.isArray(s.categories)){ const cc=s.categories.find(c=>c.id==="c_char"); if(cc && cc.groupId==="g5") cc.groupId="g6"; }
  if(Array.isArray(s.categories)){ const cf=s.categories.find(c=>c.id==="c_cafe"); if(cf && cf.groupId==="g2") cf.groupId="g4"; }
  if(Array.isArray(s.assets)) s.assets.forEach(a=>{ if(!a.class) a.class=a.liquid?'reserve':'personal'; });
  if(Array.isArray(s.incomeSources)) s.incomeSources.forEach(x=>{ if(!x.kind) x.kind='labor'; });
  if(s.settings && s.settings.withdrawRatePct==null) s.settings.withdrawRatePct=4;
  sanitizeState(s); return s; }
let __lastSaved=null;
async function persistLocal(){
  try{ const str = CRYPT.on ? await CRYPT.wrap(state) : JSON.stringify(state); localStorage.setItem(LS_KEY, str); }
  catch(e){ toast("Не удалось сохранить локально"); }
}
function save(pushCloud=true){
  stampChanges();          // проставить метки времени на изменённые записи
  recomputeUpdatedAt();    // общий updatedAt = самая свежая метка (для сравнения версий)
  if(CRYPT.on){ persistLocal(); }
  else { try{ localStorage.setItem(LS_KEY,JSON.stringify(state)); }catch(e){ toast("Не удалось сохранить локально"); } }
  if(pushCloud && ACCT.linked && ACCT.dek){ setSync("dirty"); clearTimeout(srvTimer); srvTimer=setTimeout(()=>SRV.syncNow(false),1500); }
}

/* ============================================================
   ДВИЖОК СЛИЯНИЯ (record-level merge с надгробиями)
   Каждая запись/ключ помечается меткой изменения (u) и удаления (d).
   При синхронизации состояния сливаются по записям, а не «весь файл».
   Заложено расширяемо: позже можно нарастить до пофайлового журнала.
   ============================================================ */
const SYNC_COLLS = {
  txns:{type:'array'}, assets:{type:'array'}, liabilities:{type:'array'},
  incomeSources:{type:'array'}, categories:{type:'array'}, subcategories:{type:'array'},
  groups:{type:'array'}, members:{type:'array'}, goals:{type:'array'}, recurring:{type:'array'}, planned:{type:'array'},
  plans:{type:'map'}, incomePlans:{type:'map'}, snapshots:{type:'map'}, freq:{type:'map'},
  netWorthHistory:{type:'arraykey', key:'date'},
  settings:{type:'scalar'}, lock:{type:'scalar'}
};
const _clone=x=>JSON.parse(JSON.stringify(x));
const _deepEq=(a,b)=>JSON.stringify(a)===JSON.stringify(b);
const _maxs=(a,b)=>((a||"")>(b||"")?(a||""):(b||""));
function _idx(arr,keyf){ const o={}; (arr||[]).forEach(r=>{ const k=keyf(r); if(k!=null) o[k]=r; }); return o; }
function buildMetaBaseline(s){
  const now=s.updatedAt||nowISO(); const M={};
  for(const [coll,cfg] of Object.entries(SYNC_COLLS)){
    const m=M[coll]={u:{},d:{}};
    if(cfg.type==='array'||cfg.type==='arraykey'){ const kf=cfg.type==='array'?(r=>r.id):(r=>r[cfg.key]); (s[coll]||[]).forEach(r=>{ const k=kf(r); if(k!=null)m.u[k]=now; }); }
    else if(cfg.type==='map'){ for(const k in (s[coll]||{})) m.u[k]=now; }
    else { if(s[coll]!=null) m.u["_"]=now; }
  }
  s.__meta=M; return s;
}
function stampChanges(){
  state.__meta=state.__meta||{};
  if(!__lastSaved){ __lastSaved=_clone(state); return; }
  const now=nowISO(), prev=__lastSaved, cur=state;
  for(const [coll,cfg] of Object.entries(SYNC_COLLS)){
    const m=cur.__meta[coll]=cur.__meta[coll]||{u:{},d:{}}; m.u=m.u||{}; m.d=m.d||{};
    if(cfg.type==='array'||cfg.type==='arraykey'){
      const kf=cfg.type==='array'?(r=>r.id):(r=>r[cfg.key]);
      const pv=_idx(prev[coll],kf), cv=_idx(cur[coll],kf);
      for(const k in cv){ if(!(k in pv)||!_deepEq(pv[k],cv[k])){ m.u[k]=now; if(m.d[k])delete m.d[k]; } }
      for(const k in pv){ if(!(k in cv)) m.d[k]=now; }
    } else if(cfg.type==='map'){
      const pv=prev[coll]||{}, cv=cur[coll]||{};
      for(const k in cv){ if(!(k in pv)||!_deepEq(pv[k],cv[k])){ m.u[k]=now; if(m.d[k])delete m.d[k]; } }
      for(const k in pv){ if(!(k in cv)) m.d[k]=now; }
    } else { if(!_deepEq(prev[coll],cur[coll])) m.u["_"]=now; }
  }
  __lastSaved=_clone(cur);
}
function recomputeUpdatedAt(){
  let mx=""; const M=state.__meta||{};
  for(const coll in M){ for(const t of ['u','d']){ const o=M[coll][t]||{}; for(const k in o){ if(o[k]>mx)mx=o[k]; } } }
  state.updatedAt = mx || state.updatedAt || nowISO();
}
function mergeStates(A,B){
  const R=_clone(A); R.__meta={};
  const MA=A.__meta||{}, MB=B.__meta||{};
  for(const [coll,cfg] of Object.entries(SYNC_COLLS)){
    const ma=MA[coll]||{u:{},d:{}}, mb=MB[coll]||{u:{},d:{}};
    const uA=ma.u||{},dA=ma.d||{},uB=mb.u||{},dB=mb.d||{};
    const rm=R.__meta[coll]={u:{},d:{}};
    const allKeys=new Set([...Object.keys(uA),...Object.keys(dA),...Object.keys(uB),...Object.keys(dB)]);
    if(cfg.type==='array'||cfg.type==='arraykey'){
      const kf=cfg.type==='array'?(r=>r.id):(r=>r[cfg.key]);
      const ia=_idx(A[coll],kf), ib=_idx(B[coll],kf);
      Object.keys(ia).forEach(k=>allKeys.add(k)); Object.keys(ib).forEach(k=>allKeys.add(k));
      const out=[];
      allKeys.forEach(k=>{
        const alive=_maxs(uA[k],uB[k]), dead=_maxs(dA[k],dB[k]);
        if(alive) rm.u[k]=alive; if(dead) rm.d[k]=dead;
        if(dead && dead>=alive) return; // удалено
        let rec = ((uA[k]||"")>=(uB[k]||"") && ia[k]!==undefined) ? ia[k] : (ib[k]!==undefined?ib[k]:ia[k]);
        if(rec!=null) out.push(rec);
      });
      R[coll]=out;
    } else if(cfg.type==='map'){
      const oa=A[coll]||{}, ob=B[coll]||{};
      Object.keys(oa).forEach(k=>allKeys.add(k)); Object.keys(ob).forEach(k=>allKeys.add(k));
      const out={};
      allKeys.forEach(k=>{
        const alive=_maxs(uA[k],uB[k]), dead=_maxs(dA[k],dB[k]);
        if(alive) rm.u[k]=alive; if(dead) rm.d[k]=dead;
        if(dead && dead>=alive) return;
        out[k] = ((uA[k]||"")>=(uB[k]||"") && (k in oa)) ? oa[k] : ((k in ob)?ob[k]:oa[k]);
      });
      R[coll]=out;
    } else {
      const a=uA["_"]||"", b=uB["_"]||""; if(_maxs(a,b)) rm.u["_"]=_maxs(a,b);
      R[coll] = a>=b ? A[coll] : B[coll];
    }
  }
  if(Array.isArray(R.netWorthHistory)) R.netWorthHistory.sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  return R;
}

const subsOf=cid=>state.subcategories.filter(s=>s.categoryId===cid && !s.deleted);

const catsOfAll=gid=>state.categories.filter(c=>c.groupId===gid);

const MEMBER_COLORS=["#3D7BE0","#2E9E6B","#C68A12","#9163C9","#2494B0","#D6743E","#C74B84","#4B9E52"];
const memberById=id=>byId(state.members,id);
function curMember(){ let id=null; try{id=localStorage.getItem(LS_ME);}catch(e){} if(id&&memberById(id))return id; return state.members[0]?state.members[0].id:null; }
function setCurMember(id){ try{localStorage.setItem(LS_ME,id||"");}catch(e){} }
function memberBadge(id,mini){ const m=memberById(id); if(!m)return ""; return '<span class="mbadge" style="background:'+tint(m.color,16)+';color:'+esc(m.color)+';border-color:'+tint(m.color,40)+'">'+esc(m.emoji||"👤")+(mini?"":" "+esc(m.name))+'</span>'; }
function memberSpend(k,mid,type){ return txnsOfMonth(k).filter(t=>t.memberId===mid&&(type?t.type===type:true)).reduce((a,t)=>a+(+t.amount||0),0); }

function txnsOfMonth(k){ return state.txns.filter(t=>ym(t.date)===k); }
function sumTxns(list,type){ return list.filter(t=>type?t.type===type:true).reduce((a,t)=>a+(Number(t.amount)||0),0); }
function monthIncome(k){ const t=sumTxns(txnsOfMonth(k),"income"); return t; }
function monthExpense(k){ // consumption only = expense-type txns whose group is not capital
  return txnsOfMonth(k).filter(t=>t.type==="expense" && (groupOf(t.categoryId)||{}).kind!=="capital").reduce((a,t)=>a+(+t.amount||0),0);
}
function monthCapital(k){ return txnsOfMonth(k).filter(t=>t.type==="expense" && (groupOf(t.categoryId)||{}).kind==="capital").reduce((a,t)=>a+(+t.amount||0),0); }
function groupSpend(k,gid){ return txnsOfMonth(k).filter(t=>t.type==="expense" && (byId(state.categories,t.categoryId)||{}).groupId===gid).reduce((a,t)=>a+(+t.amount||0),0); }
function catSpend(k,cid){ return txnsOfMonth(k).filter(t=>t.categoryId===cid).reduce((a,t)=>a+(+t.amount||0),0); }
function subSpend(k,sid){ return txnsOfMonth(k).filter(t=>t.subId===sid).reduce((a,t)=>a+(+t.amount||0),0); }
function catDirectSpend(k,cid){ return txnsOfMonth(k).filter(t=>t.categoryId===cid && !t.subId).reduce((a,t)=>a+(+t.amount||0),0); }
function fixedSpend(k){ return groupSpend(k,"g1"); }
function essentialSpend(k){ return groupSpend(k,"g1")+groupSpend(k,"g2")+groupSpend(k,"g3"); } // «нужное» для подушки: обязательные+переменные+семья

const totalAssets=()=>state.assets.reduce((a,x)=>a+(+x.value||0),0);
const liquidAssets=()=>state.assets.filter(a=>a.liquid).reduce((a,x)=>a+(+x.value||0),0);
function startCashOfMonth(k){ const sn=(state.snapshots||{})[addMonths(k,-1)]; return (sn&&sn.liquid!=null)?sn.liquid:liquidAssets(); }
// Реальный остаток кэша «на сегодня»: кэш, перетёкший с прошлого месяца,
// плюс приходы с начала месяца по сегодня, минус РАСХОДЫ-ПОТРЕБЛЕНИЕ по сегодня.
// Взносы в капитал (накопления/долг) НЕ вычитаем — это отложенные деньги, а не трата.
function isCapCat(cid){ return ((groupOf(cid)||{}).kind==="capital"); }
function cashLeftToday(k){
  const start=startCashOfMonth(k);
  const isCur = ym(new Date())===k;
  const cutoff = isCur ? todayISOdate() : (k+"-32"); // прошлые/будущие месяцы — берём весь месяц
  const tx=txnsOfMonth(k).filter(t=> String(t.date) <= cutoff);
  const inc=tx.filter(t=>t.type==="income").reduce((a,t)=>a+(+t.amount||0),0);
  const out=tx.filter(t=>t.type==="expense" && !isCapCat(t.categoryId)).reduce((a,t)=>a+(+t.amount||0),0); // только потребление
  return { cash:start+inc-out, start, inc, out, isCur };
}
function setLiquidCash(v){
  v=Math.max(0,Math.round(+v||0));
  const liq=state.assets.filter(a=>a.liquid);
  if(liq.length===1){ liq[0].value=v; }
  else if(liq.length===0){ if(v>0) state.assets.push({id:uid(),name:"Счета и наличные",kind:"кэш",value:v,liquid:true}); }
  else { const others=liq.slice(1).reduce((a,x)=>a+(+x.value||0),0); liq[0].value=Math.max(0,v-others); }
}
const totalLiab=()=>state.liabilities.reduce((a,x)=>a+(+x.balance||0),0);
const netWorth=()=>totalAssets()-totalLiab();
const totalMinPayment=()=>state.liabilities.reduce((a,x)=>a+(+x.minPayment||0),0);
const expectedIncome=()=>state.incomeSources.reduce((a,x)=>a+(+x.amount||0),0);
function incomeSrcPlanned(k,sid){ const p=state.incomePlans[k]; if(p && (sid in p)) return +p[sid]||0; const s=incomeSrcById(sid); return s?+s.amount||0:0; }
function plannedIncome(k){ if(!state.incomeSources.length) return 0; return state.incomeSources.reduce((a,s)=>a+incomeSrcPlanned(k,s.id),0); }
function monthIncomeBySource(k,sid){ return txnsOfMonth(k).filter(t=>t.type==="income"&&t.categoryId===sid).reduce((a,t)=>a+(+t.amount||0),0); }
function incomeForMonth(k){ const real=monthIncome(k); return real>0?real:plannedIncome(k); }

/* ---------- закрытие месяца ---------- */
function realMonth(){ return ym(new Date()); }
function firstDataMonth(){ const ms=state.txns.map(t=>ym(t.date)).filter(Boolean).sort(); return ms.length?ms[0]:addMonths(realMonth(),-1); }
function unclosedMonths(){
  const end=addMonths(realMonth(),-1);
  const haveBal=state.assets.length||state.liabilities.length;
  let start=firstDataMonth(); if(!state.txns.length){ if(!haveBal) return []; start=end; }
  const res=[]; let m=start,g=0;
  while(m<=end && g<240){ if(!(state.snapshots||{})[m]) res.push(m); m=addMonths(m,1); g++; }
  return res;
}
function monthToClose(){ const u=unclosedMonths(); return u.length?u[0]:null; }
function isClosed(k){ return !!(state.snapshots||{})[k]; }
function suggestBalance(x){ const b=+x.balance||0,r=+x.rate||0,p=+x.minPayment||0; return Math.max(0,Math.round(b + b*r/12 - p)); }

function metrics(k){
  const snap=(state.snapshots||{})[k];
  if(snap){
    return {
      income:snap.income, expense:snap.expense, capital:snap.capital,
      balance: snap.income - snap.expense - snap.capital,
      savingsRate: snap.savingsRate, debtLoad: snap.debtLoad, fixedShare: snap.fixedShare,
      freeCashFlow: snap.income - snap.expense,
      cushionMonths: snap.cushionMonths, netWorth: snap.net, closed:true
    };
  }
  const inc=incomeForMonth(k), exp=monthExpense(k), cap=monthCapital(k);
  const debtPay=totalMinPayment();
  const fixed=fixedSpend(k), essential=essentialSpend(k);
  return {
    income:inc, expense:exp, capital:cap,
    balance: inc-exp-cap,
    savingsRate: inc>0? cap/inc : 0,
    debtLoad: inc>0? debtPay/inc : 0,
    fixedShare: inc>0? fixed/inc : 0,
    freeCashFlow: inc - exp,
    cushionMonths: essential>0? liquidAssets()/essential : (liquidAssets()>0?99:0),
    netWorth: netWorth(), closed:false
  };
}
function liabInterestMonthly(){ return state.liabilities.reduce((a,x)=>a+((+x.balance||0)*(+x.rate||0)/12),0); }

function quoteElapsed(){ const st=new Date(quoteStartDay()+"T00:00:00"); const nw=new Date(todayISOdate()+"T00:00:00"); return Math.max(0,Math.round((nw-st)/86400000)); }
let __quoteView=null;
function openQuoteCard(){ const el=quoteElapsed(); if(__quoteView==null||__quoteView>el)__quoteView=el; renderQuoteCard(); }
function renderQuoteCard(){

      <button class="quoteArrow" data-qd="1" ${__quoteView>=elapsed?'disabled':''}>позже ›</button>
    </div>
  </div>`;
  ov.querySelector(".quoteClose").onclick=()=>ov.remove();

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function safeGlyph(x){ return String(x==null?"":x).replace(/[<>"'&]/g,"").slice(0,12); }
function safeColor(x){ x=String(x==null?"":x).trim(); return (/^#[0-9a-fA-F]{3,8}$/.test(x)||/^var\(--[a-z0-9-]+\)$/.test(x))?x:""; }
function sanitizeState(s){
  try{
    (s.members||[]).forEach(m=>{ m.emoji=safeGlyph(m.emoji)||"👤"; m.color=safeColor(m.color)||"#3D7BE0"; });
    (s.categories||[]).forEach(c=>{ if(c.icon!=null) c.icon=safeGlyph(c.icon)||"•"; });
    (s.groups||[]).forEach(g=>{ if(g.color!=null){ const c=safeColor(g.color); if(!c) g.color="var(--ink3)"; } });
  }catch(e){}
  return s;
}

/* ---------- sheet system ---------- */
const scrim=document.getElementById("scrim"), sheetEl=document.getElementById("sheet");
let sheetOpen=false, vvHandler=null;
function isMobile(){ return window.matchMedia("(max-width:899px)").matches; }
function fitSheet(){
  if(!window.visualViewport) return;
  if(!isMobile()){ sheetEl.style.maxHeight=""; sheetEl.style.bottom=""; return; }
  const vv=window.visualViewport;
  const kb=Math.max(0, window.innerHeight - vv.height - vv.offsetTop); // высота клавиатуры
  sheetEl.style.bottom = kb + "px";               // поднять окно над клавиатурой
  sheetEl.style.maxHeight = (vv.height - 6) + "px"; // вписать в видимую область
}
function openSheet(innerHTML,onMount){
  sheetEl.innerHTML='<div class="grab"></div>'+innerHTML;
  scrim.classList.add("show"); sheetEl.classList.add("show"); sheetOpen=true;
  document.body.style.overflow="hidden";
  if(window.visualViewport){ vvHandler=()=>fitSheet();
    window.visualViewport.addEventListener("resize",vvHandler);
    window.visualViewport.addEventListener("scroll",vvHandler); }
  (window.requestAnimationFrame||function(f){setTimeout(f,16);})(fitSheet); setTimeout(fitSheet,60); setTimeout(fitSheet,300);
  if(onMount) onMount(sheetEl);
}
function closeSheet(){
  scrim.classList.remove("show"); sheetEl.classList.remove("show"); sheetOpen=false; document.body.style.overflow="";
  if(window.visualViewport && vvHandler){ window.visualViewport.removeEventListener("resize",vvHandler); window.visualViewport.removeEventListener("scroll",vvHandler); vvHandler=null; }
  sheetEl.style.maxHeight=""; sheetEl.style.bottom="";
}
scrim.addEventListener("click",closeSheet);
// Свайп вниз для закрытия шторки (моб.): тянем от «ручки» или когда контент прокручен вверх
let _shDrag=null;
sheetEl.addEventListener("touchstart",e=>{
  if(!sheetOpen || !isMobile() || e.touches.length!==1) { _shDrag=null; return; }
  _shDrag={ y0:e.touches[0].clientY, dy:0, active:false,
    fromGrab:!!(e.target&&e.target.classList&&e.target.classList.contains("grab")) };
},{passive:true});
sheetEl.addEventListener("touchmove",e=>{
  if(!_shDrag) return;
  const dy=e.touches[0].clientY-_shDrag.y0;
  if(dy>0 && (_shDrag.fromGrab || sheetEl.scrollTop<=0)){
    _shDrag.active=true; _shDrag.dy=dy;
    sheetEl.style.transition="none";
    sheetEl.style.transform="translateY("+dy+"px)";
    if(e.cancelable) e.preventDefault();
  }
},{passive:false});
function _shEnd(){
  if(!_shDrag){ return; }
  const dy=_shDrag.dy, active=_shDrag.active; _shDrag=null;
  sheetEl.style.transition="";
  sheetEl.style.transform="";
  if(active && dy>90) closeSheet();
}
sheetEl.addEventListener("touchend",_shEnd);
sheetEl.addEventListener("touchcancel",_shEnd);

function dayPlan(k){
  const monthLen=new Date(+k.slice(0,4),+k.slice(5,7),0).getDate();
  const start=startCashOfMonth(k);
  const rm=realMonth();
  const isCur=(k===rm), isFuture=(k>rm);
  const todayDay=isCur?new Date().getDate():(monthLen+1);
  const txM=txnsOfMonth(k);
  const plan=plannedForMonth(k);
  const days=[]; let bal=start, firstGap=null, plannedRecurExp=0;
  for(let d=1; d<=monthLen; d++){
    const date=k+"-"+String(d).padStart(2,"0");
    const items=[]; let ins=0, outs=0;
    txM.filter(t=>+String(t.date).slice(8,10)===d).forEach(t=>{
      const amt=+t.amount||0;
      if(t.type==="income"){ ins+=amt; items.push({kind:"fact",type:"income",label:catName(t.categoryId),amount:amt}); }
      else if(isCapCat(t.categoryId)){ items.push({kind:"fact",type:"expense",capital:true,label:(t.comment||catName(t.categoryId)),amount:amt}); } // в капитал — не уменьшает кэш
      else { outs+=amt; items.push({kind:"fact",type:"expense",label:(t.comment||catName(t.categoryId)),amount:amt}); }
    });
    if(isFuture || (isCur && d>=todayDay)){
      plan.filter(p=>p.day===d).forEach(p=>{
        const amt=+p.amount||0;
        if(p.type==="income"){ ins+=amt; items.push({kind:"plan",type:"income",label:p.label,amount:amt}); }
        else { plannedRecurExp+=amt;
          if(isCapCat(p.categoryId)){ items.push({kind:"plan",type:"expense",capital:true,label:p.label,amount:amt}); }
          else { outs+=amt; items.push({kind:"plan",type:"expense",label:p.label,amount:amt}); }
        }
      });
    }
    bal += ins-outs;
    if(bal<0 && firstGap===null) firstGap=d;
    days.push({day:d,date,ins,outs,net:ins-outs,items,balance:bal,isToday:isCur&&d===todayDay});
  }
  const plannedMonthExp=planMonthTotal(k);
  const committed=monthExpense(k)+monthCapital(k)+plannedRecurExp;
  const undated=Math.max(0, plannedMonthExp-committed);

}

function fmtDate(d){ const x=new Date(d); return x.getDate()+" "+MONTHS_RU_SHORT[x.getMonth()]; }
function planMonthTotal(k){ const p=state.plans[k]||{}; return Object.values(p).reduce((a,x)=>a+(+x||0),0); }
function mlenOf(k){ return new Date(+k.slice(0,4),+k.slice(5,7),0).getDate(); }
function plannedActive(){ return (state.planned||[]).filter(p=>p.active!==false); }
// повторяющийся уже проведён в этом месяце?
function plannedDoneInMonth(p,k){ return state.txns.some(t=>t.fromPlanned===p.id && ym(t.date)===k); }
// эффективная дата планового пункта в месяце k (повтор — число, зажатое к длине месяца)
function plannedDateInMonth(p,k){ if(p.repeat){ return k+"-"+String(Math.min(+p.day||1,mlenOf(k))).padStart(2,"0"); } return p.date; }
// плановые пункты, применимые к месяцу k и ещё не проведённые (для календаря)
function plannedForMonth(k){
  const out=[];
  plannedActive().forEach(p=>{
    if(p.repeat){ if(!plannedDoneInMonth(p,k)) out.push({date:plannedDateInMonth(p,k),day:Math.min(+p.day||1,mlenOf(k)),type:p.type,amount:+p.amount||0,categoryId:p.categoryId,label:p.label||catName(p.categoryId),repeat:true,id:p.id}); }
    else { if(p.date && ym(p.date)===k) out.push({date:p.date,day:+String(p.date).slice(8,10),type:p.type,amount:+p.amount||0,categoryId:p.categoryId,label:p.label||catName(p.categoryId),repeat:false,id:p.id}); }
  });
  return out;
}
// плановые «к подтверждению на сегодня»: наступил день/дата и ещё не проведены (старые → новые)
function duePlanned(){
  const rm=realMonth(), today=todayISOdate();
  const list=[];
  plannedActive().forEach(p=>{
    if(p.repeat){ const d=plannedDateInMonth(p,rm); if(d<=today && !plannedDoneInMonth(p,rm)) list.push({p,date:d,overdue:d<today}); }
    else { if(p.date && p.date<=today) list.push({p,date:p.date,overdue:p.date<today}); } // разовый: висит, пока не подтвердят
  });
  return list.sort((a,b)=> a.date<b.date?-1:(a.date>b.date?1:0));
}

    if(!l.length){ box.appendChild(h(`<div class="empty"><div class="big">🗂️</div>Нет операций по фильтру за этот месяц.</div>`)); return; }
    const fi=l.filter(t=>t.type==='income').reduce((a,t)=>a+ +t.amount,0), fe=l.filter(t=>t.type==='expense').reduce((a,t)=>a+ +t.amount,0);
    box.appendChild(h(`<div class="linrow" style="padding:2px 2px 10px;border-bottom:1px solid var(--line);font-size:12px"><span class="dim">Найдено: ${l.length}</span><span class="num dim">${fi?'+'+fmt(fi,{bare:true}):''}${fi&&fe?' · ':''}${fe?'−'+fmt(fe,{bare:true}):''}</span></div>`));
    let lastDate=""; l.forEach(t=>{ if(t.date!==lastDate){ box.appendChild(h(`<div class="eyebrow" style="margin:14px 0 4px">${esc(fullDate(t.date))}</div>`)); lastDate=t.date; } box.appendChild(txnRow(t)); });
  }

}
function fullDate(d){ const x=new Date(d); const wd=["вс","пн","вт","ср","чт","пт","сб"][x.getDay()]; return x.getDate()+" "+MONTHS_RU[x.getMonth()]+", "+wd; }

  v.appendChild(h(`<div class="grid g3" style="margin-bottom:6px">

    ${kpiCard("Факт расходов",fmt(factT),"","")}
    ${kpiCard("Остаток",fmt(planT-factT,{plus:true}),planT?pct(planT?factT/planT:0)+" бюджета":"плана нет",planT-factT>=0?"pos":"neg")}

  if(planT===0){ v.appendChild(h(`<div class="infobox">Плановый бюджет на месяц не задан — ниже показан только факт по категориям. Лимиты можно поставить во вкладке «План».</div>`)); }
  // расходы: сводка план/факт по группам

    const fc=groupSpend(k,g.id); if(pl===0&&fc===0) return; anyEG=true;
    const ratio=pl?fc/pl:(fc>0?1.5:0), cls=ratio>1?"bad":(ratio>0.9?"warn":""), rest=pl-fc;
    egCard.appendChild(h(`<div style="padding:9px 2px;border-bottom:1px solid var(--line)">
      <div class="linrow"><span>${esc(g.name)}</span><span class="num" style="color:${rest<0?'var(--red)':'var(--ink2)'};font-weight:600">${rest<0?'−'+fmt(-rest,{bare:true})+' сверх':'осталось '+fmt(rest,{bare:true})}</span></div>
      <div class="meter ${cls}"><span style="width:${clamp(ratio*100,0,100)}%;background:${g.color}"></span></div>
      <div class="linrow" style="margin-top:5px;font-size:11.5px"><span class="dim num">Факт ${fmt(fc)}</span><span class="dim num">План ${fmt(pl)} · ${pct(ratio)}</span></div>
    </div>`));
  });
  if(anyEG) v.appendChild(egCard);

  expenseGroups().forEach(g=>{
    const cats=catsOfAll(g.id);
    const lines=[];
    cats.forEach(c=>{
      const subs=subsOfAll(c.id);
      if(subs.length){
        const relevant=subs.filter(su=>(plan[su.id]||0)>0 || subSpend(k,su.id)>0);
        const catPl=+plan[c.id]||0, catDirect=catDirectSpend(k,c.id);
        if(relevant.length || catPl>0 || catDirect>0){
          lines.push({header:true,label:(c.icon||'•')+' '+c.name+(c.deleted?' (удалена)':'')});
          relevant.forEach(su=>lines.push({label:su.name+(su.deleted?' (удалена)':''),pl:+plan[su.id]||0,fc:subSpend(k,su.id),sub:true}));
          if(catPl>0||catDirect>0) lines.push({label:'без подкатегории',pl:catPl,fc:catDirect,sub:true});
        }
      } else {
        const pl=+plan[c.id]||0, fc=catSpend(k,c.id);
        if(pl>0||fc>0) lines.push({label:(c.icon||'•')+' '+c.name+(c.deleted?' (удалена)':''),pl,fc});
      }
    });
    if(!lines.length)return;
    const card=h(`<div class="card"><h3><span style="width:9px;height:9px;border-radius:3px;background:${g.color};display:inline-block"></span>${esc(g.name)}</h3></div>`);
    lines.forEach(ln=>{
      if(ln.header){ card.appendChild(h(`<div class="linrow" style="margin:12px 0 2px;font-weight:600"><span>${esc(ln.label)}</span></div>`)); return; }
      const pl=ln.pl, fc=ln.fc, rest=pl-fc, ratio=pl?fc/pl:(fc>0?1.5:0), cls=ratio>1?"bad":(ratio>0.9?"warn":"");
      card.appendChild(h(`<div style="padding:9px 2px;${ln.sub?'padding-left:8px;':''}border-bottom:1px solid var(--line)">
        <div class="linrow"><span>${esc(ln.label)}</span><span class="num" style="color:${rest<0?'var(--red)':'var(--ink2)'};font-weight:600">${rest<0?'−'+fmt(-rest,{bare:true}):'осталось '+fmt(rest,{bare:true})}</span></div>
        <div class="meter ${cls}"><span style="width:${clamp(ratio*100,0,100)}%"></span></div>
        <div class="linrow" style="margin-top:5px;font-size:11.5px"><span class="dim num">Факт ${fmt(fc)}</span><span class="dim num">План ${fmt(pl)} · ${pct(ratio)}</span></div>
      </div>`));
    });
    v.appendChild(card);
  });
}

   CHARTS (inline SVG, без внешних библиотек)
   ============================================================ */
function donut(data,size){ // data:[{label,value,color}]
  size=size||150; const r=size/2, ir=r*0.62, cx=r, cy=r;
  const tot=data.reduce((a,d)=>a+d.value,0); if(tot<=0) return `<svg width="${size}" height="${size}"><circle cx="${cx}" cy="${cy}" r="${(r+ir)/2}" fill="none" stroke="var(--line)" stroke-width="${r-ir}"/></svg>`;
  let ang=-Math.PI/2, paths="";
  data.forEach(d=>{ const a2=ang+(d.value/tot)*Math.PI*2; const large=(a2-ang)>Math.PI?1:0;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi2=cx+ir*Math.cos(a2),yi2=cy+ir*Math.sin(a2),xi1=cx+ir*Math.cos(ang),yi1=cy+ir*Math.sin(ang);
    paths+=`<path d="M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} L${xi2} ${yi2} A${ir} ${ir} 0 ${large} 0 ${xi1} ${yi1} Z" fill="${d.color}"/>`; ang=a2; });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}<circle cx="${cx}" cy="${cy}" r="${ir-0.5}" fill="var(--panel)"/></svg>`;
}
function barsChart(rows,opt){ // rows:[{label, values:[{v,color}]}], stacked or grouped
  opt=opt||{}; const W=opt.w||640,H=opt.h||190, pad=28, bw=(W-pad*2)/rows.length;
  const max=Math.max(1,...rows.map(r=>opt.stacked? r.values.reduce((a,x)=>a+x.v,0) : Math.max(...r.values.map(x=>x.v),0)));
  let bars="",labels="";
  rows.forEach((r,i)=>{ const x0=pad+i*bw;
    if(opt.stacked){ let yAcc=H-24; r.values.forEach(val=>{ const hh=(val.v/max)*(H-46); yAcc-=hh; bars+=`<rect x="${x0+bw*0.18}" y="${yAcc}" width="${bw*0.64}" height="${Math.max(0,hh)}" fill="${val.color}"/>`; }); }
    else { const gw=bw*0.64/r.values.length; r.values.forEach((val,j)=>{ const hh=(val.v/max)*(H-46); bars+=`<rect x="${x0+bw*0.18+j*gw}" y="${H-24-hh}" width="${gw*0.85}" height="${Math.max(0,hh)}" fill="${val.color}" rx="1.5"/>`; }); }
    labels+=`<text x="${x0+bw/2}" y="${H-8}" fill="var(--ink3)" font-size="10" text-anchor="middle">${esc(r.label)}</text>`;
  });
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="overflow:visible"><line x1="${pad}" y1="${H-24}" x2="${W-pad}" y2="${H-24}" stroke="var(--line2)"/>${bars}${labels}</svg>`;
}
function lineChart(points,opt){ // points:[{label,v}]
  opt=opt||{}; const W=opt.w||640,H=opt.h||170,pad=30;
  const vals=points.map(p=>p.v); const min=Math.min(0,...vals),max=Math.max(1,...vals);
  const rng=max-min||1; const step=(W-pad*2)/Math.max(1,points.length-1);
  const xy=points.map((p,i)=>[pad+i*step, H-22-((p.v-min)/rng)*(H-40)]);
  const d=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=d+` L${xy[xy.length-1][0]} ${H-22} L${xy[0][0]} ${H-22} Z`;
  const zeroY=H-22-((0-min)/rng)*(H-40);
  let labels=points.map((p,i)=>(i%Math.ceil(points.length/6)===0)?`<text x="${xy[i][0]}" y="${H-6}" fill="var(--ink3)" font-size="10" text-anchor="middle">${esc(p.label)}</text>`:"").join("");
  let dots=xy.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.4" fill="var(--gold)"/>`).join("");
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"><line x1="${pad}" y1="${zeroY}" x2="${W-pad}" y2="${zeroY}" stroke="var(--line2)" stroke-dasharray="3 3"/><path d="${area}" fill="var(--gold)" opacity="0.10"/><path d="${d}" fill="none" stroke="var(--gold)" stroke-width="2"/>${dots}${labels}</svg>`;
}

/* ============================================================
   PAGE: ПРОГНОЗ и кассовые разрывы
   ============================================================ */
function pgForecast(v){
  v.appendChild(h(`<div class="page-title">Прогноз денег</div><div class="page-sub">12 месяцев вперёд · раннее предупреждение о кассовых разрывах</div>`));
  const months=[]; for(let i=0;i<state.settings.horizon;i++)months.push(addMonths(horizonStart(),i));
  const startCash=liquidAssets();
  let cum=startCash; const proj=[]; let firstGap=null;
  const goalsMonthly=(state.goals||[]).reduce((a,g)=>a+(+g.monthlyNeeded||0),0);
  months.forEach(mm=>{ 
    const actualInc=monthIncome(mm);
    const inc = (actualInc>0?actualInc:plannedIncome(mm)) + (actualInc>0?0:assetCashYieldForMonth(mm));
    const planExp = planMonthTotal(mm);
    const realExp = monthExpense(mm)+monthCapital(mm);
    const exp = Math.max(planExp, realExp>0?realExp:0) || estimatedMonthlyExpense();
    const outflow = exp + goalsMonthly*(planExp?0:1); // if no plan, add goal contributions on top
    const delta = inc - outflow;
    cum += delta;
    if(cum<0 && firstGap===null) firstGap=mm;
    proj.push({mm,inc,exp:outflow,delta,cum});
  });
  if(firstGap) v.appendChild(h(`<div class="warnbox"><b>Возможен кассовый разрыв: ${ymLabel(firstGap)}.</b> По текущему прогнозу накопленный остаток уходит в минус. Заранее подготовьте резерв, перенесите крупные траты (поездки/крупные покупки) или увеличьте доход в этом месяце.</div>`));
  else v.appendChild(h(`<div class="okbox">Кассовых разрывов в горизонте 12 месяцев не видно. Накопленный остаток остаётся положительным при текущих допущениях.</div>`));
  const card=h(`<div class="card" style="overflow-x:auto"><h3>Прогноз остатка</h3><table class="tbl"><thead><tr><th>Месяц</th><th class="right">Приход</th><th class="right">Отток</th><th class="right">Δ</th><th class="right">Остаток</th></tr></thead><tbody></tbody></table></div>`);
  const tb=card.querySelector("tbody");
  proj.forEach(p=>tb.appendChild(h(`<tr><td>${ymShort(p.mm)}</td><td class="right num">${fmt(p.inc,{bare:true})}</td><td class="right num">${fmt(p.exp,{bare:true})}</td><td class="right num" style="color:${p.delta<0?'var(--red)':'var(--green)'}">${fmt(p.delta,{bare:true,plus:true})}</td><td class="right num" style="color:${p.cum<0?'var(--red)':'var(--ink)'};font-weight:600">${fmt(p.cum,{bare:true})}</td></tr>`)));
  v.appendChild(card);
  v.appendChild(h(`<div class="infobox">Допущения: приход = факт месяца или ожидаемый доход ${fmt(expectedIncome())}; отток = план месяца, а если плана нет — средняя оценка расходов${goalsMonthly?` плюс взносы по целям ${fmt(goalsMonthly)}/мес`:''}. Стартовый остаток = кэш на счетах ${fmt(startCash)} (задаётся в «Баланс»). Ожидаемые выплаты от работающих активов «в кэш» уже учтены в приходе будущих месяцев. Чем точнее план и кэш, тем точнее прогноз.</div>`));
}
function estimatedMonthlyExpense(){
  const months=[...new Set(state.txns.map(t=>ym(t.date)))];
  if(!months.length) return Math.round(expectedIncome()*0.85);
  const tot=months.reduce((a,k)=>a+monthExpense(k)+monthCapital(k),0);
  return Math.round(tot/months.length);
}

function pgDebts(v){

  v.appendChild(card);

  // refinance calculator
  const rc=h(`<div class="card"><h3>Калькулятор перекредитования</h3>
    <div class="grid g3">
      <div class="field"><label>Сумма, ${CUR}</label><input id="rfSum" class="num" inputmode="numeric" value="${Math.round(L)}"></div>
      <div class="field"><label>Ставка, %</label><input id="rfRate" class="num" inputmode="decimal" value="21"></div>
      <div class="field"><label>Срок, мес</label><input id="rfTerm" class="num" inputmode="numeric" value="60"></div>
    </div>
    <div id="rfOut"></div>
  </div>`);

    </div>`;

  v.appendChild(rc); ["#rfSum","#rfRate","#rfTerm"].forEach(s=>rc.querySelector(s).oninput=calc); calc();

  // payment calendar
  const cal=h(`<div class="card"><h3>Календарь платежей (в месяц)</h3></div>`);

  else cal.appendChild(h(`<div class="empty">Укажите минимальные платежи у долгов в «Баланс», чтобы построить календарь.</div>`));
  v.appendChild(cal);
}

const SAVE_CAT="c_save";

  const actual=txnsOfMonth(k).filter(t=>t.type==='income'&&ids.includes(t.categoryId)).reduce((a,t)=>a+ +t.amount,0);
  if(actual>0)return actual;

}

    ${c.links&&c.links.length?`<div class="row" style="gap:8px;flex-wrap:wrap;margin-top:14px">${c.links.map(l=>`<button class="btn sm primary" data-nav="${l.route}">${esc(l.label)} →</button>`).join("")}</div>`:''}</div>`);
  v.appendChild(card);
  const dots=h(`<div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:14px 0">${cards.map((_,j)=>`<div style="width:${j===i?'20px':'7px'};height:7px;border-radius:4px;background:${j===i?'var(--gold)':'var(--line2)'};cursor:pointer;transition:width .2s" data-dot="${j}"></div>`).join("")}</div>`);
  dots.querySelectorAll("[data-dot]").forEach(d=>d.onclick=()=>{ helpIdx=+d.dataset.dot; render_current(); window.scrollTo(0,0); });
  v.appendChild(dots);
  const navb=h(`<div class="row" style="gap:10px"><button class="btn block" id="hPrev" ${i<=0?'disabled':''} style="flex:1">‹ Назад</button><button class="btn primary block" id="hNext" ${i>=cards.length-1?'disabled':''} style="flex:1">Далее ›</button></div>`);
  navb.querySelector("#hPrev").onclick=()=>{ if(helpIdx>0){helpIdx--;render_current();window.scrollTo(0,0);} };
  navb.querySelector("#hNext").onclick=()=>{ if(helpIdx<cards.length-1){helpIdx++;render_current();window.scrollTo(0,0);} };
  v.appendChild(navb);
  let x0=null; card.addEventListener("touchstart",e=>{x0=e.touches[0].clientX;},{passive:true});
  card.addEventListener("touchend",e=>{ if(x0==null)return; const dx=e.changedTouches[0].clientX-x0; if(dx<-45&&helpIdx<cards.length-1){helpIdx++;render_current();window.scrollTo(0,0);} else if(dx>45&&helpIdx>0){helpIdx--;render_current();window.scrollTo(0,0);} x0=null; },{passive:true});

function xmlEsc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&apos;"}[c])); }
function colRef(n){ let s=""; n++; while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); } return s; }
function wsXML(rows){
  let x='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
  rows.forEach((row,ri)=>{ x+='<row r="'+(ri+1)+'">';
    row.forEach((val,ci)=>{ const ref=colRef(ci)+(ri+1);
      if(typeof val==="number" && isFinite(val)) x+='<c r="'+ref+'"><v>'+val+'</v></c>';
      else x+='<c r="'+ref+'" t="inlineStr"><is><t xml:space="preserve">'+xmlEsc(val)+'</t></is></c>';
    });
    x+='</row>';
  });
  return x+'</sheetData></worksheet>';
}
const _CRCT=(()=>{ const t=[]; for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++)c=c&1?(0xEDB88320^(c>>>1)):(c>>>1); t[n]=c>>>0; } return t; })();

function zipStore(files){
  const enc=new TextEncoder(); const u16=n=>[n&255,(n>>8)&255], u32=n=>[n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];
  const parts=[], central=[]; let offset=0;
  files.forEach(f=>{ const nb=enc.encode(f.name), data=f.data, crc=crc32(data);
    const local=[0x50,0x4b,0x03,0x04,...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(data.length),...u32(data.length),...u16(nb.length),...u16(0)];
    parts.push(new Uint8Array(local),nb,data);
    central.push(new Uint8Array([0x50,0x4b,0x01,0x02,...u16(20),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(data.length),...u32(data.length),...u16(nb.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(offset)]), nb);
    offset += local.length+nb.length+data.length;
  });
  let cs=0; central.forEach(c=>cs+=c.length); const co=offset;
  const end=new Uint8Array([0x50,0x4b,0x05,0x06,...u16(0),...u16(0),...u16(files.length),...u16(files.length),...u32(cs),...u32(co),...u16(0)]);
  const all=[...parts,...central,end]; let total=0; all.forEach(c=>total+=c.length);
  const out=new Uint8Array(total); let p=0; all.forEach(c=>{out.set(c,p);p+=c.length;}); return out;
}
function buildXLSX(sheets){
  const enc=new TextEncoder(); const files=[];
  const ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'+sheets.map((s,i)=>'<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>').join("")+'</Types>';
  files.push({name:"[Content_Types].xml",data:enc.encode(ct)});
  files.push({name:"_rels/.rels",data:enc.encode('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>')});
  const wb='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>'+sheets.map((s,i)=>'<sheet name="'+xmlEsc(s.name)+'" sheetId="'+(i+1)+'" r:id="rId'+(i+1)+'"/>').join("")+'</sheets></workbook>';
  files.push({name:"xl/workbook.xml",data:enc.encode(wb)});
  const wbr='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+sheets.map((s,i)=>'<Relationship Id="rId'+(i+1)+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet'+(i+1)+'.xml"/>').join("")+'</Relationships>';
  files.push({name:"xl/_rels/workbook.xml.rels",data:enc.encode(wbr)});
  sheets.forEach((s,i)=>files.push({name:"xl/worksheets/sheet"+(i+1)+".xml",data:enc.encode(wsXML(s.rows))}));
  return zipStore(files);
}
function buildWorkbookSheets(){

    const grp=inc?"Доход":(g?g.name:""); const cat=catName(t.categoryId); const sub=(!inc&&t.subId)?subName(t.subId):"";
    const mem=t.memberId&&memberById(t.memberId)?memberById(t.memberId).name:"";

  // Помесячно

  const months=Object.keys(mset).sort();
  const mRows=[["Месяц","Доход","Расход","В капитал","Сальдо (доход−расход)","Чистый капитал (на конец)","Месяц закрыт"]];
  months.forEach(k=>{ const sn=(state.snapshots||{})[k];
    const inc=sn?sn.income:monthIncome(k), exp=sn?sn.expense:monthExpense(k), cap=sn?sn.capital:monthCapital(k);
    mRows.push([k, Math.round(inc||0), Math.round(exp||0), Math.round(cap||0), Math.round((inc||0)-(exp||0)), sn?Math.round(sn.net||0):"", sn?"да":"нет"]);
  });

      pRows.push([ p.type==="income"?"Доход":"Расход", p.repeat?"ежемесячно":"разово", p.repeat?(p.day+" число"):(p.date||""), catName(p.categoryId), Math.round(+p.amount||0), p.label||"", p.active===false?"пауза":"активен" ]);
    });
    sheets.push({name:"Плановые",rows:pRows});
  }
  // Активы
  if(state.assets.length){ const aRows=[["Название","Тип","Стоимость","Ликвидный"]];
    state.assets.forEach(a=>aRows.push([a.name,a.kind||"",Math.round(+a.value||0),a.liquid?"да":"нет"]));
    aRows.push(["ИТОГО","",Math.round(totalAssets()),""]); sheets.push({name:"Активы",rows:aRows}); }
  // Пассивы
  if(state.liabilities.length){ const lRows=[["Название","Тип","Остаток","Ставка, % годовых","Платёж/мес"]];
    state.liabilities.slice().sort((a,b)=>b.balance-a.balance).forEach(x=>lRows.push([x.name,x.kind||"",Math.round(+x.balance||0),Math.round((+x.rate||0)*1000)/10,Math.round(+x.minPayment||0)]));
    lRows.push(["ИТОГО","",Math.round(totalLiab()),"",Math.round(totalMinPayment())]); sheets.push({name:"Пассивы",rows:lRows}); }

    state.goals.forEach(g=>gRows.push([g.name,Math.round(+g.target||0),Math.round(+g.current||0),g.targetDate||"",g.target?Math.round((g.current||0)/g.target*100):0]));
    sheets.push({name:"Цели",rows:gRows}); }
  return sheets;
}

/* ============================================================
   ШИФРОВАНИЕ (PBKDF2 + AES-GCM, WebCrypto). Данные нечитаемы без кода.
   updatedAt хранится открыто (нужен для сравнения версий синхронизации).

function normCode(s){ let v=String(s||""); try{v=v.normalize("NFKC");}catch(e){} return v.replace(/[\s\u200B\u200C\u200D\uFEFF\u00A0]+/g,""); }
const CRYPT = {
  on:false, pass:null, saltB64:null, keyCache:{},

  _ub64(s){ return Uint8Array.from(atob(s),c=>c.charCodeAt(0)); },
  async _keyFor(saltB64){
    if(this.keyCache[saltB64]) return this.keyCache[saltB64];
    const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(this.pass), "PBKDF2", false, ["deriveKey"]);
    const k = await crypto.subtle.deriveKey({name:"PBKDF2", salt:this._ub64(saltB64), iterations:200000, hash:"SHA-256"}, km, {name:"AES-GCM",length:256}, false, ["encrypt","decrypt"]);

  },
  async wrap(obj){
    const key = await this._keyFor(this.saltB64);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({name:"AES-GCM",iv}, key, new TextEncoder().encode(JSON.stringify(obj)));
    return JSON.stringify({__enc:1, v:1, updatedAt:obj.updatedAt||nowISO(), salt:this.saltB64, iv:this._b64(iv), ct:this._b64(ct)});
  },
  async unwrap(env){
    if(!this.pass) throw new Error("no-pass");
    const key = await this._keyFor(env.salt);

  async enable(pass){

    await persistLocal();
  },
  async disable(){
    this.on=false; this.pass=null; this.keyCache={};
    try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
   
  }
};
// расшифровать удалённые данные Dropbox (или вернуть как есть, если не зашифровано)
async function decodeRemote(parsed){ return (parsed && parsed.__enc) ? await CRYPT.unwrap(parsed) : parsed; }
// применить удалённое состояние с расшифровкой и обработкой ошибок
function metaAhead(a,b){ a=a||{}; b=b||{}; for(const coll in a){ for(const t of ['u','d']){ const mo=a[coll][t]||{}, ro=(b[coll]||{})[t]||{}; for(const k in mo){ if(!(k in ro) || mo[k]>ro[k]) return true; } } } return false; }
async function applyRemote(remote, manual){

    async importDEK(s){ return subtle.importKey('raw',ub64(s),{name:'AES-GCM',length:256},true,['encrypt','decrypt']); },
    async encryptVault(obj,dek){ const iv=C.getRandomValues(new Uint8Array(12)); const ct=new Uint8Array(await subtle.encrypt({name:'AES-GCM',iv},dek,te.encode(JSON.stringify(obj)))); return {ciphertext:b64(ct),iv:b64(iv),salt:'-',enc_v:1,updatedAt:obj.updatedAt||nowISO()}; },
    async decryptVault(env,dek){ const pt=await subtle.decrypt({name:'AES-GCM',iv:ub64(env.iv)},dek,ub64(env.ciphertext)); return JSON.parse(td.decode(pt)); },
  };
})();

const ACCT = {
  base:PROD_API_URL, access:null, refresh:null, email:null, keybag:null, dek:null, linked:false,
  async boot(){
    try{ const d=JSON.parse(localStorage.getItem(LS_ACCT)||"{}"); this.base=d.base||this.base; this.refresh=d.refresh||null; this.email=d.email||null; this.keybag=d.keybag||null; this.linked=!!this.refresh; }catch(e){}
    // восстановить закэшированный ключ данных (режим «оставаться в системе»)
    if(this.linked && this.remembered()){
      try{ const c=localStorage.getItem(LS_DEK); if(c) this.dek=await VaultCrypto.importDEK(_deobf(c)); }catch(e){}
    }
    return this;
  },
  // разблокировать данные паролем на уже привязанном устройстве (без полного входа)
  async unlock(password){
    if(!this.keybag) throw new Error("no_keybag");
    this.dek=await VaultCrypto.unlockWithPassword(password,this.email,this.keybag); // бросит bad-pass
    await this.cacheDEK();
    this.doRefresh().then(ok=>{ if(ok) SRV.syncNow(false); }).catch(()=>{});
  },
  remembered(){ try{ return localStorage.getItem(LS_REMEMBER)!=="0"; }catch(e){ return true; } },
  setRemember(on){ try{ localStorage.setItem(LS_REMEMBER, on?"1":"0"); }catch(e){} if(on) this.cacheDEK(); else this.clearDEKCache(); },
  persist(){ try{ localStorage.setItem(LS_ACCT,JSON.stringify({base:this.base,refresh:this.refresh,email:this.email,keybag:this.keybag})); }catch(e){} },
  async cacheDEK(){ try{ if(this.dek && this.remembered()) localStorage.setItem(LS_DEK, _obf(await VaultCrypto.exportDEK(this.dek))); }catch(e){} },
  clearDEKCache(){ try{ localStorage.removeItem(LS_DEK); }catch(e){} },
  async raw(path,opts){ return fetch((this.base||"").replace(/\/$/,"")+path, opts); },
  async api(path,opts){ opts=opts||{}; opts.headers=Object.assign({},opts.headers,this.access?{Authorization:"Bearer "+this.access}:{}); let r=await this.raw(path,opts); if(r.status===401&&this.refresh){ if(await this.doRefresh()){ opts.headers.Authorization="Bearer "+this.access; r=await this.raw(path,opts);} } return r; },
  async doRefresh(){ try{ const r=await this.raw("/auth/refresh",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({refresh:this.refresh})}); if(!r.ok){ this.forget(); return false; } const d=await r.json(); this.access=d.access; this.refresh=d.refresh; this.email=d.user.email; this.persist(); return true; }catch(e){ return false; } },
  forget(){ this.access=this.refresh=this.dek=this.keybag=null; this.linked=false; this.clearDEKCache(); try{localStorage.removeItem(LS_ACCT);}catch(e){} },
  async register(base,email,password){
    this.base=base; const acc=await VaultCrypto.createAccount(password,email);
    const r=await this.raw("/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password:acc.authHash,keybag:acc.keybag})});
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error((e.error&&e.error.code)||"register_failed"); }
    const d=await r.json(); this.access=d.access; this.refresh=d.refresh; this.email=d.user.email; this.keybag=acc.keybag; this.dek=acc.dek; this.linked=true; this.persist(); await this.cacheDEK();
    await SRV.push(true); return acc.recoveryKey;   // показать пользователю ОДИН раз
  },
  async login(base,email,password){
    this.base=base; const authHash=await VaultCrypto.authHash(password,email);
    const r=await this.raw("/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password:authHash})});
    if(!r.ok) throw new Error("invalid_credentials");
    const d=await r.json(); this.access=d.access; this.refresh=d.refresh; this.email=d.user.email; this.keybag=d.keybag; this.linked=true; this.persist();
    if(!this.keybag) throw new Error("no_keybag");
    this.dek=await VaultCrypto.unlockWithPassword(password,email,this.keybag);  // бросит bad-pass
    await this.cacheDEK(); await SRV.syncNow(true);
  },
  // отправить письмо со ссылкой сброса
  async requestReset(base,email){
    this.base=base;
    const r=await this.raw("/auth/request-reset",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email})});
    if(!r.ok) throw new Error("request_failed");
    return r.json().catch(()=>({}));   // в dev может вернуть dev_reset_token
  },
  // сценарий 3: забыл пароль, не залогинен, но есть ключ восстановления
  async resetWithRecovery(base,email,token,recoveryKey,newPassword){
    this.base=base;
    const r1=await this.raw("/auth/reset-keybag",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token})});
    if(!r1.ok) throw new Error("invalid_reset");
    const {keybag}=await r1.json(); if(!keybag) throw new Error("no_keybag");
    const dek=await VaultCrypto.unlockWithRecovery(recoveryKey,keybag);           // бросит bad-recovery
    const {keybag:kb2,authHash}=await VaultCrypto.rewrapForNewPassword(dek,newPassword,email,keybag);
    const r2=await this.raw("/auth/reset",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,password:authHash,keybag:kb2})});
    if(!r2.ok) throw new Error("reset_failed");
    await this.login(base,email,newPassword);   // установить сессию и DEK новым паролем
  },
  async changePassword(newPassword,{current}={}){
    if(!this.dek) throw new Error("locked");
    const {keybag,authHash}=await VaultCrypto.rewrapForNewPassword(this.dek,newPassword,this.email,this.keybag);
    const body={next:authHash,keybag}; if(current!=null) body.current=await VaultCrypto.authHash(current,this.email);
    const r=await this.api("/auth/change-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error((e.error&&e.error.code)||"change_failed"); }
    const d=await r.json(); this.access=d.access; this.refresh=d.refresh; this.keybag=keybag; this.persist(); await this.cacheDEK();
  },
  async regenerateRecovery(){
    if(!this.dek) throw new Error("locked");
    const {keybag,recoveryKey}=await VaultCrypto.regenerateRecovery(this.dek,this.keybag);
    const r=await this.api("/auth/keybag",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({keybag})});
    if(!r.ok) throw new Error("keybag_update_failed");
    this.keybag=keybag; this.persist(); return recoveryKey;
  },
  async logout(){ try{ if(this.refresh) await this.raw("/auth/logout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({refresh:this.refresh})}); }catch(e){} this.forget(); setSync(null); render_current(); },
};

const SRV = {
  baseUpdatedAt:null,
  _env(s){ return {ciphertext:s.ciphertext,iv:s.iv,salt:s.salt,enc_v:s.enc_v,updatedAt:s.updatedAt}; },
  async applyServer(env){
    const obj=await VaultCrypto.decryptVault(env,ACCT.dek);
    const rem=migrate(obj); if(!rem.__meta) buildMetaBaseline(rem);
    const merged=mergeStates(state,rem); const ahead=metaAhead(merged.__meta,rem.__meta);
    state=merged; __lastSaved=_clone(state); save(false); if(!isTyping())render_current(); return ahead;
  },
  async push(manual){
    if(!ACCT.linked||!ACCT.dek) return;
    setSync("dirty");
    for(let t=0;t<4;t++){
      const env=await VaultCrypto.encryptVault(state,ACCT.dek);
      const body={ciphertext:env.ciphertext,salt:env.salt,iv:env.iv,enc_v:env.enc_v,updatedAt:env.updatedAt,baseUpdatedAt:SRV.baseUpdatedAt||null};
      const r=await ACCT.api("/vault",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(r.status===200||r.status===201){ const d=await r.json(); SRV.baseUpdatedAt=d.updatedAt; setSync("ok"); if(manual)toast("Отправлено в облако"); return; }
      if(r.status===409){ const d=await r.json(); try{ await SRV.applyServer(SRV._env(d.server)); SRV.baseUpdatedAt=d.server.updatedAt; }catch(e){ setSync("err"); if(manual)toast("Не удалось расшифровать облако"); return; } continue; }
      if(r.status===413){ setSync("err"); if(manual)toast("Данные превышают лимит облака"); return; }
      setSync("err"); if(manual)toast("Ошибка отправки в облако"); return;
    }
    setSync("err"); if(manual)toast("Слишком много конфликтов — повторите");
  },
  async syncNow(manual){
    if(!ACCT.linked){ if(manual)go("settings"); return; }
    if(!ACCT.dek){ if(manual)toast("Войдите в аккаунт, чтобы синхронизировать"); return; }
    try{ setSync("dirty");
      const r=await ACCT.api("/vault",{method:"GET"});
      if(r.status===204){ SRV.baseUpdatedAt=null; await SRV.push(manual); return; }
      if(!r.ok) throw new Error("vault get "+r.status);
      const s=await r.json(); const ahead=await SRV.applyServer(SRV._env(s)); SRV.baseUpdatedAt=s.updatedAt;
      if(ahead) await SRV.push(false);
      setSync("ok"); if(manual)toast("Синхронизировано");
    }catch(e){ setSync("err"); if(manual)toast("Ошибка синхронизации"); console.warn(e); }
  },
  async forcePull(){ SRV.baseUpdatedAt=null; return SRV.syncNow(true); },
};

/* ---------- Оформление: темы и акценты (пункт 14) ---------- */
function applyTheme(){
  let theme="auto", accent="gold";
  try{ theme=localStorage.getItem(LS_THEME)||"auto"; accent=localStorage.getItem(LS_ACCENT)||"gold"; }catch(e){}
  const dark = theme==="dark" || (theme==="auto" && window.matchMedia && matchMedia("(prefers-color-scheme:dark)").matches);
  const el=document.documentElement;
  el.setAttribute("data-theme", dark?"dark":"light");
  el.setAttribute("data-accent", accent);
  const tc=document.querySelector('meta[name="theme-color"]'); if(tc) tc.setAttribute("content", dark?"#0E1621":"#EEF2F7");
}
let __autoThemeSet=false;
function watchAutoTheme(){
  if(__autoThemeSet || !window.matchMedia) return; __autoThemeSet=true;
  const mq=matchMedia("(prefers-color-scheme:dark)");
  const h=()=>{ let t="auto"; try{t=localStorage.getItem(LS_THEME)||"auto";}catch(e){} if(t==="auto") applyTheme(); };
  try{ mq.addEventListener("change",h); }catch(e){ try{mq.addListener(h);}catch(_){} }
}
let __shrinkSet=false;
function setupScrollShrink(){
  if(__shrinkSet) return; __shrinkSet=true;
  let last=0, ticking=false;
  window.addEventListener("scroll",()=>{
    if(ticking) return; ticking=true;
    (window.requestAnimationFrame||function(f){setTimeout(f,16);})(()=>{
      const y=window.scrollY||document.documentElement.scrollTop||0;
      const el=document.getElementById("bottomnav");
      if(el && isMobile()){
        if(y>60 && y>last+2) el.classList.add("min");
        else if(y<last-2 || y<=8) el.classList.remove("min");
      }
      last=y; ticking=false;
    });
  },{passive:true});
}

  async function trySubmit(codeStr){

      state = migrate(obj); if(!state.__meta||!Object.keys(state.__meta).length) buildMetaBaseline(state); __lastSaved=_clone(state); save(false);
      try{localStorage.setItem(LS_GATE,"1");}catch(e){}
      g.classList.remove("show"); bootApp();
    }catch(err){ CRYPT.pass=null; CRYPT.keyCache={}; ok.disabled=false; fail(); }
  }
  ok.onclick=()=>trySubmit(inp.value); inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();trySubmit(inp.value);} });
  if(faceEnc){
    const fb=box.querySelector("#gfaceEnc");
    const runFace=async()=>{ try{ await faceIdUnlock(); const code=_deobf(localStorage.getItem(LS_ENCFACE)); if(!code) throw 0; await trySubmit(code); }catch(e){} };
    if(fb) fb.onclick=runFace;
    faceIdAvailable().then(av=>{ if(av) runFace(); });
  }
  setTimeout(()=>inp.focus(),150);
}

function bufToB64(buf){ return btoa(String.fromCharCode.apply(null,new Uint8Array(buf))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function b64ToBuf(b){ b=b.replace(/-/g,"+").replace(/_/g,"/"); const s=atob(b); const a=new Uint8Array(s.length); for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i); return a.buffer; }
async function faceIdAvailable(){ try{ return !!window.PublicKeyCredential && await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); }catch(e){ return false; } }
async function faceIdRegister(){
  const cred=await navigator.credentials.create({publicKey:{
    challenge:crypto.getRandomValues(new Uint8Array(32)),
    rp:{name:"Заметки",id:location.hostname},
    user:{id:crypto.getRandomValues(new Uint8Array(16)),name:"u",displayName:"u"},
    pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],
    authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",residentKey:"preferred"},
    timeout:60000,attestation:"none"}});
  localStorage.setItem(LS_FACEID,bufToB64(cred.rawId)); return true;
}
async function faceIdUnlock(){
  const id=localStorage.getItem(LS_FACEID); if(!id) throw new Error("no cred");
  await navigator.credentials.get({publicKey:{
    challenge:crypto.getRandomValues(new Uint8Array(32)),
    allowCredentials:[{type:"public-key",id:b64ToBuf(id)}],
    userVerification:"required",timeout:60000,rpId:location.hostname}});
  return true;
}
