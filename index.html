<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#EEF2F7">
<meta name="apple-mobile-web-app-title" content="Заметки">
<title>Заметки</title>
<style>
:root{
  --bg:#EEF2F7; --bg2:#FFFFFF; --panel:#FFFFFF; --panel2:#F1F5F9;
  --line:#E4EAF1; --line2:#D2DBE6;
  --ink:#1E2B3A; --ink2:#566472; --ink3:#8A98A7;
  --gold:#C68A12; --gold2:#AD7810;
  --teal:#2A8CAE; --green:#2E9E6B; --amber:#D68A1E; --red:#D64541; --violet:#8A6FD0;
  --grp1:#3D7BE0; --grp2:#2494B0; --grp3:#2E9E6B; --grp4:#9163C9; --grp5:#C68A12; --grpI:#33A972;
  --shadow:0 10px 30px rgba(30,45,66,.14);
  --r:16px; --r2:12px; --r3:10px;
  --nav-h:64px; --top-h:56px; --sidebar-w:236px;
  --f-num:"SF Mono",ui-monospace,"Roboto Mono",Menlo,Consolas,monospace;
  font-synthesis:none;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);overflow-x:hidden;max-width:100%;width:100%;touch-action:manipulation;-webkit-text-size-adjust:100%;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
  font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
body{min-height:100dvh}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink);background:var(--panel2);
  border:1px solid var(--line2);border-radius:var(--r3);padding:11px 12px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;font-family:var(--f-num)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* ---------- Layout shell ---------- */
#app{min-height:100dvh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:40;height:var(--top-h);display:flex;align-items:center;gap:10px;
  padding:0 14px;background:linear-gradient(180deg,#FFFFFF,#F6F9FC);border-bottom:1px solid var(--line);
  padding-top:env(safe-area-inset-top);overflow:hidden;max-width:100%;box-sizing:border-box}
.topbar .brand{font-weight:700;letter-spacing:.3px;font-size:15px;display:flex;align-items:center;gap:9px;min-width:0;overflow:hidden;flex-shrink:1}
.topbar .brand span:not(.dot){overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brand .dot{width:11px;height:11px;border-radius:3px;background:var(--gold);box-shadow:0 0 12px rgba(227,178,60,.7);flex:none}
.topbar .month{margin-left:auto;display:flex;align-items:center;gap:4px;background:var(--panel);border:1px solid var(--line2);
  border-radius:999px;padding:4px 6px;flex:none}
.topbar .month button{width:30px;height:30px;border-radius:999px;font-size:17px;color:var(--ink2);flex:none}
.topbar .month .lbl{min-width:96px;text-align:center;font-weight:600;font-size:13px}
.topbar .sync{width:34px;height:34px;border-radius:999px;display:grid;place-items:center;background:var(--panel);
  border:1px solid var(--line2);font-size:15px;position:relative}
.sync .badge{position:absolute;right:-1px;bottom:-1px;width:9px;height:9px;border-radius:999px;background:var(--ink3);border:2px solid var(--bg2)}
.sync.ok .badge{background:var(--green)} .sync.dirty .badge{background:var(--amber)} .sync.err .badge{background:var(--red)}
.me{height:34px;min-width:34px;padding:0 8px;border-radius:999px;display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line2);font-size:15px;font-weight:600;color:var(--ink);flex:none;max-width:120px}
.me .nm{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mbadge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid transparent;white-space:nowrap}
.topbar .month .lbl{cursor:pointer}
.mpick-year{display:flex;align-items:center;justify-content:center;gap:22px;margin:6px 0 16px;font-size:18px;font-weight:800}
.mpick-year button{width:40px;height:40px;border-radius:999px;background:var(--panel2);border:1px solid var(--line2);font-size:18px;color:var(--ink)}
.mp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.mp-cell{padding:15px 0;border-radius:12px;background:var(--panel2);border:1px solid var(--line2);font-weight:600;font-size:14.5px;color:var(--ink)}
.mp-cell.now{border-color:var(--gold);color:var(--gold)}
.mp-cell.sel{background:var(--gold);color:#1a1204;border-color:var(--gold)}

.shell{flex:1;display:flex;min-height:0}
.sidebar{display:none}
.main{flex:1;min-width:0;padding:16px 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 26px);max-width:1180px;margin:0 auto;width:100%}

/* ---------- Bottom nav (mobile) ---------- */
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:45;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);background:linear-gradient(180deg,#FFFFFF,#F6F9FC);border-top:1px solid var(--line);
  display:flex;align-items:stretch;justify-content:space-around}
.bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink3);font-size:10px;font-weight:600}
.bottomnav button .ic{font-size:19px;line-height:1}
.bottomnav button.active{color:var(--gold)}
.bottomnav .more-wrap{position:relative}
.fab{position:fixed;right:18px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);z-index:50;
  width:60px;height:60px;border-radius:999px;background:linear-gradient(145deg,var(--gold),var(--gold2));
  color:#1a1204;font-size:32px;font-weight:400;display:grid;place-items:center;box-shadow:0 10px 26px rgba(227,178,60,.45),0 2px 0 rgba(255,255,255,.25) inset}
.fab:active{transform:scale(.94)}

/* ---------- Cards / typography ---------- */
.page-title{font-size:21px;font-weight:750;letter-spacing:-.2px;margin:2px 0 3px}
.page-sub{color:var(--ink2);font-size:13px;margin-bottom:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
.card h3{margin:0 0 12px;font-size:14px;font-weight:700;letter-spacing:.2px;color:var(--ink);display:flex;align-items:center;gap:8px}
.card h3 .tag{margin-left:auto;font-size:11px;color:var(--ink3);font-weight:600}
.eyebrow{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:9px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
.muted{color:var(--ink2)} .dim{color:var(--ink3)}
.right{text-align:right} .center{text-align:center}
.row{display:flex;align-items:center;gap:10px}
.spacer{flex:1}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:var(--panel2);border:1px solid var(--line2)}
.pill.g{color:var(--green);border-color:rgba(63,176,123,.35);background:rgba(63,176,123,.10)}
.pill.a{color:var(--amber);border-color:rgba(224,166,60,.35);background:rgba(224,166,60,.10)}
.pill.r{color:var(--red);border-color:rgba(229,84,78,.4);background:rgba(229,84,78,.12)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--panel2);border:1px solid var(--line2);
  border-radius:var(--r3);padding:10px 14px;font-weight:600;font-size:14px;color:var(--ink)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:linear-gradient(145deg,var(--gold),var(--gold2));color:#1a1204;border:none}
.btn.ghost{background:transparent}
.btn.sm{padding:7px 11px;font-size:13px;border-radius:9px}
.btn.danger{color:var(--red);border-color:rgba(229,84,78,.4)}
.btn.block{width:100%}
.iconbtn{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;background:var(--panel2);border:1px solid var(--line2);font-size:16px;flex:none}
.chiprow{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chiprow::-webkit-scrollbar{display:none}
.chip{flex:none;padding:8px 13px;border-radius:999px;background:var(--panel2);border:1px solid var(--line2);font-size:13px;font-weight:600;color:var(--ink2);white-space:nowrap}
.chip.active{background:rgba(227,178,60,.14);border-color:var(--gold);color:var(--gold)}

/* KPI */
.kpi{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--r2);padding:13px 14px}
.kpi .k-lbl{font-size:11px;color:var(--ink3);font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.kpi .k-val{font-size:22px;font-weight:750;margin-top:5px;letter-spacing:-.5px}
.kpi .k-sub{font-size:12px;color:var(--ink2);margin-top:3px}
.k-val.pos{color:var(--green)} .k-val.neg{color:var(--red)} .k-val.gold{color:var(--gold)}

/* progress / meters */
.meter{height:9px;border-radius:999px;background:var(--panel2);overflow:hidden;border:1px solid var(--line)}
.meter>span{display:block;height:100%;border-radius:999px;background:var(--green);transition:width .5s ease}
.meter.warn>span{background:var(--amber)} .meter.bad>span{background:var(--red)}
.linrow{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:6px}

/* list rows */
.lrow{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line)}
.lrow:last-child{border-bottom:none}
.lrow .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:17px;flex:none;background:var(--panel2)}
.lrow .t1{font-weight:600;font-size:14px} .lrow .t2{font-size:12px;color:var(--ink3);margin-top:1px}
.lrow .amt{margin-left:auto;font-weight:700;text-align:right;white-space:nowrap}
.amt.exp{color:var(--ink)} .amt.inc{color:var(--green)}

table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;color:var(--ink3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px 8px;border-bottom:1px solid var(--line2)}
.tbl td{padding:10px 8px;border-bottom:1px solid var(--line)}
.tbl tr:last-child td{border-bottom:none}
.tbl .right{text-align:right}

/* Sheet / modal */
.scrim{position:fixed;inset:0;background:rgba(24,34,47,.42);backdrop-filter:blur(3px);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--bg2);border-top-left-radius:22px;border-top-right-radius:22px;
  border:1px solid var(--line);border-bottom:none;padding:8px 18px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1),opacity .2s,visibility .2s;max-height:92dvh;overflow-y:auto;box-shadow:var(--shadow);
  opacity:0;visibility:hidden;pointer-events:none}
.sheet.show{transform:translateY(0);opacity:1;visibility:visible;pointer-events:auto}
.sheet .grab{width:40px;height:4px;border-radius:999px;background:var(--line2);margin:8px auto 12px}
.sheet h3{margin:0 0 14px;font-size:18px;font-weight:750}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--ink2);font-weight:600;margin-bottom:6px}
.seg{display:flex;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;padding:9px;border-radius:8px;font-weight:600;font-size:13px;color:var(--ink2)}
.seg button.active{background:var(--gold);color:#1a1204}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{padding:9px 12px;border-radius:10px;background:var(--panel2);border:1px solid var(--line2);font-size:13px;font-weight:600;color:var(--ink2)}
.opt.active{border-color:var(--gold);color:var(--gold);background:rgba(227,178,60,.12)}
.amount-big{font-size:34px;font-weight:750;text-align:center;letter-spacing:-1px;padding:6px;background:transparent;border:none;border-bottom:2px solid var(--line2);border-radius:0}
.amount-big:focus{border-color:var(--gold)}
.sheet-sticky{position:sticky;top:0;z-index:4;background:var(--bg2);margin:0 -18px 12px;padding:2px 18px 12px;box-shadow:0 8px 12px -10px rgba(0,0,0,.45)}
.sheet-sticky h3{margin:2px 0 12px}

.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(var(--nav-h) + 30px);z-index:80;
  background:#22303F;color:#F4F7FA;border:1px solid var(--line2);border-radius:12px;padding:11px 16px;font-size:13px;font-weight:600;
  box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:30px 16px;color:var(--ink3)}
.empty .big{font-size:34px;margin-bottom:8px;opacity:.6}
.hidden{display:none!important}
/* --- экран-заглушка / блокировка --- */
#app{visibility:hidden}
#gate{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;align-items:center;justify-content:center;padding:24px}
#gate.show{display:flex}
#gate .gbox{width:100%;max-width:300px;display:flex;flex-direction:column;gap:14px;align-items:center}
#gate input{text-align:center;font-size:22px;letter-spacing:2px;padding:15px;border-radius:12px;background:var(--panel2);border:1px solid var(--line2);width:100%}
#gate .gbtn2{width:100%;max-width:240px;padding:15px;border-radius:12px;background:var(--gold);color:#fff;border:none;font-size:17px;font-weight:700;cursor:pointer}
#gate .gver{font-size:11px;color:var(--ink3);opacity:.65;margin-top:10px}
#gate .gbtn{width:46px;height:46px;border-radius:999px;background:var(--panel2);border:1px solid var(--line2);display:grid;place-items:center;font-size:20px;color:var(--ink2)}
#gate .gface{font-size:14px;color:var(--ink3);background:none;border:none;text-decoration:underline}
#gate.shake .gbox{animation:shk .35s}
#gate .gmsg{font-size:13px;color:var(--red);min-height:16px;text-align:center;margin-top:-6px}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}
.donut-wrap{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.legend{flex:1;min-width:160px;display:flex;flex-direction:column;gap:7px}
.legend .li{display:flex;align-items:center;gap:8px;font-size:13px}
.legend .sw{width:10px;height:10px;border-radius:3px;flex:none}
.legend .lv{margin-left:auto;font-weight:600}
.divider{height:1px;background:var(--line);margin:14px 0}
.warnbox{background:rgba(229,84,78,.08);border:1px solid rgba(229,84,78,.3);border-radius:12px;padding:12px 14px;font-size:13px;color:#B23A36;margin-bottom:12px}
.okbox{background:rgba(63,176,123,.08);border:1px solid rgba(63,176,123,.3);border-radius:12px;padding:12px 14px;font-size:13px;color:#1F7A50;margin-bottom:12px}
.infobox{background:rgba(79,176,206,.07);border:1px solid rgba(79,176,206,.28);border-radius:12px;padding:12px 14px;font-size:13px;color:#276B86;margin-bottom:12px}
small.hint{color:var(--ink3);font-size:11.5px}

/* ---------- Desktop / tablet ---------- */
@media(min-width:900px){
  .topbar{height:60px;padding:0 22px}
  .bottomnav,.fab{display:none}
  .shell{}
  .sidebar{display:flex;flex-direction:column;width:var(--sidebar-w);flex:none;background:linear-gradient(180deg,#FFFFFF,#F4F7FB);
    border-right:1px solid var(--line);padding:14px 12px;position:sticky;top:60px;height:calc(100dvh - 60px);overflow-y:auto;gap:3px}
  .sidebar .navi{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;color:var(--ink2);font-weight:600;font-size:14px}
  .sidebar .navi .ic{font-size:18px;width:22px;text-align:center}
  .sidebar .navi.active{background:rgba(227,178,60,.12);color:var(--gold)}
  .sidebar .navi:hover:not(.active){background:var(--panel2)}
  .sidebar .sgroup{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);font-weight:700;padding:14px 13px 6px}
  .sidebar .desk-add{margin:6px 4px 10px}
  .main{padding:24px 28px 60px}
  .g2{grid-template-columns:repeat(2,1fr)} .dg3{grid-template-columns:repeat(3,1fr)} .dg4{grid-template-columns:repeat(4,1fr)}
  .sheet{left:50%;right:auto;top:50%;bottom:auto;transform:translate(-50%,-46%) scale(.98);width:520px;max-width:94vw;
    border-radius:20px;border:1px solid var(--line);max-height:88dvh}
  .sheet.show{transform:translate(-50%,-50%) scale(1)}
  .sheet .grab{display:none}
}
@media(min-width:900px) and (max-width:1200px){ .dg4{grid-template-columns:repeat(2,1fr)} }
@media(max-width:400px){ .g4{grid-template-columns:repeat(2,1fr)} .k-val{font-size:20px} }
@media(max-width:600px){
  .topbar{gap:6px;padding-left:10px;padding-right:10px}
  .topbar .brand span:not(.dot){display:none}
  .topbar .month{margin-left:auto}
  .topbar .month .lbl{min-width:70px;font-size:12.5px}
  .topbar .month button{width:26px;height:26px;font-size:16px}
  .me{padding:0 7px}
  .me .nm{display:none}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand"><span class="dot"></span><span>Финдиректор</span></div>
    <div class="month" id="monthNav">
      <button id="mPrev" aria-label="Предыдущий месяц">‹</button>
      <div class="lbl num" id="mLbl">—</div>
      <button id="mNext" aria-label="Следующий месяц">›</button>
    </div>
    <button class="me" id="meBtn" title="Кто ведёт учёт"><span id="meIco">👤</span></button>
    <button class="sync" id="syncBtn" title="Синхронизация"><span id="syncIco">☁</span><span class="badge"></span></button>
  </div>
  <div class="shell">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="view"></main>
  </div>
  <nav class="bottomnav" id="bottomnav"></nav>
  <button class="fab" id="fab" aria-label="Добавить операцию">+</button>
</div>
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>
<div id="gate"><div class="gbox" id="gbox"></div></div>
<script>
/* ============================================================
   Семейная финансовая ERP — single-file app (vanilla JS)
   Данные: localStorage (автосохранение) + Экспорт/Импорт + Dropbox sync (PKCE)
   ============================================================ */
"use strict";
/* --- ранняя диагностика: маркер загрузки + вывод ошибок на экран --- */
(function(){ try{
  var _v=document.getElementById("view");
  if(_v) _v.innerHTML='<div style="padding:24px;color:#9FB2C0;font:15px system-ui">Загрузка…</div>';
  window.onerror=function(msg,src,line,col,err){
    var v=document.getElementById("view"), a=document.getElementById("app"), g=document.getElementById("gate");
    if(a) a.style.visibility="visible"; if(g) g.classList.remove("show");
    if(v) v.innerHTML='<div style="padding:22px;color:#E5544E;font:14px/1.5 system-ui;word-break:break-word">'+
      '<b style="font-size:16px">Не удалось запустить приложение</b><br><br>'+
      '<span style="color:#E9EFF4">'+String(msg)+'</span><br>'+
      '<span style="color:#6C8092">строка '+line+':'+col+'</span><br><br>'+
      '<span style="color:#9FB2C0;white-space:pre-wrap">'+String(err&&err.stack||"").slice(0,600)+'</span></div>';
    return false;
  };
}catch(e){} })();
const LS_KEY = "famfin.v1";
const LS_DBX = "famfin.dbx";
const LS_ME  = "famfin.me";   // текущий участник — локально на устройстве, НЕ синхронизируется
const LS_GATE= "famfin.gate"; // заглушка пройдена на этом браузере
const LS_FACEID="famfin.faceid"; // id ключа Face ID для этого браузера
const LS_ENCFACE="famfin.encface"; // код шифрования, хранимый на устройстве для входа по Face ID

function simpleHash(s){ let h=5381>>>0,h2=52711>>>0; for(let i=0;i<s.length;i++){const c=s.charCodeAt(i); h=(((h<<5)+h)+c)>>>0; h2=(((h2<<5)+h2)^c)>>>0;} return h.toString(16).padStart(8,"0")+h2.toString(16).padStart(8,"0"); }

/* ---------- money / dates ---------- */
function fmt(n,opt={}){
  n = Math.round(Number(n)||0);
  const s = Math.abs(n).toLocaleString("ru-RU");
  const sign = n<0?"−":(opt.plus&&n>0?"+":"");
  return sign+s+(opt.bare?"":" "+CUR);
}
function fmtK(n){ n=Number(n)||0; const a=Math.abs(n);
  if(a>=1e6) return (n/1e6).toLocaleString("ru-RU",{maximumFractionDigits:2})+" млн";
  if(a>=1e3) return (n/1e3).toLocaleString("ru-RU",{maximumFractionDigits:0})+" тыс";
  return fmt(n,{bare:true});
}
function pct(n){ return (Math.round((Number(n)||0)*1000)/10).toLocaleString("ru-RU")+"%"; }
const MONTHS_RU=["январь","февраль","март","апрель","май","июнь","июль","август","сентябрь","октябрь","ноябрь","декабрь"];
const MONTHS_RU_SHORT=["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
function ym(d){ const x=new Date(d); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0"); }
function ymLabel(k){ const [y,m]=k.split("-").map(Number); return MONTHS_RU[m-1][0].toUpperCase()+MONTHS_RU[m-1].slice(1)+" "+y; }
function ymShort(k){ const [y,m]=k.split("-").map(Number); return MONTHS_RU_SHORT[m-1]+" "+String(y).slice(2); }
function addMonths(k,n){ let [y,m]=k.split("-").map(Number); m=m-1+n; y+=Math.floor(m/12); m=((m%12)+12)%12; return y+"-"+String(m+1).padStart(2,"0"); }
function monthsDiff(a,b){ const [ay,am]=a.split("-").map(Number),[by,bm]=b.split("-").map(Number); return (by-ay)*12+(bm-am); }
function todayISOdate(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

let __encEnv=null;

function load(){
  try{ const raw=localStorage.getItem(LS_KEY); if(raw){ const s=JSON.parse(raw); if(s&&s.__enc){ __encEnv=s; return seedState(); } return migrate(s);} }catch(e){}
  const s=seedState(); try{localStorage.setItem(LS_KEY,JSON.stringify(s));}catch(e){} return s;
}
function migrate(s){ s.freq=s.freq||{}; s.members=s.members||[]; s.lock=s.lock||{enabled:false,codeHash:null}; s.snapshots=s.snapshots||{}; s.incomePlans=s.incomePlans||{}; s.goals=s.goals||[]; s.recurring=s.recurring||[]; s.netWorthHistory=s.netWorthHistory||[]; sanitizeState(s); return s; }
let saveTimer=null, dbxTimer=null, __lastSaved=null;
async function persistLocal(){
  try{ const str = CRYPT.on ? await CRYPT.wrap(state) : JSON.stringify(state); localStorage.setItem(LS_KEY, str); }
  catch(e){ toast("Не удалось сохранить локально"); }
}
function save(pushCloud=true){
  stampChanges();          // проставить метки времени на изменённые записи
  recomputeUpdatedAt();    // общий updatedAt = самая свежая метка (для сравнения версий)
  if(CRYPT.on){ persistLocal(); }
  else { try{ localStorage.setItem(LS_KEY,JSON.stringify(state)); }catch(e){ toast("Не удалось сохранить локально"); } }
  if(pushCloud && DBX.linked){ setSync("dirty"); clearTimeout(dbxTimer); dbxTimer=setTimeout(()=>DBX.syncNow(false),1500); }
}

/* ============================================================
   ДВИЖОК СЛИЯНИЯ (record-level merge с надгробиями)
   Каждая запись/ключ помечается меткой изменения (u) и удаления (d).
   При синхронизации состояния сливаются по записям, а не «весь файл».
   Заложено расширяемо: позже можно нарастить до пофайлового журнала.
   ============================================================ */
const SYNC_COLLS = {
  txns:{type:'array'}, assets:{type:'array'}, liabilities:{type:'array'},
  incomeSources:{type:'array'}, categories:{type:'array'}, subcategories:{type:'array'},
  groups:{type:'array'}, members:{type:'array'}, goals:{type:'array'}, recurring:{type:'array'},
  plans:{type:'map'}, incomePlans:{type:'map'}, snapshots:{type:'map'}, freq:{type:'map'},
  netWorthHistory:{type:'arraykey', key:'date'},
  settings:{type:'scalar'}, lock:{type:'scalar'}
};
const _clone=x=>JSON.parse(JSON.stringify(x));
const _deepEq=(a,b)=>JSON.stringify(a)===JSON.stringify(b);
const _maxs=(a,b)=>((a||"")>(b||"")?(a||""):(b||""));
function _idx(arr,keyf){ const o={}; (arr||[]).forEach(r=>{ const k=keyf(r); if(k!=null) o[k]=r; }); return o; }
function buildMetaBaseline(s){
  const now=s.updatedAt||nowISO(); const M={};
  for(const [coll,cfg] of Object.entries(SYNC_COLLS)){
    const m=M[coll]={u:{},d:{}};
    if(cfg.type==='array'||cfg.type==='arraykey'){ const kf=cfg.type==='array'?(r=>r.id):(r=>r[cfg.key]); (s[coll]||[]).forEach(r=>{ const k=kf(r); if(k!=null)m.u[k]=now; }); }
    else if(cfg.type==='map'){ for(const k in (s[coll]||{})) m.u[k]=now; }
    else { if(s[coll]!=null) m.u["_"]=now; }
  }
  s.__meta=M; return s;
}
function stampChanges(){
  state.__meta=state.__meta||{};
  if(!__lastSaved){ __lastSaved=_clone(state); return; }
  const now=nowISO(), prev=__lastSaved, cur=state;
  for(const [coll,cfg] of Object.entries(SYNC_COLLS)){
    const m=cur.__meta[coll]=cur.__meta[coll]||{u:{},d:{}}; m.u=m.u||{}; m.d=m.d||{};
    if(cfg.type==='array'||cfg.type==='arraykey'){
      const kf=cfg.type==='array'?(r=>r.id):(r=>r[cfg.key]);
      const pv=_idx(prev[coll],kf), cv=_idx(cur[coll],kf);
      for(const k in cv){ if(!(k in pv)||!_deepEq(pv[k],cv[k])){ m.u[k]=now; if(m.d[k])delete m.d[k]; } }
      for(const k in pv){ if(!(k in cv)) m.d[k]=now; }
    } else if(cfg.type==='map'){
      const pv=prev[coll]||{}, cv=cur[coll]||{};
      for(const k in cv){ if(!(k in pv)||!_deepEq(pv[k],cv[k])){ m.u[k]=now; if(m.d[k])delete m.d[k]; } }
      for(const k in pv){ if(!(k in cv)) m.d[k]=now; }
    } else { if(!_deepEq(prev[coll],cur[coll])) m.u["_"]=now; }
  }
  __lastSaved=_clone(cur);
}
function recomputeUpdatedAt(){
  let mx=""; const M=state.__meta||{};
  for(const coll in M){ for(const t of ['u','d']){ const o=M[coll][t]||{}; for(const k in o){ if(o[k]>mx)mx=o[k]; } } }
  state.updatedAt = mx || state.updatedAt || nowISO();
}
function mergeStates(A,B){
  const R=_clone(A); R.__meta={};
  const MA=A.__meta||{}, MB=B.__meta||{};
  for(const [coll,cfg] of Object.entries(SYNC_COLLS)){
    const ma=MA[coll]||{u:{},d:{}}, mb=MB[coll]||{u:{},d:{}};
    const uA=ma.u||{},dA=ma.d||{},uB=mb.u||{},dB=mb.d||{};
    const rm=R.__meta[coll]={u:{},d:{}};
    const allKeys=new Set([...Object.keys(uA),...Object.keys(dA),...Object.keys(uB),...Object.keys(dB)]);
    if(cfg.type==='array'||cfg.type==='arraykey'){
      const kf=cfg.type==='array'?(r=>r.id):(r=>r[cfg.key]);
      const ia=_idx(A[coll],kf), ib=_idx(B[coll],kf);
      Object.keys(ia).forEach(k=>allKeys.add(k)); Object.keys(ib).forEach(k=>allKeys.add(k));
      const out=[];
      allKeys.forEach(k=>{
        const alive=_maxs(uA[k],uB[k]), dead=_maxs(dA[k],dB[k]);
        if(alive) rm.u[k]=alive; if(dead) rm.d[k]=dead;
        if(dead && dead>=alive) return; // удалено
        let rec = ((uA[k]||"")>=(uB[k]||"") && ia[k]!==undefined) ? ia[k] : (ib[k]!==undefined?ib[k]:ia[k]);
        if(rec!=null) out.push(rec);
      });
      R[coll]=out;
    } else if(cfg.type==='map'){
      const oa=A[coll]||{}, ob=B[coll]||{};
      Object.keys(oa).forEach(k=>allKeys.add(k)); Object.keys(ob).forEach(k=>allKeys.add(k));
      const out={};
      allKeys.forEach(k=>{
        const alive=_maxs(uA[k],uB[k]), dead=_maxs(dA[k],dB[k]);
        if(alive) rm.u[k]=alive; if(dead) rm.d[k]=dead;
        if(dead && dead>=alive) return;
        out[k] = ((uA[k]||"")>=(uB[k]||"") && (k in oa)) ? oa[k] : ((k in ob)?ob[k]:oa[k]);
      });
      R[coll]=out;
    } else {
      const a=uA["_"]||"", b=uB["_"]||""; if(_maxs(a,b)) rm.u["_"]=_maxs(a,b);
      R[coll] = a>=b ? A[coll] : B[coll];
    }
  }
  if(Array.isArray(R.netWorthHistory)) R.netWorthHistory.sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  return R;
}

function groupSpend(k,gid){ return txnsOfMonth(k).filter(t=>t.type==="expense" && (byId(state.categories,t.categoryId)||{}).groupId===gid).reduce((a,t)=>a+(+t.amount||0),0); }

const totalAssets=()=>state.assets.reduce((a,x)=>a+(+x.value||0),0);
const liquidAssets=()=>state.assets.filter(a=>a.liquid).reduce((a,x)=>a+(+x.value||0),0);
function setLiquidCash(v){
  v=Math.max(0,Math.round(+v||0));
  const liq=state.assets.filter(a=>a.liquid);
  if(liq.length===1){ liq[0].value=v; }
  else if(liq.length===0){ if(v>0) state.assets.push({id:uid(),name:"Счета и наличные",kind:"кэш",value:v,liquid:true}); }
  else { const others=liq.slice(1).reduce((a,x)=>a+(+x.value||0),0); liq[0].value=Math.max(0,v-others); }
}
const totalLiab=()=>state.liabilities.reduce((a,x)=>a+(+x.balance||0),0);
const netWorth=()=>totalAssets()-totalLiab();
const totalMinPayment=()=>state.liabilities.reduce((a,x)=>a+(+x.minPayment||0),0);
const expectedIncome=()=>state.incomeSources.reduce((a,x)=>a+(+x.amount||0),0);
function incomeSrcPlanned(k,sid){ const p=state.incomePlans[k]; if(p && (sid in p)) return +p[sid]||0; const s=incomeSrcById(sid); return s?+s.amount||0:0; }
function plannedIncome(k){ const p=state.incomePlans[k]; if(p) return Object.values(p).reduce((a,x)=>a+(+x||0),0); return expectedIncome(); }
function monthIncomeBySource(k,sid){ return txnsOfMonth(k).filter(t=>t.type==="income"&&t.categoryId===sid).reduce((a,t)=>a+(+t.amount||0),0); }
function incomeForMonth(k){ const real=monthIncome(k); return real>0?real:plannedIncome(k); }

/* ---------- закрытие месяца ---------- */
function realMonth(){ return ym(new Date()); }
function firstDataMonth(){ const ms=state.txns.map(t=>ym(t.date)).filter(Boolean).sort(); return ms.length?ms[0]:addMonths(realMonth(),-1); }
function unclosedMonths(){
  const end=addMonths(realMonth(),-1);
  const haveBal=state.assets.length||state.liabilities.length;
  let start=firstDataMonth(); if(!state.txns.length){ if(!haveBal) return []; start=end; }
  const res=[]; let m=start,g=0;
  while(m<=end && g<240){ if(!(state.snapshots||{})[m]) res.push(m); m=addMonths(m,1); g++; }
  return res;
}
function monthToClose(){ const u=unclosedMonths(); return u.length?u[0]:null; }
function isClosed(k){ return !!(state.snapshots||{})[k]; }
function suggestBalance(x){ const b=+x.balance||0,r=+x.rate||0,p=+x.minPayment||0; return Math.max(0,Math.round(b + b*r/12 - p)); }

function metrics(k){
  const snap=(state.snapshots||{})[k];
  if(snap){
    return {
      income:snap.income, expense:snap.expense, capital:snap.capital,
      balance: snap.income - snap.expense - snap.capital,
      savingsRate: snap.savingsRate, debtLoad: snap.debtLoad, fixedShare: snap.fixedShare,
      freeCashFlow: snap.income - snap.expense,
      cushionMonths: snap.cushionMonths, netWorth: snap.net, closed:true
    };
  }
  const inc=incomeForMonth(k), exp=monthExpense(k), cap=monthCapital(k);
  const debtPay=totalMinPayment();
  const fixed=fixedSpend(k);
  const debtPrincipal=Math.max(0,debtPay - liabInterestMonthly());
  const savingsFlow = cap + debtPrincipal; // капитал + тело долга
  return {
    income:inc, expense:exp, capital:cap,
    balance: inc-exp-cap,
    savingsRate: inc>0? savingsFlow/inc : 0,
    debtLoad: inc>0? debtPay/inc : 0,
    fixedShare: inc>0? (fixed+liabInterestMonthly())/inc : 0,
    freeCashFlow: inc - exp,
    cushionMonths: fixed>0? liquidAssets()/ (fixed||1) : (liquidAssets()>0?99:0),
    netWorth: netWorth(), closed:false
  };
}
function liabInterestMonthly(){ return state.liabilities.reduce((a,x)=>a+((+x.balance||0)*(+x.rate||0)/12),0); }

/* ---------- UI atoms ---------- */
let toastTimer=null;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200); }
function h(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstChild; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function safeGlyph(x){ return String(x==null?"":x).replace(/[<>"'&]/g,"").slice(0,12); }
function safeColor(x){ x=String(x==null?"":x).trim(); return (/^#[0-9a-fA-F]{3,8}$/.test(x)||/^var\(--[a-z0-9-]+\)$/.test(x))?x:""; }
function sanitizeState(s){
  try{
    (s.members||[]).forEach(m=>{ m.emoji=safeGlyph(m.emoji)||"👤"; m.color=safeColor(m.color)||"#3D7BE0"; });
    (s.categories||[]).forEach(c=>{ if(c.icon!=null) c.icon=safeGlyph(c.icon)||"•"; });
    (s.groups||[]).forEach(g=>{ if(g.color!=null){ const c=safeColor(g.color); if(!c) g.color="var(--ink3)"; } });
  }catch(e){}
  return s;
}

/* ---------- sheet system ---------- */
const scrim=document.getElementById("scrim"), sheetEl=document.getElementById("sheet");
let sheetOpen=false, vvHandler=null;
function isMobile(){ return window.matchMedia("(max-width:899px)").matches; }
function fitSheet(){
  if(!window.visualViewport) return;
  if(!isMobile()){ sheetEl.style.maxHeight=""; sheetEl.style.bottom=""; return; }
  const vv=window.visualViewport;
  const kb=Math.max(0, window.innerHeight - vv.height - vv.offsetTop); // высота клавиатуры
  sheetEl.style.bottom = kb + "px";               // поднять окно над клавиатурой
  sheetEl.style.maxHeight = (vv.height - 6) + "px"; // вписать в видимую область
}
function openSheet(innerHTML,onMount){
  sheetEl.innerHTML='<div class="grab"></div>'+innerHTML;
  scrim.classList.add("show"); sheetEl.classList.add("show"); sheetOpen=true;
  document.body.style.overflow="hidden";
  if(window.visualViewport){ vvHandler=()=>fitSheet();
    window.visualViewport.addEventListener("resize",vvHandler);
    window.visualViewport.addEventListener("scroll",vvHandler); }
  (window.requestAnimationFrame||function(f){setTimeout(f,16);})(fitSheet); setTimeout(fitSheet,60); setTimeout(fitSheet,300);
  if(onMount) onMount(sheetEl);
}
function closeSheet(){
  scrim.classList.remove("show"); sheetEl.classList.remove("show"); sheetOpen=false; document.body.style.overflow="";
  if(window.visualViewport && vvHandler){ window.visualViewport.removeEventListener("resize",vvHandler); window.visualViewport.removeEventListener("scroll",vvHandler); vvHandler=null; }
  sheetEl.style.maxHeight=""; sheetEl.style.bottom="";
}
scrim.addEventListener("click",closeSheet);

function performClose(k){
  const inc=incomeForMonth(k), exp=monthExpense(k), cap=monthCapital(k);
  const debtPay=totalMinPayment(), interest=liabInterestMonthly();
  const debtPrincipal=Math.max(0,debtPay-interest);
  const fixed=fixedSpend(k), liquid=liquidAssets();
  state.snapshots=state.snapshots||{};
  state.snapshots[k]={ closedAt:nowISO(), assets:totalAssets(), liab:totalLiab(), net:netWorth(),
    assetsList:JSON.parse(JSON.stringify(state.assets)), liabList:JSON.parse(JSON.stringify(state.liabilities)),
    income:inc, expense:exp, capital:cap, debtPay, interest,
    savingsRate: inc>0?(cap+debtPrincipal)/inc:0,
    debtLoad: inc>0?debtPay/inc:0,
    fixedShare: inc>0?(fixed+interest)/inc:0,
    cushionMonths: fixed>0?liquid/fixed:(liquid>0?99:0), liquid };
  state.netWorthHistory=(state.netWorthHistory||[]).filter(x=>ym(x.date)!==k);
  state.netWorthHistory.push({date:k+"-15T12:00:00.000Z", assets:totalAssets(), liabilities:totalLiab(), net:netWorth()});
  state.netWorthHistory.sort((a,b)=>a.date.localeCompare(b.date));
  save();
}

function frequentCats(type){
  const f=state.freq||{};
  const cats=(type==="income"?incomeCats():expenseCats());
  return cats.slice().sort((a,b)=>(f[b.id]||0)-(f[a.id]||0));
}

      <div class="field"><label>${draft.type==='income'?'Источник дохода':'Категория'}</label><div class="opts">${cats.map(c=>`<button class="opt ${draft.categoryId===c.id?'active':''}" data-cat="${c.id}">${esc(c.icon||'•')} ${esc(c.name)}</button>`).join("")}</div></div>
      ${subs.length?`<div class="field"><label>Подкатегория</label><div class="opts">${subs.map(s=>`<button class="opt ${draft.subId===s.id?'active':''}" data-sub="${s.id}">${esc(s.name)}</button>`).join("")}</div></div>`:''}
      <div class="field"><label>Дата</label><input type="date" id="dt" value="${draft.date}"></div>
      ${state.members.length?`<div class="field"><label>Кто</label><div class="opts">${state.members.map(m=>`<button class="opt ${draft.memberId===m.id?'active':''}" data-who="${m.id}">${esc(m.emoji||'👤')} ${esc(m.name)}</button>`).join("")}</div></div>`:''}
      <div class="field"><label>Комментарий</label><input id="cm" value="${esc(draft.comment||'')}"></div>
      <button class="btn primary block" id="upd" style="padding:13px;margin-top:4px">Сохранить</button>
      <button class="btn danger block" id="del" style="margin-top:8px">Удалить операцию</button>
    `,el=>{
      el.querySelectorAll("[data-type]").forEach(b=>b.onclick=()=>{draft.type=b.dataset.type;draft.categoryId=null;draft.subId=null;render();});
      el.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{draft.categoryId=b.dataset.cat;draft.subId=null;render();});
      el.querySelectorAll("[data-sub]").forEach(b=>b.onclick=()=>{draft.subId=b.dataset.sub;render();});
      el.querySelectorAll("[data-who]").forEach(b=>b.onclick=()=>{draft.memberId=b.dataset.who;el.querySelectorAll("[data-who]").forEach(x=>x.classList.toggle("active",x.dataset.who===draft.memberId));});
      el.querySelector("#upd").onclick=()=>{
        const amount=parseFloat(String(el.querySelector("#amt").value).replace(/\s/g,"").replace(",","."));
        if(!amount||amount<=0){toast("Введите сумму");return;} if(!draft.categoryId){toast("Выберите категорию");return;}
        Object.assign(t,{type:draft.type,amount,categoryId:draft.categoryId,subId:draft.subId,date:el.querySelector("#dt").value,comment:el.querySelector("#cm").value.trim(),memberId:draft.memberId});
        save(); closeSheet(); toast("Сохранено"); render_current();
      };
      el.querySelector("#del").onclick=()=>{ if(confirm("Удалить операцию?")){ state.txns=state.txns.filter(x=>x.id!==id); save(); closeSheet(); toast("Удалено"); render_current(); } };
    });
  };
  render();
}

/* ============================================================
   ROUTER
   ============================================================ */
function render(){ render_current(); }
function render_current(){
  document.getElementById("mLbl").textContent=ymShort(curMonth);
  const mn=document.getElementById("monthNav"); if(mn) mn.style.visibility=(route==="cashflow"||route==="forecast")?"hidden":"visible";
  if(typeof renderMe==="function") renderMe();
  const v=document.getElementById("view"); v.innerHTML="";
  ({today:pgToday,ops:pgOps,plan:pgPlan,fact:pgFact,dash:pgDash,cashflow:pgCashflow,forecast:pgForecast,balance:pgBalance,debts:pgDebts,goals:pgGoals,settings:pgSettings}[route]||pgToday)(v);
}

/* ============================================================
   PAGE: СЕГОДНЯ (светофор)
   ============================================================ */
function pgToday(v){
  const k=curMonth, m=metrics(k);
  const planTotal=planMonthTotal(k);
  const spent=monthExpense(k);
  const variableSpent=groupSpend(k,"g2");
  let statusColor="var(--green)",statusWord="В норме",statusIco="🟢";
  const dayOfMonth=(ym(new Date())===k)?new Date().getDate():15;
  const monthLen=new Date(+k.slice(0,4),+k.slice(5,7),0).getDate();
  const paceExpected= planTotal>0? planTotal*(dayOfMonth/monthLen) : 0;
  if(planTotal>0){ if(spent>planTotal){statusColor="var(--red)";statusWord="Перерасход";statusIco="🔴";}
    else if(spent>paceExpected*1.1){statusColor="var(--amber)";statusWord="Идём быстро";statusIco="🟡";} }
  else { if(m.freeCashFlow<0){statusColor="var(--red)";statusWord="Расход выше дохода";statusIco="🔴";}
    else if(m.debtLoad>0.35){statusColor="var(--amber)";statusWord="Высокая долговая нагрузка";statusIco="🟡";} }
  const leftValue = planTotal>0 ? planTotal-spent : m.income-spent;
  const leftLabel = planTotal>0 ? "Осталось в бюджете месяца" : "Приход минус расход в месяце";

  v.appendChild(h(`<div><div class="page-title">Сегодня</div><div class="page-sub">${ymLabel(k)}${isClosed(k)?' · <span style="color:var(--gold);font-weight:600">месяц закрыт</span>':' · короткий взгляд на семейные финансы'}</div></div>`));

  const mtc=monthToClose();
  if(mtc){ const rb=h(`<div class="warnbox" style="display:flex;align-items:center;gap:10px;background:${tint('var(--gold)',12)};border-color:${tint('var(--gold)',42)};color:var(--ink)">
     <span style="font-size:20px">📌</span>
     <div style="flex:1;font-size:13px">Закройте <b>${ymLabel(mtc)}</b>: обновите остатки по долгам и зафиксируйте капитал за месяц.</div>
     <button class="btn sm" id="doClose" style="flex:none">Закрыть</button></div>`);
    rb.querySelector("#doClose").onclick=()=>openMonthClose(mtc); v.appendChild(rb); }

  const hero=h(`<div class="card" style="background:linear-gradient(160deg,${tint(statusColor,14)},var(--panel));border-color:${tint(statusColor,42)}">
     <div class="row"><div class="eyebrow" style="margin:0">${statusIco} ${statusWord}</div>
       <span class="pill ${m.debtLoad>0.35?'r':(m.debtLoad>0.25?'a':'g')}" style="margin-left:auto">Долговая нагрузка ${pct(m.debtLoad)}</span></div>
     <div class="num" style="font-size:34px;font-weight:800;letter-spacing:-1px;margin:8px 0 2px;color:${leftValue<0?'var(--red)':'var(--ink)'}">${fmt(leftValue)}</div>
     <div class="muted" style="font-size:13px">${leftLabel}</div>
     ${planTotal>0?`<div class="meter ${spent>planTotal?'bad':(spent>paceExpected*1.1?'warn':'')}" style="margin-top:12px"><span style="width:${clamp(planTotal? spent/planTotal*100:0,0,100)}%"></span></div>
       <div class="linrow" style="margin-top:6px"><span class="dim">Потрачено ${fmt(spent)}</span><span class="dim">План ${fmt(planTotal)}</span></div>`:
       `<div class="infobox" style="margin-top:12px;margin-bottom:0">Плановый бюджет на месяц ещё не задан. Задайте цели на 5 лет — система предложит план, из которого сложится этот светофор. <button class="btn sm" style="margin-top:8px" data-nav="goals">Перейти к целям →</button></div>`}
  </div>`);
  v.appendChild(hero);

  v.appendChild(h(`<div class="grid g3">
    ${kpiCard("Доход",fmt(m.income),m.income>0?"":"план "+fmt(plannedIncome(k)),"gold")}
    ${kpiCard("Расход",fmt(spent),"потребление","")}
    ${kpiCard("В капитал",fmt(m.capital),"накопления+долг","pos")}
  </div>`));

  // recurring due
  const due=dueRecurring(k);
  if(due.length){
    const c=h(`<div class="card"><h3>Повторяющиеся платежи <span class="tag">${due.length} ждут подтверждения</span></h3></div>`);
    due.forEach(r=>{ const row=h(`<div class="lrow"><div class="ic">🔁</div><div><div class="t1">${esc(r.label||catName(r.categoryId))}</div><div class="t2">${esc(catName(r.categoryId))} · ${r.day} число</div></div>
       <div class="amt">${fmt(r.amount)}</div><button class="btn sm primary" style="margin-left:10px">Провести</button></div>`);
       row.querySelector("button").onclick=()=>{ const t={id:uid(),type:r.type||"expense",date:k+"-"+String(r.day).padStart(2,"0"),amount:r.amount,categoryId:r.categoryId,subId:r.subId,comment:(r.label||"")+" (авто)",createdAt:nowISO(),fromRecurring:r.id}; state.txns.push(t); save(); toast("Проведено"); render_current(); };
       c.appendChild(row); });
    v.appendChild(c);
  }

  // recent
  const recent=state.txns.slice().sort((a,b)=>(b.date+b.createdAt).localeCompare(a.date+a.createdAt)).slice(0,6);
  const rc=h(`<div class="card"><h3>Последние операции <span class="tag" style="cursor:pointer" data-nav="ops">все →</span></h3></div>`);
  if(!recent.length) rc.appendChild(h(`<div class="empty"><div class="big">📝</div>Пока нет операций.<br>Нажмите ＋, чтобы записать первый расход.</div>`));
  else recent.forEach(t=>rc.appendChild(txnRow(t)));
  v.appendChild(rc);
}
function kpiCard(lbl,val,sub,cls){ return `<div class="kpi"><div class="k-lbl">${esc(lbl)}</div><div class="k-val ${cls||''} num">${val}</div><div class="k-sub">${esc(sub||'')}</div></div>`; }
function txnRow(t){
  const inc=t.type==="income";
  const row=h(`<div class="lrow"><div class="ic" style="background:${tint(catColor(t.categoryId),13)};color:${catColor(t.categoryId)}">${catIcon(t.categoryId)}</div>
    <div style="min-width:0"><div class="t1">${esc(catName(t.categoryId))}${t.subId?' · '+esc(subName(t.subId)):''}</div>
    <div class="t2">${t.memberId?memberBadge(t.memberId)+' · ':''}${esc(fmtDate(t.date))}${t.comment?' · '+esc(t.comment):''}</div></div>
    <div class="amt num ${inc?'inc':'exp'}">${inc?'+':'−'}${fmt(t.amount,{bare:true})}</div></div>`);
  row.onclick=()=>editTxn(t.id); row.style.cursor="pointer"; return row;
}
function fmtDate(d){ const x=new Date(d); return x.getDate()+" "+MONTHS_RU_SHORT[x.getMonth()]; }
function planMonthTotal(k){ const p=state.plans[k]||{}; return Object.values(p).reduce((a,x)=>a+(+x||0),0); }
function dueRecurring(k){ return (state.recurring||[]).filter(r=>r.active!==false).filter(r=>!state.txns.some(t=>t.fromRecurring===r.id&&ym(t.date)===k)); }

/* ============================================================
   PAGE: ОПЕРАЦИИ
   ============================================================ */
let opsFilter={type:null,cat:null,sub:null,member:null,q:""};
function pgOps(v){
  const k=curMonth;
  v.appendChild(h(`<div class="page-title">Операции</div><div class="page-sub">${ymLabel(k)} · вся лента доходов и расходов</div>`));
  const all=txnsOfMonth(k);
  const inc=sumTxns(all,"income"),exp=all.filter(t=>t.type==="expense").reduce((a,t)=>a+ +t.amount,0);
  v.appendChild(h(`<div class="grid g3" style="margin-bottom:12px">
    ${kpiCard("Доходы",fmt(inc),all.filter(t=>t.type==='income').length+" оп.","pos")}
    ${kpiCard("Расходы",fmt(exp),all.filter(t=>t.type==='expense').length+" оп.","")}
    ${kpiCard("Итог",fmt(inc-exp,{plus:true}),"приход − расход",inc-exp>=0?"pos":"neg")}
  </div>`));

  const fbox=h(`<div></div>`);
  // тип
  const typeRow=h(`<div class="chiprow" style="margin-bottom:6px"><button class="chip ${!opsFilter.type?'active':''}" data-t="">Все</button><button class="chip ${opsFilter.type==='income'?'active':''}" data-t="income">↑ Доходы</button><button class="chip ${opsFilter.type==='expense'?'active':''}" data-t="expense">↓ Расходы</button></div>`);
  typeRow.querySelectorAll("[data-t]").forEach(b=>b.onclick=()=>{ opsFilter.type=b.dataset.t||null; opsFilter.cat=null; opsFilter.sub=null; render_current(); });
  fbox.appendChild(typeRow);
  // участники
  if(state.members.length){
    const memRow=h(`<div class="chiprow" style="margin-bottom:6px"><button class="chip ${!opsFilter.member?'active':''}" data-m="">Все участники</button>${state.members.map(m=>`<button class="chip ${opsFilter.member===m.id?'active':''}" data-m="${m.id}">${esc(m.emoji||'👤')} ${esc(m.name)}</button>`).join("")}</div>`);
    memRow.querySelectorAll("[data-m]").forEach(b=>b.onclick=()=>{ opsFilter.member=b.dataset.m||null; render_current(); });
    fbox.appendChild(memRow);
  }
  // категории (с учётом типа)
  const baseForCats=all.filter(t=>!opsFilter.type||t.type===opsFilter.type);
  const usedCats=[...new Set(baseForCats.map(t=>t.categoryId))];
  const catRow=h(`<div class="chiprow" style="margin-bottom:6px"><button class="chip ${!opsFilter.cat?'active':''}" data-c="">Все статьи</button>${usedCats.map(c=>`<button class="chip ${opsFilter.cat===c?'active':''}" data-c="${c}">${esc(catIcon(c))} ${esc(catName(c))}</button>`).join("")}</div>`);
  catRow.querySelectorAll("[data-c]").forEach(b=>b.onclick=()=>{ opsFilter.cat=b.dataset.c||null; opsFilter.sub=null; render_current(); });
  fbox.appendChild(catRow);
  // подкатегории выбранной категории
  if(opsFilter.cat){
    const usedSubs=[...new Set(baseForCats.filter(t=>t.categoryId===opsFilter.cat&&t.subId).map(t=>t.subId))];
    if(usedSubs.length){
      const subRow=h(`<div class="chiprow" style="margin-bottom:6px"><button class="chip ${!opsFilter.sub?'active':''}" data-s="">Все подкатегории</button>${usedSubs.map(sd=>`<button class="chip ${opsFilter.sub===sd?'active':''}" data-s="${sd}">${esc(subName(sd))}</button>`).join("")}</div>`);
      subRow.querySelectorAll("[data-s]").forEach(b=>b.onclick=()=>{ opsFilter.sub=b.dataset.s||null; render_current(); });
      fbox.appendChild(subRow);
    }
  }
  v.appendChild(fbox);
  const search=h(`<div class="field" style="margin:4px 0"><input id="opsQ" placeholder="🔎 Поиск по комментарию…" value="${esc(opsFilter.q)}"></div>`);
  v.appendChild(search);
  search.querySelector("#opsQ").oninput=e=>{opsFilter.q=e.target.value; renderOpsList();};
  const cont=h(`<div class="card" id="opsList"></div>`); v.appendChild(cont);
  function renderOpsList(){
    let l=txnsOfMonth(k).slice().sort((a,b)=>(b.date+(b.createdAt||"")).localeCompare(a.date+(a.createdAt||"")));
    if(opsFilter.type) l=l.filter(t=>t.type===opsFilter.type);
    if(opsFilter.member) l=l.filter(t=>t.memberId===opsFilter.member);
    if(opsFilter.cat) l=l.filter(t=>t.categoryId===opsFilter.cat);
    if(opsFilter.sub) l=l.filter(t=>t.subId===opsFilter.sub);
    if(opsFilter.q) l=l.filter(t=>((t.comment||"")+catName(t.categoryId)+subName(t.subId)).toLowerCase().includes(opsFilter.q.toLowerCase()));
    const box=document.getElementById("opsList"); box.innerHTML="";
    if(!l.length){ box.appendChild(h(`<div class="empty"><div class="big">🗂️</div>Нет операций по фильтру за этот месяц.</div>`)); return; }
    const fi=l.filter(t=>t.type==='income').reduce((a,t)=>a+ +t.amount,0), fe=l.filter(t=>t.type==='expense').reduce((a,t)=>a+ +t.amount,0);
    box.appendChild(h(`<div class="linrow" style="padding:2px 2px 10px;border-bottom:1px solid var(--line);font-size:12px"><span class="dim">Найдено: ${l.length}</span><span class="num dim">${fi?'+'+fmt(fi,{bare:true}):''}${fi&&fe?' · ':''}${fe?'−'+fmt(fe,{bare:true}):''}</span></div>`));
    let lastDate=""; l.forEach(t=>{ if(t.date!==lastDate){ box.appendChild(h(`<div class="eyebrow" style="margin:14px 0 4px">${esc(fullDate(t.date))}</div>`)); lastDate=t.date; } box.appendChild(txnRow(t)); });
  }
  renderOpsList();
}
function fullDate(d){ const x=new Date(d); const wd=["вс","пн","вт","ср","чт","пт","сб"][x.getDay()]; return x.getDate()+" "+MONTHS_RU[x.getMonth()]+", "+wd; }

/* ============================================================
   PAGE: ПЛАН (лимиты по категориям, пустой; заполняется от целей)
   ============================================================ */
function pgPlan(v){
  const k=curMonth; const plan=state.plans[k]||{};
  const total=planMonthTotal(k);
  v.appendChild(h(`<div class="page-title">План месяца</div><div class="page-sub">${ymLabel(k)} · лимиты по категориям</div>`));
  const empty=total===0;
  v.appendChild(h(`<div class="card"><div class="row"><div><div class="eyebrow" style="margin:0">Плановый бюджет</div><div class="num" style="font-size:26px;font-weight:800;margin-top:4px">${fmt(total)}</div></div>
     <div class="row" style="margin-left:auto;gap:8px">
       <button class="btn sm" id="copyPrev">⇦ Из прошлого месяца</button>
       <button class="btn sm primary" id="fromGoals">Собрать из целей</button>
     </div></div>
     ${empty?`<div class="infobox" style="margin-top:12px;margin-bottom:0">Бюджет пуст — это правильный старт. Впишите лимиты вручную ниже, скопируйте прошлый месяц, или нажмите «Собрать из целей»: система разложит доход ${fmt(plannedIncome(k))} по группам так, чтобы ваши цели выполнялись, и покажет, что ужать.</div>`:
       `<div class="linrow" style="margin-top:12px"><span class="dim">Плановый доход ${fmt(plannedIncome(k))}</span><span style="color:${total>plannedIncome(k)?'var(--red)':'var(--green)'}">${total>plannedIncome(k)?'Расходы > дохода на '+fmt(total-plannedIncome(k)):'Свободно '+fmt(plannedIncome(k)-total)}</span></div>`}
  </div>`));
  v.querySelector("#copyPrev").onclick=()=>{ const prev=state.plans[addMonths(k,-1)]; if(!prev||!Object.keys(prev).length){toast("В прошлом месяце плана нет");return;} state.plans[k]=JSON.parse(JSON.stringify(prev)); save(); toast("Скопировано"); render_current(); };
  v.querySelector("#fromGoals").onclick=()=>suggestPlanFromGoals();

  // ---- планирование дохода по источникам ----
  const incCard=h(`<div class="card"><h3><span style="width:9px;height:9px;border-radius:3px;background:var(--grpI);display:inline-block"></span>Доход (план)<span class="tag num">${fmt(plannedIncome(k))}</span></h3>
    <p class="muted" style="font-size:12px;margin:-2px 0 4px">Сколько ждёте с каждого источника в этом месяце. По умолчанию — типовая сумма из «Настройки», меняйте под конкретный месяц.</p></div>`);
  if(!state.incomeSources.length){ incCard.appendChild(h(`<div class="empty" style="padding:14px">Источников дохода нет. Добавьте их в «Настройке».<br><button class="btn sm" style="margin-top:10px" data-nav="settings">В настройку →</button></div>`)); }
  state.incomeSources.forEach(s=>{
    const row=h(`<div class="lrow"><div class="ic" style="background:${tint('var(--grpI)',13)};color:var(--grpI)">💰</div>
      <div class="t1" style="flex:1">${esc(s.name)}</div>
      <input class="num right" style="width:130px;padding:8px 10px" inputmode="numeric" placeholder="0" value="${incomeSrcPlanned(k,s.id)||''}" data-inc="${s.id}"></div>`);
    const inp=row.querySelector("input");
    inp.onchange=()=>{ const val=parseFloat(String(inp.value).replace(/\s/g,"").replace(",","."))||0; state.incomePlans[k]=state.incomePlans[k]||{}; state.incomePlans[k][s.id]=val; save(); render_current(); };
    incCard.appendChild(row);
  });
  v.appendChild(incCard);

  const wirePlan=(row)=>{ const inp=row.querySelector("input"); inp.onchange=()=>{ const val=parseFloat(String(inp.value).replace(/\s/g,"").replace(",","."))||0; const id=inp.dataset.plan; state.plans[k]=state.plans[k]||{}; if(val)state.plans[k][id]=val; else delete state.plans[k][id]; save(); render_current(); }; };
  expenseGroups().forEach(g=>{
    const cats=catsOf(g.id); if(!cats.length)return;
    let gTot=0; cats.forEach(c=>{ const subs=subsOf(c.id); if(subs.length) subs.forEach(su=>gTot+=(+plan[su.id]||0)); else gTot+=(+plan[c.id]||0); });
    const card=h(`<div class="card"><h3><span style="width:9px;height:9px;border-radius:3px;background:${g.color};display:inline-block"></span>${esc(g.name)}<span class="tag num">${fmt(gTot)}</span></h3></div>`);
    cats.forEach(c=>{
      const subs=subsOf(c.id);
      if(subs.length){
        const cTot=subs.reduce((a,su)=>a+(+plan[su.id]||0),0);
        card.appendChild(h(`<div class="linrow" style="margin:12px 0 2px;font-weight:600"><span>${esc(c.icon||'•')} ${esc(c.name)}</span><span class="num dim" style="font-size:12px">${fmt(cTot)}</span></div>`));
        subs.forEach(su=>{
          const row=h(`<div class="lrow" style="padding-left:8px"><div class="ic" style="width:24px;height:24px;font-size:11px;background:${tint(g.color,10)};color:${g.color}">•</div>
            <div class="t1" style="flex:1">${esc(su.name)}</div>
            <input class="num right" style="width:126px;padding:8px 10px" inputmode="numeric" placeholder="0" value="${plan[su.id]?plan[su.id]:''}" data-plan="${su.id}"></div>`);
          wirePlan(row); card.appendChild(row);
        });
      } else {
        const row=h(`<div class="lrow"><div class="ic" style="background:${tint(g.color,13)};color:${g.color}">${esc(c.icon||'•')}</div>
          <div class="t1" style="flex:1">${esc(c.name)}</div>
          <input class="num right" style="width:130px;padding:8px 10px" inputmode="numeric" placeholder="0" value="${plan[c.id]?plan[c.id]:''}" data-plan="${c.id}"></div>`);
        wirePlan(row); card.appendChild(row);
      }
    });
    v.appendChild(card);
  });
}

/* ============================================================
   PAGE: ФАКТ (план / факт / остаток / %)
   ============================================================ */
function pgFact(v){
  const k=curMonth; const plan=state.plans[k]||{};
  v.appendChild(h(`<div class="page-title">План / Факт</div><div class="page-sub">${ymLabel(k)} · выполнение бюджета по категориям</div>`));

  // ---- доход: план / факт по источникам ----
  const incPlan=plannedIncome(k), incFact=monthIncome(k);

    });
    v.appendChild(card);
  });
}

/* ============================================================
   CHARTS (inline SVG, без внешних библиотек)
   ============================================================ */
function donut(data,size){ // data:[{label,value,color}]
  size=size||150; const r=size/2, ir=r*0.62, cx=r, cy=r;
  const tot=data.reduce((a,d)=>a+d.value,0); if(tot<=0) return `<svg width="${size}" height="${size}"><circle cx="${cx}" cy="${cy}" r="${(r+ir)/2}" fill="none" stroke="var(--line)" stroke-width="${r-ir}"/></svg>`;
  let ang=-Math.PI/2, paths="";
  data.forEach(d=>{ const a2=ang+(d.value/tot)*Math.PI*2; const large=(a2-ang)>Math.PI?1:0;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi2=cx+ir*Math.cos(a2),yi2=cy+ir*Math.sin(a2),xi1=cx+ir*Math.cos(ang),yi1=cy+ir*Math.sin(ang);
    paths+=`<path d="M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} L${xi2} ${yi2} A${ir} ${ir} 0 ${large} 0 ${xi1} ${yi1} Z" fill="${d.color}"/>`; ang=a2; });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}<circle cx="${cx}" cy="${cy}" r="${ir-0.5}" fill="var(--panel)"/></svg>`;
}
function barsChart(rows,opt){ // rows:[{label, values:[{v,color}]}], stacked or grouped
  opt=opt||{}; const W=opt.w||640,H=opt.h||190, pad=28, bw=(W-pad*2)/rows.length;
  const max=Math.max(1,...rows.map(r=>opt.stacked? r.values.reduce((a,x)=>a+x.v,0) : Math.max(...r.values.map(x=>x.v),0)));
  let bars="",labels="";
  rows.forEach((r,i)=>{ const x0=pad+i*bw;
    if(opt.stacked){ let yAcc=H-24; r.values.forEach(val=>{ const hh=(val.v/max)*(H-46); yAcc-=hh; bars+=`<rect x="${x0+bw*0.18}" y="${yAcc}" width="${bw*0.64}" height="${Math.max(0,hh)}" fill="${val.color}"/>`; }); }
    else { const gw=bw*0.64/r.values.length; r.values.forEach((val,j)=>{ const hh=(val.v/max)*(H-46); bars+=`<rect x="${x0+bw*0.18+j*gw}" y="${H-24-hh}" width="${gw*0.85}" height="${Math.max(0,hh)}" fill="${val.color}" rx="1.5"/>`; }); }
    labels+=`<text x="${x0+bw/2}" y="${H-8}" fill="var(--ink3)" font-size="10" text-anchor="middle">${esc(r.label)}</text>`;
  });
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="overflow:visible"><line x1="${pad}" y1="${H-24}" x2="${W-pad}" y2="${H-24}" stroke="var(--line2)"/>${bars}${labels}</svg>`;
}
function lineChart(points,opt){ // points:[{label,v}]
  opt=opt||{}; const W=opt.w||640,H=opt.h||170,pad=30;
  const vals=points.map(p=>p.v); const min=Math.min(0,...vals),max=Math.max(1,...vals);
  const rng=max-min||1; const step=(W-pad*2)/Math.max(1,points.length-1);
  const xy=points.map((p,i)=>[pad+i*step, H-22-((p.v-min)/rng)*(H-40)]);
  const d=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=d+` L${xy[xy.length-1][0]} ${H-22} L${xy[0][0]} ${H-22} Z`;
  const zeroY=H-22-((0-min)/rng)*(H-40);
  let labels=points.map((p,i)=>(i%Math.ceil(points.length/6)===0)?`<text x="${xy[i][0]}" y="${H-6}" fill="var(--ink3)" font-size="10" text-anchor="middle">${esc(p.label)}</text>`:"").join("");
  let dots=xy.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.4" fill="var(--gold)"/>`).join("");
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"><line x1="${pad}" y1="${zeroY}" x2="${W-pad}" y2="${zeroY}" stroke="var(--line2)" stroke-dasharray="3 3"/><path d="${area}" fill="var(--gold)" opacity="0.10"/><path d="${d}" fill="none" stroke="var(--gold)" stroke-width="2"/>${dots}${labels}</svg>`;
}

function pgCashflow(v){
  v.appendChild(h(`<div class="page-title">Денежный поток</div><div class="page-sub">Скользящие 12 месяцев · ${ymShort(horizonStart())} – ${ymShort(addMonths(horizonStart(),state.settings.horizon-1))}</div>`));
  const months=[]; for(let i=0;i<state.settings.horizon;i++)months.push(addMonths(horizonStart(),i));
  let cum=0;
  const card=h(`<div class="card" style="overflow-x:auto"><h3>Операционный, кредитный и капитальный потоки</h3><table class="tbl"><thead><tr><th>Месяц</th><th class="right">Приход</th><th class="right">Потребление</th><th class="right">В капитал</th><th class="right">Δ месяца</th><th class="right">Накоплено</th></tr></thead><tbody id="cfBody"></tbody></table></div>`);
  const body=card.querySelector("#cfBody");
  months.forEach(mm=>{ const inc=incomeForMonth(mm), exp=monthExpense(mm), cap=monthCapital(mm); const delta=inc-exp-cap; cum+=delta;
    body.appendChild(h(`<tr><td>${ymShort(mm)}</td><td class="right num" style="color:var(--green)">${inc?fmt(inc,{bare:true}):'—'}</td><td class="right num">${exp?fmt(exp,{bare:true}):'—'}</td><td class="right num" style="color:var(--gold)">${cap?fmt(cap,{bare:true}):'—'}</td><td class="right num" style="color:${delta<0?'var(--red)':'var(--ink)'}">${(inc||exp||cap)?fmt(delta,{bare:true,plus:true}):'—'}</td><td class="right num" style="color:${cum<0?'var(--red)':'var(--ink2)'}">${fmt(cum,{bare:true})}</td></tr>`)); });
  v.appendChild(card);
  v.appendChild(h(`<div class="infobox">Приход и расход берутся из реальных операций. Пустые месяцы заполнятся, как только вы начнёте вести учёт или зададите повторяющиеся платежи и план. Прогноз с учётом ожидаемого дохода и плана — во вкладке «Прогноз».</div>`));
}

/* ============================================================
   PAGE: ПРОГНОЗ и кассовые разрывы
   ============================================================ */
function pgForecast(v){
  v.appendChild(h(`<div class="page-title">Прогноз денег</div><div class="page-sub">12 месяцев вперёд · раннее предупреждение о кассовых разрывах</div>`));
  const months=[]; for(let i=0;i<state.settings.horizon;i++)months.push(addMonths(horizonStart(),i));
  const startCash=liquidAssets();
  let cum=startCash; const proj=[]; let firstGap=null;
  const goalsMonthly=(state.goals||[]).reduce((a,g)=>a+(+g.monthlyNeeded||0),0);
  months.forEach(mm=>{ 
    const inc = monthIncome(mm)>0?monthIncome(mm):plannedIncome(mm);
    const planExp = planMonthTotal(mm);
    const realExp = monthExpense(mm)+monthCapital(mm);
    const exp = Math.max(planExp, realExp>0?realExp:0) || estimatedMonthlyExpense();
    const outflow = exp + goalsMonthly*(planExp?0:1); // if no plan, add goal contributions on top
    const delta = inc - outflow;
    cum += delta;
    if(cum<0 && firstGap===null) firstGap=mm;
    proj.push({mm,inc,exp:outflow,delta,cum});
  });
  if(firstGap) v.appendChild(h(`<div class="warnbox"><b>Возможен кассовый разрыв: ${ymLabel(firstGap)}.</b> По текущему прогнозу накопленный остаток уходит в минус. Заранее подготовьте резерв, перенесите крупные траты (поездки/крупные покупки) или увеличьте доход в этом месяце.</div>`));
  else v.appendChild(h(`<div class="okbox">Кассовых разрывов в горизонте 12 месяцев не видно. Накопленный остаток остаётся положительным при текущих допущениях.</div>`));
  const card=h(`<div class="card" style="overflow-x:auto"><h3>Прогноз остатка</h3><table class="tbl"><thead><tr><th>Месяц</th><th class="right">Приход</th><th class="right">Отток</th><th class="right">Δ</th><th class="right">Остаток</th></tr></thead><tbody></tbody></table></div>`);
  const tb=card.querySelector("tbody");
  proj.forEach(p=>tb.appendChild(h(`<tr><td>${ymShort(p.mm)}</td><td class="right num">${fmt(p.inc,{bare:true})}</td><td class="right num">${fmt(p.exp,{bare:true})}</td><td class="right num" style="color:${p.delta<0?'var(--red)':'var(--green)'}">${fmt(p.delta,{bare:true,plus:true})}</td><td class="right num" style="color:${p.cum<0?'var(--red)':'var(--ink)'};font-weight:600">${fmt(p.cum,{bare:true})}</td></tr>`)));
  v.appendChild(card);
  v.appendChild(h(`<div class="infobox">Допущения: приход = факт месяца или ожидаемый доход ${fmt(expectedIncome())}; отток = план месяца, а если плана нет — средняя оценка расходов${goalsMonthly?` плюс взносы по целям ${fmt(goalsMonthly)}/мес`:''}. Стартовый остаток = кэш на счетах ${fmt(startCash)} (задаётся в «Баланс»). Чем точнее план и кэш, тем точнее прогноз.</div>`));
}
function estimatedMonthlyExpense(){
  const months=[...new Set(state.txns.map(t=>ym(t.date)))];
  if(!months.length) return Math.round(expectedIncome()*0.85);
  const tot=months.reduce((a,k)=>a+monthExpense(k)+monthCapital(k),0);
  return Math.round(tot/months.length);
}

/* Движок: разложить доход по группам с учётом целей */
function suggestPlanFromGoals(){
  const inc=plannedIncome(curMonth);
  const goalsMonthly=(state.goals||[]).reduce((a,g)=>a+goalMonthlyNeeded(g),0);
  const fixed=totalMinPayment(); // обязательные платежи по долгам как минимум
  // рекомендованные доли (после обязательных и целей — на переменные/семью/качество жизни)
  const afterGoals=inc-goalsMonthly;
  const rows=[];
  const alloc={};
  // 1. капитал = взносы по целям, раскидываем на подушку/накопления/инвест/долг
  alloc.g5=goalsMonthly;
  // остаток на потребление
  let rest=Math.max(0,afterGoals);
  // типовые доли потребления
  const split={g1:0.42,g2:0.30,g3:0.16,g4:0.12};
  const consNeed=rest;
  ["g1","g2","g3","g4"].forEach(gid=>alloc[gid]=Math.round(consNeed*split[gid]));
  const feasible=goalsMonthly<=inc*0.9;
  let html=`<h3>План из целей</h3>
    <div class="${feasible?'okbox':'warnbox'}">Доход ${fmt(inc)}/мес. На цели нужно ${fmt(goalsMonthly)}/мес (${pct(inc?goalsMonthly/inc:0)} дохода). ${feasible?'Это реалистично. Ниже — предлагаемое распределение на месяц.':'Это агрессивно: на жизнь остаётся мало. Рассмотрите более длинные сроки целей или гашение долгов в первую очередь.'}</div>
    <table class="tbl"><thead><tr><th>Группа</th><th class="right">Предлагается/мес</th></tr></thead><tbody>`;
  expenseGroups().forEach(g=>{ html+=`<tr><td><span style="color:${g.color}">●</span> ${esc(g.name)}</td><td class="right num">${fmt(alloc[g.id]||0)}</td></tr>`; });
  html+=`<tr><td style="font-weight:700">Итого</td><td class="right num" style="font-weight:700">${fmt(Object.values(alloc).reduce((a,x)=>a+x,0))}</td></tr></tbody></table>
    <p class="muted" style="font-size:12.5px">Разложу это по категориям текущего месяца (${ymLabel(curMonth)}) как стартовый план. Точные цифры потом поправите во вкладке «План».</p>
    <button class="btn primary block" id="applyPlan" style="padding:13px">Применить к плану ${ymShort(curMonth)}</button>
    <button class="btn ghost block" id="cancelPlan" style="margin-top:8px">Закрыть</button>`;
  openSheet(html,el=>{
    el.querySelector("#applyPlan").onclick=()=>{
      const k=curMonth; state.plans[k]=state.plans[k]||{};
      expenseGroups().forEach(g=>{ const cats=catsOf(g.id); if(!cats.length)return; const per=Math.round((alloc[g.id]||0)/cats.length); cats.forEach(c=>{ const subs=subsOf(c.id); if(subs.length){ const pp=Math.round(per/subs.length); subs.forEach(su=>{ if(pp>0)state.plans[k][su.id]=pp; }); } else { if(per>0)state.plans[k][c.id]=per; } }); });
      save(); closeSheet(); toast("План собран — проверьте во вкладке «План»"); go("plan");
    };
    el.querySelector("#cancelPlan").onclick=closeSheet;
  });
}

/* ---------- Экспорт в Excel (.xlsx) без внешних библиотек ---------- */
function xmlEsc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&apos;"}[c])); }
function colRef(n){ let s=""; n++; while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); } return s; }
function wsXML(rows){
  let x='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
  rows.forEach((row,ri)=>{ x+='<row r="'+(ri+1)+'">';
    row.forEach((val,ci)=>{ const ref=colRef(ci)+(ri+1);
      if(typeof val==="number" && isFinite(val)) x+='<c r="'+ref+'"><v>'+val+'</v></c>';
      else x+='<c r="'+ref+'" t="inlineStr"><is><t xml:space="preserve">'+xmlEsc(val)+'</t></is></c>';
    });
    x+='</row>';
  });
  return x+'</sheetData></worksheet>';
}
const _CRCT=(()=>{ const t=[]; for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++)c=c&1?(0xEDB88320^(c>>>1)):(c>>>1); t[n]=c>>>0; } return t; })();
function crc32(b){ let c=0xFFFFFFFF; for(let i=0;i<b.length;i++)c=_CRCT[(c^b[i])&0xFF]^(c>>>8); return (c^0xFFFFFFFF)>>>0; }
function zipStore(files){
  const enc=new TextEncoder(); const u16=n=>[n&255,(n>>8)&255], u32=n=>[n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];
  const parts=[], central=[]; let offset=0;
  files.forEach(f=>{ const nb=enc.encode(f.name), data=f.data, crc=crc32(data);
    const local=[0x50,0x4b,0x03,0x04,...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(data.length),...u32(data.length),...u16(nb.length),...u16(0)];
    parts.push(new Uint8Array(local),nb,data);
    central.push(new Uint8Array([0x50,0x4b,0x01,0x02,...u16(20),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(data.length),...u32(data.length),...u16(nb.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(offset)]), nb);
    offset += local.length+nb.length+data.length;
  });
  let cs=0; central.forEach(c=>cs+=c.length); const co=offset;
  const end=new Uint8Array([0x50,0x4b,0x05,0x06,...u16(0),...u16(0),...u16(files.length),...u16(files.length),...u32(cs),...u32(co),...u16(0)]);
  const all=[...parts,...central,end]; let total=0; all.forEach(c=>total+=c.length);
  const out=new Uint8Array(total); let p=0; all.forEach(c=>{out.set(c,p);p+=c.length;}); return out;
}
function buildXLSX(sheets){
  const enc=new TextEncoder(); const files=[];
  const ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'+sheets.map((s,i)=>'<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>').join("")+'</Types>';
  files.push({name:"[Content_Types].xml",data:enc.encode(ct)});
  files.push({name:"_rels/.rels",data:enc.encode('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>')});

function buildWorkbookSheets(){
  const sheets=[];

  const opRows=[["Дата","Тип","Группа","Категория","Подкатегория","Сумма","Участник","Комментарий"]];
  state.txns.slice().sort((a,b)=>(a.date<b.date?-1:a.date>b.date?1:0)).forEach(t=>{
    const inc=t.type==="income"; const g=groupOf(t.categoryId);
    const grp=inc?"Доход":(g?g.name:""); const cat=catName(t.categoryId); const sub=(!inc&&t.subId)?subName(t.subId):"";
    const mem=t.memberId&&memberById(t.memberId)?memberById(t.memberId).name:"";
    opRows.push([t.date, inc?"Доход":"Расход", grp, cat, sub, inc?Math.round(+t.amount||0):-Math.round(+t.amount||0), mem, t.comment||""]);
  });
  sheets.push({name:"Операции",rows:opRows});
  // Помесячно
  const mset={}; state.txns.forEach(t=>mset[t.date.slice(0,7)]=1); Object.keys(state.snapshots||{}).forEach(m=>mset[m]=1); Object.keys(state.plans||{}).forEach(m=>mset[m]=1); Object.keys(state.incomePlans||{}).forEach(m=>mset[m]=1);
  const months=Object.keys(mset).sort();
  const mRows=[["Месяц","Доход","Расход","В капитал","Сальдо (доход−расход)","Чистый капитал (на конец)","Месяц закрыт"]];
  months.forEach(k=>{ const sn=(state.snapshots||{})[k];
    const inc=sn?sn.income:monthIncome(k), exp=sn?sn.expense:monthExpense(k), cap=sn?sn.capital:monthCapital(k);
    mRows.push([k, Math.round(inc||0), Math.round(exp||0), Math.round(cap||0), Math.round((inc||0)-(exp||0)), sn?Math.round(sn.net||0):"", sn?"да":"нет"]);
  });
  sheets.push({name:"Помесячно",rows:mRows});
  // Активы
  if(state.assets.length){ const aRows=[["Название","Тип","Стоимость","Ликвидный"]];
    state.assets.forEach(a=>aRows.push([a.name,a.kind||"",Math.round(+a.value||0),a.liquid?"да":"нет"]));
    aRows.push(["ИТОГО","",Math.round(totalAssets()),""]); sheets.push({name:"Активы",rows:aRows}); }
  // Пассивы
  if(state.liabilities.length){ const lRows=[["Название","Тип","Остаток","Ставка, % годовых","Платёж/мес"]];
    state.liabilities.slice().sort((a,b)=>b.balance-a.balance).forEach(x=>lRows.push([x.name,x.kind||"",Math.round(+x.balance||0),Math.round((+x.rate||0)*1000)/10,Math.round(+x.minPayment||0)]));
    lRows.push(["ИТОГО","",Math.round(totalLiab()),"",Math.round(totalMinPayment())]); sheets.push({name:"Пассивы",rows:lRows}); }
  // Цели
  if((state.goals||[]).length){ const gRows=[["Цель","Целевая сумма","Накоплено","Срок","Прогресс, %"]];
    state.goals.forEach(g=>gRows.push([g.name,Math.round(+g.target||0),Math.round(+g.current||0),g.targetDate||"",g.target?Math.round((g.current||0)/g.target*100):0]));
    sheets.push({name:"Цели",rows:gRows}); }
  return sheets;
}

  async push(manual){

    if(!this.linked){ if(manual)go("settings"); return; }

      const r=await this.api("https://content.dropboxapi.com/2/files/download",{method:"POST",headers:{"Dropbox-API-Arg":JSON.stringify({path:"/famfin.json"})}});
      if(r.status===409){ await this.push(); setSync("ok"); if(manual)toast("Отправлено в Dropbox"); return; }
      if(!r.ok) throw new Error("download "+r.status);
      const remote=JSON.parse(await r.text());
      if(remote&&remote.updatedAt){ await applyRemote(remote, manual); }
      else { await this.push(); setSync("ok"); if(manual)toast("Отправлено в Dropbox"); }
    }catch(e){ setSync("err"); if(manual)toast("Ошибка синхронизации"); console.warn(e); }
  },

/* ============================================================
   ШИФРОВАНИЕ (PBKDF2 + AES-GCM, WebCrypto). Данные нечитаемы без кода.
   updatedAt хранится открыто (нужен для сравнения версий синхронизации).
   ============================================================ */
function normCode(s){ let v=String(s||""); try{v=v.normalize("NFKC");}catch(e){} return v.replace(/[\s\u200B\u200C\u200D\uFEFF\u00A0]+/g,""); }
const CRYPT = {
  on:false, pass:null, saltB64:null, keyCache:{},
  _b64(buf){ let s="",a=new Uint8Array(buf); for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]); return btoa(s); },
  _ub64(s){ return Uint8Array.from(atob(s),c=>c.charCodeAt(0)); },
  async _keyFor(saltB64){
    if(this.keyCache[saltB64]) return this.keyCache[saltB64];
    const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(this.pass), "PBKDF2", false, ["deriveKey"]);
    const k = await crypto.subtle.deriveKey({name:"PBKDF2", salt:this._ub64(saltB64), iterations:200000, hash:"SHA-256"}, km, {name:"AES-GCM",length:256}, false, ["encrypt","decrypt"]);
    this.keyCache[saltB64]=k; return k;
  },
  async wrap(obj){
    const key = await this._keyFor(this.saltB64);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({name:"AES-GCM",iv}, key, new TextEncoder().encode(JSON.stringify(obj)));
    return JSON.stringify({__enc:1, v:1, updatedAt:obj.updatedAt||nowISO(), salt:this.saltB64, iv:this._b64(iv), ct:this._b64(ct)});
  },
  async unwrap(env){
    if(!this.pass) throw new Error("no-pass");
    const key = await this._keyFor(env.salt);
    const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:this._ub64(env.iv)}, key, this._ub64(env.ct));
    return JSON.parse(new TextDecoder().decode(pt));
  },
  async enable(pass){
    this.pass=normCode(pass); this.saltB64=this._b64(crypto.getRandomValues(new Uint8Array(16))); this.keyCache={}; this.on=true;
    await persistLocal(); if(DBX.linked) await DBX.push(true);
  },
  async disable(){
    this.on=false; this.pass=null; this.keyCache={};
    try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
    if(DBX.linked) await DBX.push(true);
  }
};
// расшифровать удалённые данные Dropbox (или вернуть как есть, если не зашифровано)
async function decodeRemote(parsed){ return (parsed && parsed.__enc) ? await CRYPT.unwrap(parsed) : parsed; }
// применить удалённое состояние с расшифровкой и обработкой ошибок
function metaAhead(a,b){ a=a||{}; b=b||{}; for(const coll in a){ for(const t of ['u','d']){ const mo=a[coll][t]||{}, ro=(b[coll]||{})[t]||{}; for(const k in mo){ if(!(k in ro) || mo[k]>ro[k]) return true; } } } return false; }
async function applyRemote(remote, manual){
  try{
    const obj=await decodeRemote(remote);
    const rem=migrate(obj); if(!rem.__meta) buildMetaBaseline(rem);
    const merged=mergeStates(state, rem);
    const ahead=metaAhead(merged.__meta, rem.__meta);   // есть ли у нас данные, которых нет в облаке
    state=merged; __lastSaved=_clone(state);
    save(false);
    if(DBX.linked && ahead) DBX.push();
    setSync("ok"); render_current(); if(manual)toast("Синхронизировано"); return true;
  }catch(err){
    if(err && err.message==="no-pass"){ setSync("ok"); showEncGate(remote); return false; }
    setSync("err"); if(manual)toast("Не удалось расшифровать данные из Dropbox — код не совпадает"); console.warn(err); return false;
  }
}

function showEncGate(env){
  const g=document.getElementById("gate"), box=document.getElementById("gbox");
  g.classList.add("show");
  const faceEnc=!!localStorage.getItem(LS_ENCFACE);
  box.innerHTML=
    '<div style="font-size:14px;color:var(--ink3);text-align:center">🔒 Данные защищены. Введите код.</div>'+
    '<input id="gcode" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="go" name="famfin_code" data-1p-ignore="true" data-lpignore="true" data-form-type="other" placeholder="код">'+
    '<div id="gmsg" class="gmsg"></div>'+
    '<button class="gbtn2" id="gok" type="button">Войти</button>'+
    (faceEnc?'<button class="gface" id="gfaceEnc" type="button" style="margin-top:8px">🙂 Войти по Face ID</button>':'')+
    '<div class="gver">'+APP_VERSION+'</div>';
  const inp=box.querySelector("#gcode"), ok=box.querySelector("#gok"), msg=box.querySelector("#gmsg");
  inp.addEventListener("input",()=>{ msg.textContent=""; });
  function fail(){ msg.textContent="Неверный код"; g.classList.add("shake"); setTimeout(()=>g.classList.remove("shake"),400); inp.focus(); try{inp.select();}catch(e){} }
  async function trySubmit(codeStr){
    const v=normCode(codeStr); if(!v){ fail(); return; }
    ok.disabled=true;
    try{
      CRYPT.on=true; CRYPT.saltB64=env.salt; CRYPT.pass=v; CRYPT.keyCache={};
      const obj = await CRYPT.unwrap(env);
      state = migrate(obj); if(!state.__meta||!Object.keys(state.__meta).length) buildMetaBaseline(state); __lastSaved=_clone(state); save(false);
      try{localStorage.setItem(LS_GATE,"1");}catch(e){}
      g.classList.remove("show"); bootApp();
    }catch(err){ CRYPT.pass=null; CRYPT.keyCache={}; ok.disabled=false; fail(); }
  }
  ok.onclick=()=>trySubmit(inp.value); inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();trySubmit(inp.value);} });
  if(faceEnc){
    const fb=box.querySelector("#gfaceEnc");
    const runFace=async()=>{ try{ await faceIdUnlock(); const code=_deobf(localStorage.getItem(LS_ENCFACE)); if(!code) throw 0; await trySubmit(code); }catch(e){} };
    if(fb) fb.onclick=runFace;
    faceIdAvailable().then(av=>{ if(av) runFace(); });
  }
  setTimeout(()=>inp.focus(),150);
}
function _obf(s){ try{ return btoa(unescape(encodeURIComponent(String(s)))); }catch(e){ return ""; } }
function _deobf(s){ try{ return decodeURIComponent(escape(atob(String(s)))); }catch(e){ return ""; } }
