function openCloudRegister(){
  openSheet(`<h3>Создать аккаунт</h3>
    <p class="muted" style="font-size:12.5px;margin-top:-4px">Пароль станет ключом к вашим данным. Мы его не храним и не видим — поэтому его важно запомнить.</p>
    ${apiField()}
    <div class="field"><label>Email</label><input id="clEmail" type="email" inputmode="email" autocapitalize="off" autocomplete="off" spellcheck="false" placeholder="you@mail.ru"></div>
    <div class="field"><label>Пароль</label><input id="clPw" type="password" autocomplete="new-password" placeholder="не короче 8 символов"></div>
    <div class="field"><label>Повторите пароль</label><input id="clPw2" type="password" autocomplete="new-password"></div>
    <label class="row" style="gap:8px;margin:2px 2px 8px;align-items:flex-start;cursor:pointer"><input type="checkbox" id="clConsent" style="margin-top:3px"><span style="font-size:12.5px">Я соглашаюсь на обработку персональных данных и принимаю <a href="#" id="clPolicy" style="color:var(--acc,#4a9)">политику конфиденциальности</a>.</span></label>
    <div id="clMsg" class="gmsg" style="min-height:16px;color:var(--bad)"></div>
    <button class="btn primary block" id="clGo" style="padding:13px">Создать аккаунт</button>
    <button class="btn ghost block" id="clCancel" style="margin-top:8px">Отмена</button>`,
  el=>{
    el.querySelector("#clCancel").onclick=closeSheet;
    el.querySelector("#clPolicy").onclick=(e)=>{ e.preventDefault(); openPrivacyPolicy(); };
    el.querySelector("#clGo").onclick=async()=>{
      const base=el.querySelector("#clBase").value.trim(), email=el.querySelector("#clEmail").value.trim();
      const pw=el.querySelector("#clPw").value, pw2=el.querySelector("#clPw2").value, msg=el.querySelector("#clMsg");
      msg.textContent="";
      if(!base){ msg.textContent="Укажите адрес сервера"; return; }
      if(!/^\S+@\S+\.\S+$/.test(email)){ msg.textContent="Проверьте email"; return; }
      if(pw.length<8){ msg.textContent="Пароль не короче 8 символов"; return; }
      if(pw!==pw2){ msg.textContent="Пароли не совпадают"; return; }
      if(!el.querySelector("#clConsent").checked){ msg.textContent="Нужно согласие на обработку персональных данных"; return; }
      const btn=el.querySelector("#clGo"); btn.disabled=true; btn.textContent="Создаю…";

function downloadRecoverySheet(rk){

    document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},500);
  }catch(e){ toast("Не удалось скачать файл"); }

function xmlEsc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&apos;"}[c])); }
function colRef(n){ let s=""; n++; while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); } return s; }
function wsXML(rows){
  let x='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
  rows.forEach((row,ri)=>{ x+='<row r="'+(ri+1)+'">';
    row.forEach((val,ci)=>{ const ref=colRef(ci)+(ri+1);
      if(typeof val==="number" && isFinite(val)) x+='<c r="'+ref+'"><v>'+val+'</v></c>';
      else x+='<c r="'+ref+'" t="inlineStr"><is><t xml:space="preserve">'+xmlEsc(val)+'</t></is></c>';
    });
    x+='</row>';
  });
  return x+'</sheetData></worksheet>';
}
const _CRCT=(()=>{ const t=[]; for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++)c=c&1?(0xEDB88320^(c>>>1)):(c>>>1); t[n]=c>>>0; } return t; })();

function zipStore(files){
  const enc=new TextEncoder(); const u16=n=>[n&255,(n>>8)&255], u32=n=>[n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];
  const parts=[], central=[]; let offset=0;
  files.forEach(f=>{ const nb=enc.encode(f.name), data=f.data, crc=crc32(data);
    const local=[0x50,0x4b,0x03,0x04,...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(data.length),...u32(data.length),...u16(nb.length),...u16(0)];
    parts.push(new Uint8Array(local),nb,data);
    central.push(new Uint8Array([0x50,0x4b,0x01,0x02,...u16(20),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(data.length),...u32(data.length),...u16(nb.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(offset)]), nb);
    offset += local.length+nb.length+data.length;
  });
  let cs=0; central.forEach(c=>cs+=c.length); const co=offset;
  const end=new Uint8Array([0x50,0x4b,0x05,0x06,...u16(0),...u16(0),...u16(files.length),...u16(files.length),...u32(cs),...u32(co),...u16(0)]);
  const all=[...parts,...central,end]; let total=0; all.forEach(c=>total+=c.length);
  const out=new Uint8Array(total); let p=0; all.forEach(c=>{out.set(c,p);p+=c.length;}); return out;
}
function buildXLSX(sheets){
  const enc=new TextEncoder(); const files=[];
  const ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'+sheets.map((s,i)=>'<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>').join("")+'</Types>';
  files.push({name:"[Content_Types].xml",data:enc.encode(ct)});
  files.push({name:"_rels/.rels",data:enc.encode('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>')});
  const wb='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>'+sheets.map((s,i)=>'<sheet name="'+xmlEsc(s.name)+'" sheetId="'+(i+1)+'" r:id="rId'+(i+1)+'"/>').join("")+'</sheets></workbook>';
  files.push({name:"xl/workbook.xml",data:enc.encode(wb)});
  const wbr='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+sheets.map((s,i)=>'<Relationship Id="rId'+(i+1)+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet'+(i+1)+'.xml"/>').join("")+'</Relationships>';
  files.push({name:"xl/_rels/workbook.xml.rels",data:enc.encode(wbr)});
  sheets.forEach((s,i)=>files.push({name:"xl/worksheets/sheet"+(i+1)+".xml",data:enc.encode(wsXML(s.rows))}));
  return zipStore(files);
}
function buildWorkbookSheets(){

    const inc=t.type==="income"; const g=groupOf(t.categoryId);
    const grp=inc?"Доход":(g?g.name:""); const cat=catName(t.categoryId); const sub=(!inc&&t.subId)?subName(t.subId):"";
    const mem=t.memberId&&memberById(t.memberId)?memberById(t.memberId).name:"";

  });
  sheets.push({name:"Операции",rows:opRows});
  // Помесячно
  const mset={}; state.txns.forEach(t=>mset[t.date.slice(0,7)]=1); Object.keys(state.snapshots||{}).forEach(m=>mset[m]=1); Object.keys(state.plans||{}).forEach(m=>mset[m]=1); Object.keys(state.incomePlans||{}).forEach(m=>mset[m]=1);
  const months=Object.keys(mset).sort();
  const mRows=[["Месяц","Доход","Расход","В капитал","Сальдо (доход−расход)","Чистый капитал (на конец)","Месяц закрыт"]];
  months.forEach(k=>{ const sn=(state.snapshots||{})[k];
    const inc=sn?sn.income:monthIncome(k), exp=sn?sn.expense:monthExpense(k), cap=sn?sn.capital:monthCapital(k);
    mRows.push([k, Math.round(inc||0), Math.round(exp||0), Math.round(cap||0), Math.round((inc||0)-(exp||0)), sn?Math.round(sn.net||0):"", sn?"да":"нет"]);
  });
  sheets.push({name:"Помесячно",rows:mRows});

    (state.planned||[]).slice().sort((a,b)=>{ const ka=a.repeat?("A"+String(a.day||0).padStart(2,"0")):("B"+(a.date||"")); const kb=b.repeat?("A"+String(b.day||0).padStart(2,"0")):("B"+(b.date||"")); return ka<kb?-1:1; }).forEach(p=>{
      pRows.push([ p.type==="income"?"Доход":"Расход", p.repeat?"ежемесячно":"разово", p.repeat?(p.day+" число"):(p.date||""), catName(p.categoryId), Math.round(+p.amount||0), p.label||"", p.active===false?"пауза":"активен" ]);
    });
    sheets.push({name:"Плановые",rows:pRows});
  }
  // Активы
  if(state.assets.length){ const aRows=[["Название","Тип","Стоимость","Ликвидный"]];
    state.assets.forEach(a=>aRows.push([a.name,a.kind||"",Math.round(+a.value||0),a.liquid?"да":"нет"]));
    aRows.push(["ИТОГО","",Math.round(totalAssets()),""]); sheets.push({name:"Активы",rows:aRows}); }
  // Пассивы
  if(state.liabilities.length){ const lRows=[["Название","Тип","Остаток","Ставка, % годовых","Платёж/мес"]];
    state.liabilities.slice().sort((a,b)=>liabBalance(b)-liabBalance(a)).forEach(x=>lRows.push([x.name,x.kind||"",Math.round(liabBalance(x)),Math.round((+x.rate||0)*1000)/10,Math.round(+x.minPayment||0)]));
    lRows.push(["ИТОГО","",Math.round(totalLiab()),"",Math.round(totalMinPayment())]); sheets.push({name:"Пассивы",rows:lRows}); }
  // Цели
  if((state.goals||[]).length){ const gRows=[["Цель","Целевая сумма","Накоплено","Срок","Прогресс, %"]];
    state.goals.forEach(g=>gRows.push([g.name,Math.round(+g.target||0),Math.round(+g.current||0),g.targetDate||"",g.target?Math.round((g.current||0)/g.target*100):0]));
    sheets.push({name:"Цели",rows:gRows}); }
  return sheets;
}

/* ============================================================
   ШИФРОВАНИЕ (PBKDF2 + AES-GCM, WebCrypto). Данные нечитаемы без кода.
   updatedAt хранится открыто (нужен для сравнения версий синхронизации).
   ============================================================ */
function normCode(s){ let v=String(s||""); try{v=v.normalize("NFKC");}catch(e){} return v.replace(/[\s\u200B\u200C\u200D\uFEFF\u00A0]+/g,""); }
const CRYPT = {
  on:false, pass:null, saltB64:null, keyCache:{},
  _b64(buf){ let s="",a=new Uint8Array(buf); for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]); return btoa(s); },
  _ub64(s){ return Uint8Array.from(atob(s),c=>c.charCodeAt(0)); },
  async _keyFor(saltB64){
    if(this.keyCache[saltB64]) return this.keyCache[saltB64];
    const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(this.pass), "PBKDF2", false, ["deriveKey"]);
    const k = await crypto.subtle.deriveKey({name:"PBKDF2", salt:this._ub64(saltB64), iterations:200000, hash:"SHA-256"}, km, {name:"AES-GCM",length:256}, false, ["encrypt","decrypt"]);

  },
  async wrap(obj){
    const key = await this._keyFor(this.saltB64);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({name:"AES-GCM",iv}, key, new TextEncoder().encode(JSON.stringify(obj)));
    return JSON.stringify({__enc:1, v:1, updatedAt:obj.updatedAt||nowISO(), salt:this.saltB64, iv:this._b64(iv), ct:this._b64(ct)});
  },
  async unwrap(env){
    if(!this.pass) throw new Error("no-pass");
    const key = await this._keyFor(env.salt);
    const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:this._ub64(env.iv)}, key, this._ub64(env.ct));
    return JSON.parse(new TextDecoder().decode(pt));
  },
  async enable(pass){
    this.pass=normCode(pass); this.saltB64=this._b64(crypto.getRandomValues(new Uint8Array(16))); this.keyCache={}; this.on=true;
    await persistLocal();
  },
  async disable(){
    this.on=false; this.pass=null; this.keyCache={};
    try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
   
  }
};

async function decodeRemote(parsed){ return (parsed && parsed.__enc) ? await CRYPT.unwrap(parsed) : parsed; }

function metaAhead(a,b){ a=a||{}; b=b||{}; for(const coll in a){ for(const t of ['u','d']){ const mo=a[coll][t]||{}, ro=(b[coll]||{})[t]||{}; for(const k in mo){ if(!(k in ro) || mo[k]>ro[k]) return true; } } } return false; }

const SRV = {
  baseUpdatedAt:null,
  _env(s){ return {ciphertext:s.ciphertext,iv:s.iv,salt:s.salt,enc_v:s.enc_v,updatedAt:s.updatedAt}; },
  async applyServer(env){
    const obj=await VaultCrypto.decryptVault(env,ACCT.dek);
    const rem=migrate(obj); if(!rem.__meta) buildMetaBaseline(rem);
    const merged=mergeStates(state,rem); const ahead=metaAhead(merged.__meta,rem.__meta);
    state=merged; __lastSaved=_clone(state); save(false); if(!isTyping())render_current(); return ahead;
  },
  async push(manual){
    if(!ACCT.linked||!ACCT.dek) return;
    setSync("dirty");
    for(let t=0;t<4;t++){
      const env=await VaultCrypto.encryptVault(state,ACCT.dek);
      const body={ciphertext:env.ciphertext,salt:env.salt,iv:env.iv,enc_v:env.enc_v,updatedAt:env.updatedAt,baseUpdatedAt:SRV.baseUpdatedAt||null};
      const r=await ACCT.api("/vault",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(r.status===200||r.status===201){ const d=await r.json(); SRV.baseUpdatedAt=d.updatedAt; setSync("ok"); if(manual)toast("Отправлено в облако"); return; }
      if(r.status===409){ const d=await r.json(); try{ await SRV.applyServer(SRV._env(d.server)); SRV.baseUpdatedAt=d.server.updatedAt; }catch(e){ setSync("err"); if(manual)toast("Не удалось расшифровать облако"); return; } continue; }
      if(r.status===413){ setSync("err"); if(manual)toast("Данные превышают лимит облака"); return; }
      setSync("err"); if(manual)toast("Ошибка отправки в облако"); return;
    }
    setSync("err"); if(manual)toast("Слишком много конфликтов — повторите");
  },
  async syncNow(manual){
    if(!ACCT.linked){ if(manual)go("settings"); return; }
    if(!ACCT.dek){ if(manual)toast("Войдите в аккаунт, чтобы синхронизировать"); return; }
    try{ setSync("dirty");
      const r=await ACCT.api("/vault",{method:"GET"});
      if(r.status===204){
        if(ACCT.role==='member'){ handleRemovedFromFamily(); return; }   // участника отвязали

function applyTheme(){

  const dark = theme==="dark" || (theme==="auto" && window.matchMedia && matchMedia("(prefers-color-scheme:dark)").matches);

  const mq=matchMedia("(prefers-color-scheme:dark)");

let __shrinkSet=false;
function setupScrollShrink(){
  if(__shrinkSet) return; __shrinkSet=true;
  let last=0, ticking=false;
  window.addEventListener("scroll",()=>{
    if(ticking) return; ticking=true;
    (window.requestAnimationFrame||function(f){setTimeout(f,16);})(()=>{
      const y=window.scrollY||document.documentElement.scrollTop||0;
      const el=document.getElementById("bottomnav");
      if(el && isMobile()){
        if(y>60 && y>last+2) el.classList.add("min");
        else if(y<last-2 || y<=8) el.classList.remove("min");
      }
      last=y; ticking=false;

}

function showEncGate(env){
  const g=document.getElementById("gate"), box=document.getElementById("gbox");
  g.classList.add("show");
  const faceEnc=!!localStorage.getItem(LS_ENCFACE);
  box.innerHTML=
    '<div style="font-size:14px;color:var(--ink3);text-align:center">🔒 Данные защищены. Введите код.</div>'+
    '<input id="gcode" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="go" name="famfin_code" data-1p-ignore="true" data-lpignore="true" data-form-type="other" placeholder="код">'+
    '<div id="gmsg" class="gmsg"></div>'+
    '<button class="gbtn2" id="gok" type="button">Войти</button>'+
    (faceEnc?'<button class="gface" id="gfaceEnc" type="button" style="margin-top:8px">🙂 Войти по Face ID</button>':'')+
    '<div class="gver">'+APP_VERSION+'</div>';
  const inp=box.querySelector("#gcode"), ok=box.querySelector("#gok"), msg=box.querySelector("#gmsg");
  inp.addEventListener("input",()=>{ msg.textContent=""; });
  function fail(){ msg.textContent="Неверный код"; g.classList.add("shake"); setTimeout(()=>g.classList.remove("shake"),400); inp.focus(); try{inp.select();}catch(e){} }
  async function trySubmit(codeStr){
    const v=normCode(codeStr); if(!v){ fail(); return; }
    ok.disabled=true;
    try{
      CRYPT.on=true; CRYPT.saltB64=env.salt; CRYPT.pass=v; CRYPT.keyCache={};
      const obj = await CRYPT.unwrap(env);
      state = migrate(obj); if(!state.__meta||!Object.keys(state.__meta).length) buildMetaBaseline(state); __lastSaved=_clone(state); save(false);
      try{localStorage.setItem(LS_GATE,"1");}catch(e){}
      g.classList.remove("show"); bootApp();
    }catch(err){ CRYPT.pass=null; CRYPT.keyCache={}; ok.disabled=false; fail(); }
  }
  ok.onclick=()=>trySubmit(inp.value); inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();trySubmit(inp.value);} });
  if(faceEnc){
    const fb=box.querySelector("#gfaceEnc");
    const runFace=async(auto)=>{ if(fb) fb.disabled=true; try{ await faceIdUnlock(); const code=_deobf(localStorage.getItem(LS_ENCFACE)); if(!code) throw new Error('no-code'); await trySubmit(code); }catch(e){ if(fb) fb.disabled=false; } };
    if(fb) fb.onclick=()=>runFace(false);
    faceIdAvailable().then(av=>{ if(av) runFace(true); });
  }
  setTimeout(()=>inp.focus(),150);
}

function _deobf(s){ try{ return decodeURIComponent(escape(atob(String(s)))); }catch(e){ return ""; } }

function bufToB64(buf){ return btoa(String.fromCharCode.apply(null,new Uint8Array(buf))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function b64ToBuf(b){ b=b.replace(/-/g,"+").replace(/_/g,"/"); const s=atob(b); const a=new Uint8Array(s.length); for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i); return a.buffer; }
async function requestPersistentStorage(){ try{ if(navigator.storage&&navigator.storage.persist){ if(!(await navigator.storage.persisted())) return await navigator.storage.persist(); return true; } }catch(e){} return false; }
async function faceIdAvailable(){ try{ return !!window.PublicKeyCredential && await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); }catch(e){ return false; } }
async function faceIdRegister(){
  const cred=await navigator.credentials.create({publicKey:{
    challenge:crypto.getRandomValues(new Uint8Array(32)),
    rp:{name:"ДомФин",id:location.hostname},
    user:{id:crypto.getRandomValues(new Uint8Array(16)),name:"u",displayName:"u"},
    pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],
    authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",residentKey:"preferred"},
    timeout:60000,attestation:"none"}});
  localStorage.setItem(LS_FACEID,bufToB64(cred.rawId)); return true;
}
async function faceIdUnlock(){
  const id=localStorage.getItem(LS_FACEID); if(!id) throw new Error("no cred");
  await navigator.credentials.get({publicKey:{
    challenge:crypto.getRandomValues(new Uint8Array(32)),
    allowCredentials:[{type:"public-key",id:b64ToBuf(id)}],
    userVerification:"required",timeout:60000,rpId:location.hostname}});
  return true;
}
