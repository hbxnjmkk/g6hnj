<style>
:root{
  --bg:#F7F4EC; --bg2:#FFFDF7; --panel:#FFFDF7; --panel2:#F0ECE0;
  --line:#E3DED0; --line2:#D9D3C3;
  --ink:#202226; --ink2:#5F646B; --ink3:#8C9099;
  --gold:#0F6F6E; --gold2:#084C4B; --on-accent:#FFFDF7;
  --teal:#0F6F6E; --green:#0F6F6E; --amber:#C99A2E; --red:#F26B5E; --violet:#9C82D4;
  --grp1:#0F6F6E; --grp2:#7FD8D0; --grp3:#C9B98F; --grp4:#F4A6B8; --grp5:#D9B24A; --grpI:#0F6F6E;
  --shadow:0 16px 40px rgba(32,34,38,.07);
  --r:16px; --r2:12px; --r3:10px;
  --nav-h:64px; --top-h:56px; --sidebar-w:236px;
  --f-num:"SF Mono",ui-monospace,"Roboto Mono",Menlo,Consolas,monospace;
  font-synthesis:none;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* ===== Темы и акценты (пункт 14) ===== */
html[data-theme="dark"]{
  --bg:#101418; --bg2:#171D22; --panel:#171D22; --panel2:#20282E;
  --line:#2B353B; --line2:#39454C;
  --ink:#F4F1E8; --ink2:#AEB7B8; --ink3:#737E82;
  --gold:#3FB7B3; --gold2:#65D8D2; --on-accent:#06231F;
  --green:#3FB7B3; --red:#FF7A6F;
  --grp1:#3FB7B3; --grp2:#7FD8D0; --grp4:#EFA0B2; --grp5:#F1D46A;
  --shadow:0 20px 50px rgba(0,0,0,.42);
}
html[data-accent="blue"]{ --gold:#5486DC; --gold2:#4272CE; --on-accent:#fff }
html[data-accent="green"]{ --gold:#3DAA7C; --gold2:#2F9068; --on-accent:#fff }
html[data-accent="violet"]{ --gold:#9C82D4; --gold2:#8266C2; --on-accent:#fff }
html[data-accent="teal"]{ --gold:#0F6F6E; --gold2:#084C4B; --on-accent:#FFFDF7 }
html[data-accent="aqua"]{ --gold:#7FD8D0; --gold2:#5FC0B8; --on-accent:#06312D }
html[data-accent="butter"]{ --gold:#E0B84B; --gold2:#C99A2E; --on-accent:#2A2100 }
html[data-accent="pink"]{ --gold:#F4A6B8; --gold2:#E585A0; --on-accent:#3A0E1C }
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);overflow-x:hidden;max-width:100%;width:100%;touch-action:manipulation;-webkit-text-size-adjust:100%;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter","Roboto",system-ui,"Segoe UI",sans-serif;
  font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
body{min-height:100dvh}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink);background:var(--panel2);
  border:1px solid var(--line2);border-radius:var(--r3);padding:11px 12px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input[type=checkbox],input[type=radio]{width:auto;flex:none;accent-color:var(--gold);cursor:pointer}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;font-family:var(--f-num)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* ---------- Layout shell ---------- */
#app{min-height:100dvh;display:flex;flex-direction:column}
.topbar{position:relative;z-index:40;height:var(--top-h);display:flex;align-items:center;gap:10px;
  padding:0 14px;background:color-mix(in srgb,var(--bg2) 78%,transparent);backdrop-filter:blur(14px) saturate(1.5);-webkit-backdrop-filter:blur(14px) saturate(1.5);border-bottom:1px solid var(--line);
  padding-top:env(safe-area-inset-top);overflow:hidden;max-width:100%;box-sizing:border-box}
.topbar .brand{font-weight:700;letter-spacing:.3px;font-size:15px;display:flex;align-items:center;gap:9px;min-width:0;overflow:hidden;flex-shrink:1}
.topbar .brand span:not(.dot){overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brand .dot{width:11px;height:11px;border-radius:3px;background:var(--gold);box-shadow:0 0 12px rgba(227,178,60,.7);flex:none}
.topbar .month{margin-left:auto;display:flex;align-items:center;gap:4px;background:var(--panel);border:1px solid var(--line2);
  border-radius:999px;padding:4px 6px;flex:none}
.topbar .month button{width:30px;height:30px;border-radius:999px;font-size:17px;color:var(--ink2);flex:none}
.topbar .month .lbl{min-width:96px;text-align:center;font-weight:600;font-size:13px}
.topbar .sync{width:34px;height:34px;border-radius:999px;display:grid;place-items:center;background:var(--panel);
  border:1px solid var(--line2);font-size:15px;position:relative}
.sync .badge{position:absolute;right:-1px;bottom:-1px;width:9px;height:9px;border-radius:999px;background:var(--ink3);border:2px solid var(--bg2)}
.sync.ok .badge{background:var(--green)} .sync.dirty .badge{background:var(--amber)} .sync.err .badge{background:var(--red)}
.me{height:34px;min-width:34px;padding:0 8px;border-radius:999px;display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line2);font-size:15px;font-weight:600;color:var(--ink);flex:none;max-width:120px}
.me .nm{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mbadge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid transparent;white-space:nowrap}
.topbar .month .lbl{cursor:pointer}
.mpick-year{display:flex;align-items:center;justify-content:center;gap:22px;margin:6px 0 16px;font-size:18px;font-weight:800}
.mpick-year button{width:40px;height:40px;border-radius:999px;background:var(--panel2);border:1px solid var(--line2);font-size:18px;color:var(--ink)}
.mp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.mp-cell{padding:15px 0;border-radius:12px;background:var(--panel2);border:1px solid var(--line2);font-weight:600;font-size:14.5px;color:var(--ink)}
.mp-cell.now{border-color:var(--gold);color:var(--gold)}
.mp-cell.sel{background:var(--gold);color:var(--on-accent);border-color:var(--gold)}

.shell{flex:1;display:flex;min-height:0}
.sidebar{display:none}
.main{flex:1;min-width:0;padding:16px 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 26px);max-width:1180px;margin:0 auto;width:100%}

/* ---------- Bottom nav (mobile) ---------- */
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:45;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);background:color-mix(in srgb,var(--bg2) 80%,transparent);backdrop-filter:blur(14px) saturate(1.5);-webkit-backdrop-filter:blur(14px) saturate(1.5);border-top:1px solid var(--line);
  display:flex;align-items:stretch;justify-content:space-around;transition:height .22s ease}
.bottomnav.min{height:calc(50px + env(safe-area-inset-bottom))}
.bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink3);font-size:10px;font-weight:600;transition:gap .2s ease,font-size .2s ease}
.bottomnav.min button{gap:0;font-size:0}
.bottomnav.min button .ic{font-size:23px}
.bottomnav button .ic{font-size:19px;line-height:1}
.bottomnav button .ic svg,.bottomnav.min button .ic svg{width:23px;height:23px}
.sidebar .navi .ic svg{width:20px;height:20px}
.tileic svg{width:22px;height:22px}

.bottomnav button.active{color:var(--gold)}
.bottomnav .more-wrap{position:relative}
.fab{position:fixed;right:18px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);z-index:50;
  width:60px;height:60px;border-radius:999px;background:linear-gradient(145deg,var(--gold),var(--gold2));
  color:var(--on-accent);font-size:32px;font-weight:400;display:grid;place-items:center;box-shadow:0 10px 26px color-mix(in srgb,var(--gold) 45%,transparent),0 2px 0 rgba(255,255,255,.25) inset}
.fab:active{transform:scale(.94)}

/* ---------- Cards / typography ---------- */
.page-title{font-size:21px;font-weight:750;letter-spacing:-.2px;margin:2px 0 3px}
#view>div:has(>.page-title){margin-bottom:14px}
.page-sub{color:var(--ink2);font-size:13px;margin-bottom:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
.card h3{margin:0 0 12px;font-size:14px;font-weight:700;letter-spacing:.2px;color:var(--ink);display:flex;align-items:center;gap:8px}
.card h3 .tag{margin-left:auto;font-size:11px;color:var(--ink3);font-weight:600}
.eyebrow{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:9px}
.grid{display:grid;gap:12px}
#view>.grid{margin-bottom:14px}
.g2{grid-template-columns:repeat(2,minmax(0,1fr))} .g3{grid-template-columns:repeat(2,minmax(0,1fr))} .g4{grid-template-columns:repeat(2,minmax(0,1fr))}
.muted{color:var(--ink2)} .dim{color:var(--ink3)}
.right{text-align:right} .center{text-align:center}
.row{display:flex;align-items:center;gap:10px}
.spacer{flex:1}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:var(--panel2);border:1px solid var(--line2)}
.pill.g{color:var(--green);border-color:rgba(63,176,123,.35);background:rgba(63,176,123,.10)}
.pill.a{color:var(--amber);border-color:rgba(224,166,60,.35);background:rgba(224,166,60,.10)}
.pill.r{color:var(--red);border-color:rgba(229,84,78,.4);background:rgba(229,84,78,.12)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--panel2);border:1px solid var(--line2);
  border-radius:var(--r3);padding:10px 14px;font-weight:600;font-size:14px;color:var(--ink)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:linear-gradient(145deg,var(--gold),var(--gold2));color:var(--on-accent);border:none}
.btn.ghost{background:transparent}
.btn.sm{padding:7px 11px;font-size:13px;border-radius:9px}
.btn.danger{color:var(--red);border-color:rgba(229,84,78,.4)}
.btn.block{width:100%}
.iconbtn svg{width:18px;height:18px}
.iconbtn.addic{width:30px;height:30px;color:var(--gold)}
.iconbtn{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;background:var(--panel2);border:1px solid var(--line2);font-size:16px;flex:none}
.chiprow{display:flex;gap:8px;overflow-x:auto;padding:6px 8px 8px;margin:0 -8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chiprow::-webkit-scrollbar{display:none}
.chip{flex:none;padding:8px 13px;border-radius:999px;background:var(--panel2);border:1px solid var(--line2);font-size:13px;font-weight:600;color:var(--ink2);white-space:nowrap}
.chip.active{background:color-mix(in srgb,var(--gold) 14%,transparent);border-color:var(--gold);color:var(--gold)}

/* KPI */
.kpi{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--r2);padding:13px 14px;min-width:0}
.kpi .k-lbl{font-size:11px;color:var(--ink3);font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.kpi .k-val{font-size:22px;font-weight:750;margin-top:5px;letter-spacing:-.5px;white-space:nowrap;overflow:hidden;text-overflow:clip}
@media(max-width:559px){ .kpi .k-val{font-size:18px} }
.kpi .k-sub{font-size:12px;color:var(--ink2);margin-top:3px}
.k-val.pos{color:var(--green)} .k-val.neg{color:var(--red)} .k-val.gold{color:var(--gold)}

/* progress / meters */
.meter{height:9px;border-radius:999px;background:var(--panel2);overflow:hidden;border:1px solid var(--line)}
/* Календарь по дням (пункт 4) */
.cal-day{display:flex;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line)}
.cal-day:last-child{border-bottom:none}
.cal-day.today{background:color-mix(in srgb,var(--gold) 8%,transparent)}
.cal-day.gap{background:color-mix(in srgb,var(--red) 9%,transparent)}
.cal-dnum{width:46px;flex:none;text-align:center}
.cal-dnum .d{font-size:19px;font-weight:750;line-height:1.05}
.cal-dnum .w{font-size:10px;color:var(--ink3)}
.cal-bal{margin-left:auto;text-align:right;flex:none;padding-left:8px}
.cal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:6px 0 14px}
.cal-wd,.cal-blank{display:none}
.cal-cell{min-height:50px;border:1px solid var(--line);border-radius:10px;padding:5px 6px;display:flex;flex-direction:column;gap:1px}
.cal-cell.gap{border-color:var(--red);background:color-mix(in srgb,var(--red) 8%,transparent)}
.cal-cell.today{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
@media(max-width:559px){ .hide-mobile{display:none} }
.two-up{display:grid;gap:12px;grid-template-columns:1fr;margin-bottom:12px}
@media(min-width:560px){ .two-up{grid-template-columns:1fr 1fr} }
/* Модалка выбора подкатегории */
.subov{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;animation:subfade .15s ease}
@keyframes subfade{from{opacity:0}to{opacity:1}}
.subplate{background:var(--bg2);border-radius:22px 22px 0 0;max-width:520px;width:100%;padding:18px 16px calc(18px + env(safe-area-inset-bottom));box-shadow:var(--shadow);max-height:78vh;overflow:auto}
@media(min-width:560px){ .subov{align-items:center} .subplate{border-radius:22px;margin:0 16px} }
.subplate .opt{width:100%;justify-content:flex-start;margin-bottom:7px;padding:13px 14px;font-size:15px}
.meter>span{display:block;height:100%;border-radius:999px;background:var(--green);transition:width .5s ease}
.meter.warn>span{background:var(--amber)} .meter.bad>span{background:var(--red)}
.linrow{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:6px}

/* list rows */
.lrow{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line)}
[data-route="plan"] .lrow,[data-route="fact"] .lrow,[data-route="plan"] .linrow,[data-route="fact"] .linrow{border-bottom:none}
[data-route="plan"] .lrow,[data-route="fact"] .lrow{padding-top:8px;padding-bottom:8px}
.lrow:last-child{border-bottom:none}
.lrow .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:17px;flex:none;background:var(--panel2)}
.lrow .t1{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap} .lrow .t2{font-size:12px;color:var(--ink3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lrow .amt{margin-left:auto;font-weight:700;text-align:right;white-space:nowrap}
.amt.exp{color:var(--ink)} .amt.inc{color:var(--green)}

table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;color:var(--ink3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px 8px;border-bottom:1px solid var(--line2)}
.tbl td{padding:10px 8px;border-bottom:1px solid var(--line)}
.tbl tr:last-child td{border-bottom:none}
.tbl .right{text-align:right}

/* Sheet / modal */
.scrim{position:fixed;inset:0;background:rgba(24,34,47,.42);backdrop-filter:blur(3px);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--bg2);border-top-left-radius:22px;border-top-right-radius:22px;
  border:1px solid var(--line);border-bottom:none;padding:8px 18px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1),opacity .2s,visibility .2s;max-height:92dvh;overflow-y:auto;box-shadow:var(--shadow);
  opacity:0;visibility:hidden;pointer-events:none}
.sheet.show{transform:translateY(0);opacity:1;visibility:visible;pointer-events:auto}
.sheet .grab{width:40px;height:4px;border-radius:999px;background:var(--line2);margin:8px auto 12px}
.sheet h3{margin:0 0 14px;font-size:18px;font-weight:750}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--ink2);font-weight:600;margin-bottom:6px}
.seg{display:flex;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;padding:9px;border-radius:8px;font-weight:600;font-size:13px;color:var(--ink2)}
.seg button.active{background:var(--gold);color:var(--on-accent)}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.tilegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{display:flex;flex-direction:column;align-items:flex-start;gap:10px;padding:14px;border-radius:16px;background:var(--panel2);border:1px solid var(--line);cursor:pointer;text-align:left;transition:transform .08s}
.tile:active{transform:scale(.97)}
.tileic{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px}
.tilename{font-weight:600;font-size:13.5px;color:var(--ink);line-height:1.25}
.opt{padding:9px 12px;border-radius:10px;background:var(--panel2);border:1px solid var(--line2);font-size:13px;font-weight:600;color:var(--ink2)}
.opt.active{border-color:var(--gold);color:var(--gold);background:color-mix(in srgb,var(--gold) 13%,transparent)}
.amount-big{font-size:34px;font-weight:750;text-align:center;letter-spacing:-1px;padding:6px;background:transparent;border:none;border-bottom:2px solid var(--line2);border-radius:0}
.amount-big:focus{border-color:var(--gold)}
.sheet-sticky{position:sticky;top:0;z-index:4;background:var(--bg2);margin:0 -18px 12px;padding:2px 18px 12px;box-shadow:0 8px 12px -10px rgba(0,0,0,.45)}
.sheet-sticky h3{margin:2px 0 12px}

.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(var(--nav-h) + 30px);z-index:80;
  background:#22303F;color:#F4F7FA;border:1px solid var(--line2);border-radius:12px;padding:11px 16px;font-size:13px;font-weight:600;

#gate .gbtn2{width:100%;max-width:240px;padding:15px;border-radius:12px;background:var(--gold);color:var(--on-accent);border:none;font-size:17px;font-weight:700;cursor:pointer}
#gate .gver{font-size:11px;color:var(--ink3);opacity:.65;margin-top:10px}

#gate .gface{font-size:14px;color:var(--ink3);background:none;border:none;text-decoration:underline}

@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}

.legend .lv{margin-left:auto;font-weight:600}
.divider{height:1px;background:var(--line);margin:14px 0}
.warnbox{background:rgba(229,84,78,.08);border:1px solid rgba(229,84,78,.3);border-radius:12px;padding:12px 14px;font-size:13px;color:#B23A36;margin-bottom:12px}
.okbox{background:rgba(63,176,123,.08);border:1px solid rgba(63,176,123,.3);border-radius:12px;padding:12px 14px;font-size:13px;color:#1F7A50;margin-bottom:12px}
.infobox{background:rgba(79,176,206,.07);border:1px solid rgba(79,176,206,.28);border-radius:12px;padding:12px 14px;font-size:13px;color:#276B86;margin-bottom:12px}
small.hint{color:var(--ink3);font-size:11.5px}

  .topbar{height:60px;padding:0 22px;position:fixed;top:0;left:0;right:0}
  .shell{padding-top:60px}
  .sidebar{top:60px;height:calc(100dvh - 60px)}
  .bottomnav,.fab{display:none}
  .shell{padding-left:var(--sidebar-w)}
  .sidebar{display:flex;flex-direction:column;width:var(--sidebar-w);background:color-mix(in srgb,var(--panel) 92%,transparent);backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4);
    border-right:1px solid var(--line);padding:14px 12px;position:fixed;left:0;top:var(--top-h);height:calc(100dvh - var(--top-h));overflow-y:auto;gap:3px;z-index:30}
  .sidebar .navi{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;color:var(--ink2);font-weight:600;font-size:14px}
  .sidebar .navi .ic{font-size:18px;width:22px;text-align:center}
  .sidebar .navi.active{background:color-mix(in srgb,var(--gold) 13%,transparent);color:var(--gold)}

  .sidebar .sgroup{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);font-weight:700;padding:14px 13px 6px}
  .sidebar .desk-add{margin:6px 4px 10px}
  .main{padding:24px 28px 60px}
  .g2{grid-template-columns:repeat(2,minmax(0,1fr))} .g3{grid-template-columns:repeat(3,minmax(0,1fr))} .g4{grid-template-columns:repeat(4,minmax(0,1fr))} .dg3{grid-template-columns:repeat(3,minmax(0,1fr))} .dg4{grid-template-columns:repeat(4,minmax(0,1fr))}
  .cal-grid{grid-template-columns:repeat(7,1fr);margin:4px 0 16px}

  .cal-cell.gap{border-color:var(--red);background:color-mix(in srgb,var(--red) 8%,transparent)}
  .cal-cell.today{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
  .sheet{left:50%;right:auto;top:50%;bottom:auto;transform:translate(-50%,-46%) scale(.98);width:520px;max-width:94vw;
    border-radius:20px;border:1px solid var(--line);max-height:88dvh}
  .sheet.show{transform:translate(-50%,-50%) scale(1)}

}

  .topbar{gap:6px;padding-left:10px;padding-right:10px}

  .topbar .month{margin-left:auto}
  .topbar .month .lbl{min-width:70px;font-size:12.5px}
  .topbar .month button{width:26px;height:26px;font-size:16px}
  .me{padding:0 7px}
  .me .nm{display:none}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
/* --- лёгкие анимации взаимодействия --- */
.btn,.chip,.opt,.iconbtn,.fab,.gbtn2,.navi,.tag,.pill{transition:transform .1s cubic-bezier(.34,1.56,.64,1),filter .15s ease,background .15s ease,box-shadow .15s ease,color .15s ease}
.btn:active,.chip:active,.opt:active,.iconbtn:active,.gbtn2:active,.fab:active{transform:scale(.92)}
.btn.primary:active,.gbtn2:active,.fab:active{box-shadow:0 0 0 4px color-mix(in srgb,var(--gold) 25%,transparent)}
.card{transition:box-shadow .18s ease,border-color .18s ease,transform .18s ease}
.lrow,.navi{transition:background .12s ease,transform .1s ease}
.lrow:active{transform:scale(.99)}
input,select,textarea{transition:border-color .15s ease,box-shadow .15s ease,background .15s ease}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px color-mix(in srgb,var(--gold) 22%,transparent);outline:none}
.meter>span{transition:width .45s cubic-bezier(.34,1.3,.5,1)}
.opt.active,.chip.active{box-shadow:0 0 0 2px color-mix(in srgb,var(--gold) 40%,transparent)}
@media(hover:hover){
  .btn:hover,.chip:hover,.opt:hover{filter:brightness(1.08)}

}

.txnGlow.exp{background:radial-gradient(ellipse at 50% 45%,color-mix(in srgb,var(--red) 34%,transparent),transparent 62%);animation:glowPulse 1s ease}
@keyframes glowPulse{0%{opacity:0}20%{opacity:1}100%{opacity:0}}
.txnFly{position:fixed;left:50%;top:56%;font-size:40px;font-weight:900;z-index:401;pointer-events:none;letter-spacing:-1px;animation:flyUp 1.15s cubic-bezier(.25,.8,.3,1) forwards}

var qrcode = function() {

  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {

          } else {
            _modules[row + r][col + c] = false;
          }
        }

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {

        }

    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

                  || (r == 0 && c == 0) ) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);

      }

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

        } else if (i < 8) {

        } else {

        } else {
          _modules[8][15 - i - 1] = mod;
        }

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

          if (row < 0 || _moduleCount <= row) {

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

      }

      }

        if(alive) rm.u[k]=alive; if(dead) rm.d[k]=dead;

        if(rec!=null) out.push(rec);
      });
      R[coll]=out;
    } else if(cfg.type==='map'){
      const oa=A[coll]||{}, ob=B[coll]||{};
      Object.keys(oa).forEach(k=>allKeys.add(k)); Object.keys(ob).forEach(k=>allKeys.add(k));
      const out={};
      allKeys.forEach(k=>{
        const alive=_maxs(uA[k],uB[k]), dead=_maxs(dA[k],dB[k]);
        if(alive) rm.u[k]=alive; if(dead) rm.d[k]=dead;
        if(dead && dead>=alive) return;
        out[k] = ((uA[k]||"")>=(uB[k]||"") && (k in oa)) ? oa[k] : ((k in ob)?ob[k]:oa[k]);
      });
      R[coll]=out;
    } else {
      const a=uA["_"]||"", b=uB["_"]||""; if(_maxs(a,b)) rm.u["_"]=_maxs(a,b);
      R[coll] = a>=b ? A[coll] : B[coll];
    }
  }
  if(Array.isArray(R.netWorthHistory)) R.netWorthHistory.sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  return R;
}

  const actual=txnsOfMonth(mm).filter(t=>t.type==='expense'&&reducesCash(t.categoryId,t.subId)).reduce((a,t)=>a+(+t.amount||0),0);
  if(mm<rm) return actual;
  if(mm===rm){ const rem=plannedForMonth(mm).filter(p=>p.type==='expense'&&reducesCash(p.categoryId,p.subId)).reduce((a,p)=>a+p.amount,0); return actual+rem; }
  const planCO=planItemsForMonth(mm).filter(p=>p.type==='expense'&&reducesCash(p.categoryId,p.subId)).reduce((a,p)=>a+p.amount,0);
  return planCO||estimatedMonthlyExpense();
}
function freeFlow(k){ return Math.max(0, projIncome(k)-projCashOut(k)); }
function projConsumption(mm){ const rm=realMonth(); const act=monthExpense(mm); if(mm<rm)return act; const rem=plannedForMonth(mm).filter(p=>p.type==='expense'&&!isCapCat(p.categoryId)).reduce((a,p)=>a+p.amount,0); if(mm===rm)return act+rem; return planItemsForMonth(mm).filter(p=>p.type==='expense'&&!isCapCat(p.categoryId)).reduce((a,p)=>a+p.amount,0); }
function projCapital(mm){ const rm=realMonth(); const act=monthCapital(mm); if(mm<rm)return act; const rem=plannedForMonth(mm).filter(p=>p.type==='expense'&&isCapCat(p.categoryId)).reduce((a,p)=>a+p.amount,0); if(mm===rm)return act+rem; return planItemsForMonth(mm).filter(p=>p.type==='expense'&&isCapCat(p.categoryId)).reduce((a,p)=>a+p.amount,0); }
// факт-отток из кэша за месяц (потребление+тело долга+десятина)
function actualCashOut(mm){ return txnsOfMonth(mm).filter(t=>t.type==='expense'&&reducesCash(t.categoryId,t.subId)).reduce((a,t)=>a+(+t.amount||0),0); }
// единая линия кэша: прошлое (факт) → текущий (факт+остаток плана) → будущее (план/оценка)
function forecastSeries(back){
  const rm=realMonth(); back=(back==null?6:back);
  let start=addMonths(rm,-back); const fdm=firstDataMonth(); if(fdm>start) start=fdm;
  const end=addMonths(rm,state.settings.horizon-1);
  const months=[]; for(let mm=start; mm<=end; mm=addMonths(mm,1)) months.push(mm);
  let bal=familyCashAsOf(months[0]+"-01");
  return months.map(mm=>{
    const past=mm<rm;
    const yld=(mm>rm && typeof assetCashYieldForMonth==='function')?assetCashYieldForMonth(mm):0;
    const inc = past ? monthIncome(mm) : projIncome(mm)+yld;
    const cashOut = past ? actualCashOut(mm) : projCashOut(mm);
    const allExp = past ? (monthExpense(mm)+monthCapital(mm)) : projExpense(mm);
    const toCapital = Math.max(0, allExp-cashOut);
    const delta = inc-cashOut; bal+=delta;
    return {mm,inc,cashOut,toCapital,delta,balance:bal,past,isCur:mm===rm};
  });
}

/* ---------- закрытие месяца ---------- */
function realMonth(){ return ym(new Date()); }
function firstDataMonth(){ const ms=state.txns.map(t=>ym(t.date)).filter(Boolean).sort(); return ms.length?ms[0]:addMonths(realMonth(),-1); }
function unclosedMonths(){
  const end=addMonths(realMonth(),-1);
  const haveBal=state.assets.length||state.liabilities.length;
  let start=firstDataMonth(); if(!state.txns.length){ if(!haveBal) return []; start=end; }
  const res=[]; let m=start,g=0;
  while(m<=end && g<240){ if(!(state.snapshots||{})[m]) res.push(m); m=addMonths(m,1); g++; }
  return res;
}
function monthToClose(){ const u=unclosedMonths(); return u.length?u[0]:null; }
function isClosed(k){ return !!(state.snapshots||{})[k]; }
function suggestBalance(x){ return Math.max(0, Math.round(liabBalance(x))); }

function metrics(k){
  const snap=(state.snapshots||{})[k];
  if(snap){
    return {
      income:snap.income, expense:snap.expense, capital:snap.capital,
      balance: snap.income - snap.expense - snap.capital,
      savingsRate: snap.savingsRate, debtLoad: snap.debtLoad, fixedShare: snap.fixedShare,
      freeCashFlow: snap.income - snap.expense,
      cushionMonths: snap.cushionMonths, netWorth: snap.net, closed:true
    };
  }
  const inc=incomeForMonth(k), exp=monthExpense(k), cap=monthCapital(k);
  const debtPay=totalMinPayment();
  const fixed=fixedSpend(k), essential=essentialSpend(k);
  return {
    income:inc, expense:exp, capital:cap,
    balance: inc-exp-cap,
    savingsRate: inc>0? cap/inc : 0,
    debtLoad: inc>0? debtPay/inc : 0,
    fixedShare: inc>0? fixed/inc : 0,
    freeCashFlow: inc - exp,
    cushionMonths: (function(){const e=essentialMonthlyEstimate(); return e>0? liquidAssets()/e : (liquidAssets()>0?99:0);})(),
    netWorth: netWorth(), closed:false
  };
}
function liabInterestMonthly(){ return state.liabilities.reduce((a,x)=>a+(liabBalance(x)*(+x.rate||0)/12),0); }

/* ---------- sheet system ---------- */
const scrim=document.getElementById("scrim"), sheetEl=document.getElementById("sheet");
let sheetOpen=false, vvHandler=null;
function isMobile(){ return window.matchMedia("(max-width:899px)").matches; }
function fitSheet(){
  if(!window.visualViewport) return;
  if(!isMobile()){ sheetEl.style.maxHeight=""; sheetEl.style.bottom=""; return; }
  const vv=window.visualViewport;
  const kb=Math.max(0, window.innerHeight - vv.height - vv.offsetTop); // высота клавиатуры
  sheetEl.style.bottom = kb + "px";               // поднять окно над клавиатурой
  sheetEl.style.maxHeight = (vv.height - 6) + "px"; // вписать в видимую область
}
function openSheet(innerHTML,onMount){
  sheetEl.innerHTML='<div class="grab"></div>'+innerHTML;
  scrim.classList.add("show"); sheetEl.classList.add("show"); sheetOpen=true;
  document.body.style.overflow="hidden";
  if(window.visualViewport){ vvHandler=()=>fitSheet();
    window.visualViewport.addEventListener("resize",vvHandler);
    window.visualViewport.addEventListener("scroll",vvHandler); }
  (window.requestAnimationFrame||function(f){setTimeout(f,16);})(fitSheet); setTimeout(fitSheet,60); setTimeout(fitSheet,300);
  if(onMount) onMount(sheetEl);
}
function closeSheet(){
  scrim.classList.remove("show"); sheetEl.classList.remove("show"); sheetOpen=false; document.body.style.overflow="";
  if(window.visualViewport && vvHandler){ window.visualViewport.removeEventListener("resize",vvHandler); window.visualViewport.removeEventListener("scroll",vvHandler); vvHandler=null; }
  sheetEl.style.maxHeight=""; sheetEl.style.bottom="";
}
scrim.addEventListener("click",closeSheet);
// Свайп вниз для закрытия шторки (моб.): тянем от «ручки» или когда контент прокручен вверх
let _shDrag=null;
sheetEl.addEventListener("touchstart",e=>{
  if(!sheetOpen || !isMobile() || e.touches.length!==1) { _shDrag=null; return; }
  _shDrag={ y0:e.touches[0].clientY, dy:0, active:false,
    fromGrab:!!(e.target&&e.target.classList&&e.target.classList.contains("grab")) };
},{passive:true});
sheetEl.addEventListener("touchmove",e=>{
  if(!_shDrag) return;
  const dy=e.touches[0].clientY-_shDrag.y0;
  if(dy>0 && (_shDrag.fromGrab || sheetEl.scrollTop<=0)){
    _shDrag.active=true; _shDrag.dy=dy;
    sheetEl.style.transition="none";
    sheetEl.style.transform="translateY("+dy+"px)";
    if(e.cancelable) e.preventDefault();
  }
},{passive:false});
function _shEnd(){
  if(!_shDrag){ return; }
  const dy=_shDrag.dy, active=_shDrag.active; _shDrag=null;
  sheetEl.style.transition="";
  sheetEl.style.transform="";
  if(active && dy>90) closeSheet();
}
sheetEl.addEventListener("touchend",_shEnd);
sheetEl.addEventListener("touchcancel",_shEnd);

function isParticipant(){ try{ if(localStorage.getItem(LS_PREVIEW)==="1") return true; }catch(e){} if((ACCT&&ACCT.role)!=="member") return false; const m=memberById(ACCT&&ACCT.memberId); return !m || m.accountType!=='full'; }

// QR как SVG-строка (офлайн, без внешних запросов) — для ссылки-приглашения
function qrSVG(text, cell, margin){ try{ const q=window.qrcode(0,'M'); q.addData(String(text)); q.make(); return q.createSvgTag({cellSize:cell||4, margin:(margin==null?4:margin), scalable:true}); }catch(e){ return ''; } }
function inviteLink(token,secret){ let base=''; try{ base=(location.origin||'')+(location.pathname||''); }catch(e){} return base.replace(/#.*$/,'')+'#invite='+token+'.'+secret; }
function parseInvite(){ try{ const m=/[#&]invite=([0-9a-fA-F]+)\.([A-Za-z0-9]+)/.exec(location.hash||''); if(m) return {token:m[1], secret:m[2]}; }catch(e){} return null; }
function copyText(t){ try{ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(()=>toast("Скопировано")).catch(()=>fallbackCopy(t)); return; } }catch(e){} fallbackCopy(t); }
function fallbackCopy(t){ try{ const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); toast("Скопировано"); }catch(_){ toast("Скопируйте ссылку вручную"); } }

// Мастер: создать ссылку-приглашение (со ссылкой + QR)
function openInviteSheet(presetLabel){
  const labels=(state.members||[]).map(m=>m.name).filter(Boolean);
  openSheet(`<h3>Пригласить участника</h3>
    <p class="muted" style="font-size:12.5px;margin-top:-6px">Выберите, под каким именем участник будет отмечаться в общем бюджете (или введите новое). Затем отправьте ссылку или покажите QR-код.</p>
    <div class="field"><label>Имя участника</label>
      <div class="opts" id="invLabels">${labels.map(n=>`<button class="opt ${presetLabel===n?'active':''}" data-lbl="${esc(n)}">${esc(n)}</button>`).join('')}<button class="opt" data-lbl="__new">＋ Другое имя</button></div>
      <input id="invName" placeholder="имя участника" autocomplete="off" style="margin-top:8px;${(labels.length&&presetLabel==null)||presetLabel!=null?'display:none':''}"></div>
    <div class="field"><label>Тип аккаунта</label>
      <div class="opts" id="invType"><button class="opt active" data-type="simple">Упрощённый</button><button class="opt" data-type="full">Полный</button></div>
      <small class="hint" id="invTypeHint">Упрощённый: свой кэш, траты и личное планирование, без семейной аналитики и баланса.</small></div>
    <button class="btn primary block" id="invMake" style="padding:13px">Создать ссылку-приглашение</button>
    <div id="invOut" style="margin-top:12px"></div>`, el=>{
    let chosen = presetLabel!=null ? presetLabel : (labels.length ? null : '');
    let acctType='simple';
    el.querySelectorAll("[data-type]").forEach(b=>b.onclick=()=>{ el.querySelectorAll("[data-type]").forEach(x=>x.classList.remove("active")); b.classList.add("active"); acctType=b.dataset.type; el.querySelector("#invTypeHint").textContent = acctType==='simple' ? "Упрощённый: свой кэш, траты и личное планирование, без семейной аналитики и баланса." : "Полный: личные финансы плюс семейный вид (общий бюджет, капитал, долги, цели). Чужое личное — только итогом."; });
    const nameInp=el.querySelector("#invName");
    el.querySelectorAll("[data-lbl]").forEach(b=>b.onclick=()=>{
      el.querySelectorAll("[data-lbl]").forEach(x=>x.classList.remove("active")); b.classList.add("active");
      if(b.dataset.lbl==="__new"){ chosen=null; nameInp.style.display=""; setTimeout(()=>nameInp.focus(),50); }
      else { chosen=b.dataset.lbl; nameInp.style.display="none"; }
    });
    el.querySelector("#invMake").onclick=async()=>{
      const name = (chosen!=null ? chosen : nameInp.value.trim());
      if(!name){ toast("Выберите или введите имя участника"); return; }
      ensureOwnerLabel();   // у владельца появляется своя метка → включается вид «Я/Семья»
      // метка участника + тип аккаунта (тип прочитает клиент участника после присоединения)
      let mem=(state.members||[]).find(x=>String(x.name).trim().toLowerCase()===name.toLowerCase());
      if(!mem){ mem={id:uid(),name,emoji:'🙂',color:MEMBER_COLORS[(state.members||[]).length%MEMBER_COLORS.length],accountType:acctType,startCash:0,startCashDate:todayISOdate()}; state.members=state.members||[]; state.members.push(mem); }
      mem.accountType=acctType; save();
      const btn=el.querySelector("#invMake"); btn.disabled=true; btn.textContent="Создаём…";
      try{
        const {token,secret}=await ACCT.createInvite(name,72);
        const link=inviteLink(token,secret);
        const out=el.querySelector("#invOut");
        out.innerHTML=`<div class="okbox" style="margin:0 0 10px">Ссылка готова для «${esc(name)}». Действует 72 часа и рассчитана на одного участника.</div>
          <div class="field"><label>Ссылка-приглашение</label><input id="invLink" readonly value="${esc(link)}" style="font-size:12px"></div>
          <div class="row" style="gap:8px"><button class="btn primary" id="invCopy" style="flex:1;padding:12px">📋 Скопировать ссылку</button><button class="btn" id="invQr" style="padding:12px">▦ QR-код</button></div>
          <div id="invQrBox" style="margin-top:12px;display:none;text-align:center"></div>
          <p class="muted" style="font-size:12px;margin-top:10px">Отправьте ссылку в мессенджере или дайте отсканировать QR. Участник откроет её, создаст свой вход и попадёт в общий бюджет под именем «${esc(name)}».</p>`;
        out.querySelector("#invCopy").onclick=()=>copyText(link);
        out.querySelector("#invLink").onclick=e=>{ try{e.target.select();}catch(_){}}; 
        out.querySelector("#invQr").onclick=()=>{ const b=out.querySelector("#invQrBox"); if(b.style.display==='none'){ b.innerHTML=`<div style="max-width:230px;margin:0 auto;background:#fff;padding:12px;border-radius:14px">${qrSVG(link,4,2)}</div>`; b.style.display='block'; } else b.style.display='none'; };
        btn.textContent="Создать ещё одну ссылку";
      }catch(e){ toast(e.message==='not_owner'?'Только владелец может приглашать':'Не удалось создать приглашение (нет связи с сервером)'); btn.textContent="Создать ссылку-приглашение"; }
      btn.disabled=false;
    };
  });
}

// Единая карточка: участники (метки) + члены семьи (аккаунты) в одном месте
function familyMembersCard(){
  const card=h(`<div class="card"><h3>Семья и участники <span class="pill" style="margin-left:auto">общий бюджет</span></h3>
    <p class="muted" style="font-size:12.5px;margin-top:-6px">Каждый участник — имя-метка в бюджете, её значок = «фото». Пригласите под меткой члена семьи по ссылке — его операции пойдут в общий бюджет под этим именем. Аналитику видите только вы.</p>
    <div id="fmList"><div class="dim" style="font-size:12px;padding:6px 2px">Загрузка…</div></div>
    <button class="btn ghost block" id="fmAdd" style="margin-top:8px">＋ Добавить участника</button></div>`);
  card.querySelector("#fmAdd").onclick=()=>editMember();
  const list=card.querySelector("#fmList");
  const draw=(accounts, offline)=>{
    const byLabel={}; (accounts||[]).filter(a=>a.role!=='owner').forEach(a=>{ const k=String(a.member_label||'').trim().toLowerCase(); if(k) byLabel[k]=a; });
    list.innerHTML='';
    (state.members||[]).forEach(m=>{
      const acc=byLabel[String(m.name).trim().toLowerCase()];
      const me = curMember()===m.id;
      const status = acc ? ('участник семьи · '+esc(acc.email)) : (me ? 'это вы (владелец)' : 'только метка — можно пригласить');
      const row=h(`<div class="lrow" style="padding:9px 2px;gap:8px">
        <button class="ic" data-edit style="background:${tint(m.color,16)};color:${esc(m.color)};border:none;cursor:pointer" title="изменить имя и значок">${esc(m.emoji||'👤')}</button>
        <div style="flex:1;min-width:0"><div class="t1">${esc(m.name)}</div><div class="t2">${status}</div></div>
        ${acc?`<button class="btn sm ghost" data-unlink="${esc(acc.user_id)}">Отвязать</button>`:(offline||me?'':`<button class="btn sm" data-invite="${esc(m.name)}">Пригласить</button>`)}
        <button class="iconbtn" data-edit2 title="изменить">✎</button></div>`);
      row.querySelectorAll("[data-edit],[data-edit2]").forEach(b=>b.onclick=()=>editMember(m.id));
      const inv=row.querySelector("[data-invite]"); if(inv) inv.onclick=()=>openInviteSheet(m.name);
      const unl=row.querySelector("[data-unlink]"); if(unl) unl.onclick=()=>{ if(confirm("Отвязать «"+m.name+"» от семьи? Аккаунт участника потеряет доступ к общему бюджету. Метка и прошлые операции останутся.")){ ACCT.revokeMember(unl.dataset.unlink).then(()=>{toast("Участник отвязан"); render_current();}).catch(()=>toast("Не удалось отвязать")); } };
      list.appendChild(row);
    });
    if(!(state.members||[]).length) list.innerHTML='<div class="dim" style="font-size:12px;padding:2px">Пока никого. Добавьте участника кнопкой ниже, затем пригласите под ним члена семьи.</div>';
    if(offline) list.appendChild(h('<p class="muted" style="font-size:11.5px;margin-top:6px">Статус семьи недоступен (нет связи с сервером) — показаны метки; приглашения временно недоступны.</p>'));
  };
  if(ACCT.linked) ACCT.listMembers().then(a=>draw(a,false)).catch(()=>draw([],true));
  else draw([],true);
  return card;
}

function go(r){ if((isSimpleMode()||isParticipant()) && SIMPLE_NAV.indexOf(r)<0) r="today"; route=r; renderNav(); render(); window.scrollTo(0,0); }
function renderNav(){
  const simple=isSimpleMode()||isParticipant();
  // sidebar
  const sb=document.getElementById("sidebar"); sb.innerHTML="";
  sb.appendChild(h('<button class="btn primary block desk-add" id="deskAdd">＋ Добавить операцию</button>'));
  let lastGrp="";
  NAV.filter(n=>!simple || SIMPLE_NAV.indexOf(n.id)>=0).forEach(n=>{
    if(n.grp!==lastGrp){ sb.appendChild(h('<div class="sgroup">'+esc(n.grp)+'</div>')); lastGrp=n.grp; }
    const b=h('<button class="navi'+(route===n.id?' active':'')+'"><span class="ic">'+n.icon+'</span><span>'+esc(n.name)+'</span></button>');
    b.onclick=()=>go(n.id); sb.appendChild(b);
  });
  sb.querySelector("#deskAdd").onclick=openAddTxn;
  // bottom nav
  const bn=document.getElementById("bottomnav"); bn.innerHTML="";
  const bottomIds = simple ? SIMPLE_NAV : BOTTOM;
  bottomIds.forEach(id=>{ const n=NAV.find(x=>x.id===id);
    const b=h('<button class="'+(route===id?'active':'')+'"><span class="ic">'+n.icon+'</span><span>'+esc(n.name)+'</span></button>');
    b.onclick=()=>go(id); bn.appendChild(b);
  });
  if(!simple){
    const more=h('<button class="'+(BOTTOM.indexOf(route)<0?'active':'')+'"><span class="ic">⋯</span><span>Ещё</span></button>');
    more.onclick=openMore; bn.appendChild(more);
  }
}
function openMore(){
  const items=NAV.filter(n=>BOTTOM.indexOf(n.id)<0);
  const colorOf=(id)=>({plan:'var(--grp2)',calendar:'#3B82F6',fact:'var(--green)',forecast:'#8B5CF6',history:'#0EA5E9',balance:'var(--gold)',debts:'var(--red)',capital:'var(--gold)',help:'var(--ink3)',settings:'var(--ink3)'}[id]||'var(--gold)');
  const groups={}; items.forEach(n=>{ const g=n.grp||'Разделы'; (groups[g]=groups[g]||[]).push(n); });
  let html='<h3 style="margin:0 0 2px">Разделы</h3>';
  Object.keys(groups).forEach(g=>{
    html+=`<div class="eyebrow" style="margin:14px 0 9px">${esc(g)}</div><div class="tilegrid">`;
    groups[g].forEach(n=>{ const c=colorOf(n.id);
      html+=`<button class="tile" data-go="${n.id}"><span class="tileic" style="background:${tint(c,13)};color:${c}">${n.icon}</span><span class="tilename">${esc(n.name)}</span></button>`; });
    html+='</div>';
  });
  openSheet(html, el=>{ el.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{closeSheet();go(b.dataset.go);}); });
}

  const btn=document.getElementById("meBtn"), ico=document.getElementById("meIco");
  const m=memberById(curMember());
  if(m){ ico.textContent=m.emoji||"👤"; btn.style.borderColor=tint(m.color,45);

function openMonthPicker(){
  let year=(+curMonth.split("-")[0]); const nowK=ym(new Date());
  function cells(){ return MONTHS_RU_SHORT.map((mn,i)=>{ const k=year+"-"+String(i+1).padStart(2,"0"); return `<button class="mp-cell${k===curMonth?' sel':''}${k===nowK?' now':''}" data-k="${k}">${mn}</button>`; }).join(""); }
  openSheet(`<h3 style="text-align:center">Месяц</h3>
    <div class="mpick-year"><button class="mp-nav" data-y="-1">‹</button><span id="mpY">${year}</span><button class="mp-nav" data-y="1">›</button></div>
    <div class="mp-grid" id="mpGrid">${cells()}</div>
    <button class="btn ghost block" id="mpToday" style="margin-top:14px">Текущий месяц (${ymShort(nowK)})</button>`,
  el=>{
    function bind(){ el.querySelectorAll("[data-k]").forEach(b=>b.onclick=()=>{ curMonth=b.dataset.k; closeSheet(); render_current(); }); }
    el.querySelectorAll(".mp-nav").forEach(b=>b.onclick=()=>{ year+=(+b.dataset.y); el.querySelector("#mpY").textContent=year; el.querySelector("#mpGrid").innerHTML=cells(); bind(); });
    el.querySelector("#mpToday").onclick=()=>{ curMonth=nowK; closeSheet(); render_current(); };
    bind();
  });
}
function performClose(k){
  const inc=incomeForMonth(k), exp=monthExpense(k), cap=monthCapital(k);
  const debtPay=totalMinPayment(), interest=liabInterestMonthly();
  const fixed=fixedSpend(k), essential=essentialSpend(k), liquid=liquidAssets();
  state.snapshots=state.snapshots||{};
  state.snapshots[k]={ closedAt:nowISO(), assets:totalAssets(), liab:totalLiab(), net:netWorth(),
    assetsList:JSON.parse(JSON.stringify(state.assets)), liabList:JSON.parse(JSON.stringify(state.liabilities)),
    income:inc, expense:exp, capital:cap, debtPay, interest,
    savingsRate: inc>0?cap/inc:0,
    debtLoad: inc>0?debtPay/inc:0,
    fixedShare: inc>0?fixed/inc:0,
    cushionMonths: essential>0?liquid/essential:(liquid>0?99:0), liquid };
  state.netWorthHistory=(state.netWorthHistory||[]).filter(x=>ym(x.date)!==k);
  state.netWorthHistory.push({date:k+"-15T12:00:00.000Z", assets:totalAssets(), liabilities:totalLiab(), net:netWorth()});
  state.netWorthHistory.sort((a,b)=>a.date.localeCompare(b.date));
  save();
}
function openMonthClose(k){

function frequentCats(){
  const f=state.freq||{};
  return catsForEntry().slice().sort((a,b)=>(f[b.id]||0)-(f[a.id]||0));
}

function openSubPicker(categoryId, current, onPick){
  const subs=subsOf(categoryId);
  const ov=h(`<div class="subov"><div class="subplate">
     <div style="font-weight:700;font-size:16px;margin-bottom:2px">Подкатегория</div>

       ${isParticipant()?'':'<button class="opt" data-sub="__add" style="color:var(--ink3)">＋ новая подкатегория</button>'}
     </div>
     <div class="dim" style="text-align:center;font-size:11px;margin-top:6px">Тап вне окна — сменить категорию</div>
  </div></div>`);
  const close=()=>{ try{ov.remove();}catch(e){} };
  ov.onclick=(e)=>{ if(e.target===ov){ close(); if(onPick) onPick(null,true); } };
  ov.querySelectorAll("[data-sub]").forEach(b=>b.onclick=(e)=>{ e.stopPropagation();
    if(b.dataset.sub==="__add"){ const nm=prompt("Название новой подкатегории:"); if(nm&&nm.trim()){ const s={id:uid(),categoryId,name:nm.trim()}; state.subcategories.push(s); save(); close(); if(onPick) onPick(s.id); } return; }

  });
  document.body.appendChild(ov);
}

function dayPlan(k, memberId){
  const monthLen=new Date(+k.slice(0,4),+k.slice(5,7),0).getDate();
  const mObj=memberId?memberById(memberId):null;
  const start=mObj?memberBalanceAsOf(mObj,k+"-01"):startCashOfMonth(k);
  const rm=realMonth();
  const isCur=(k===rm), isFuture=(k>rm);
  const todayDay=isCur?new Date().getDate():(monthLen+1);
  const txM=txnsOfMonth(k).filter(t=>!memberId||(t.memberId||null)===memberId);
  const plan=plannedForMonth(k).filter(p=>!memberId||(p.memberId||null)===memberId);
  const days=[]; let bal=start, firstGap=null, plannedRecurExp=0;
  for(let d=1; d<=monthLen; d++){
    const date=k+"-"+String(d).padStart(2,"0");
    const items=[]; let ins=0, outs=0;
    txM.filter(t=>+String(t.date).slice(8,10)===d).forEach(t=>{
      const amt=+t.amount||0;
      if(t.type==="income"){ ins+=amt; items.push({kind:"fact",type:"income",label:catName(t.categoryId),amount:amt}); }

      else { outs+=amt; items.push({kind:"fact",type:"expense",label:(t.comment||catName(t.categoryId)),amount:amt}); }
    });

    plan.forEach(p=>{

      else if(isCur) ed=Math.max(p.day, todayDay);
      else return; // прошлый месяц — план не показываем
      if(ed!==d) return;

      if(p.type==="income"){ ins+=amt; items.push({kind:"plan",type:"income",label:p.label,amount:amt,overdue:isCur&&p.day<todayDay}); }

        else { outs+=amt; items.push({kind:"plan",type:"expense",label:p.label,amount:amt,overdue:isCur&&p.day<todayDay}); }
      }
    });

    if(bal<0 && firstGap===null) firstGap=d;

  }

  const committed=monthExpense(k)+monthCapital(k)+plannedRecurExp;

      <div class="field"><label>Название (необязательно)</label><input id="rLabel" value="${esc(draft.label)}" placeholder="напр. Аренда квартиры"></div>
      <button class="btn primary block" id="rSave" style="padding:13px">Сохранить</button>
      ${id?'<button class="btn danger block" id="rDel" style="margin-top:8px">Удалить</button>':''}
      <button class="btn ghost block" id="rCancel" style="margin-top:8px">Отмена</button>`,
    el=>{
      const cap=()=>{ draft.amount=el.querySelector("#rAmt").value; draft.label=el.querySelector("#rLabel").value; if(el.querySelector("#rDay"))draft.day=el.querySelector("#rDay").value; if(el.querySelector("#rDate"))draft.date=el.querySelector("#rDate").value; };
      attachNum(el.querySelector("#rAmt"));
      el.querySelectorAll("[data-type]").forEach(b=>b.onclick=()=>{ cap(); draft.type=b.dataset.type; draft.categoryId=null; draft.subId=null; render(); });
      el.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{ cap(); draft.categoryId=b.dataset.cat; const ss=subsOf(draft.categoryId); draft.subId=ss.length===1?ss[0].id:null; render(); });
      el.querySelectorAll("[data-sub]").forEach(b=>b.onclick=()=>{ cap(); draft.subId=b.dataset.sub; render(); });
      el.querySelectorAll("[data-mode]").forEach(b=>b.onclick=()=>{ cap(); draft.repeat=(b.dataset.mode==="repeat"); render(); });
      el.querySelector("#rCancel").onclick=()=>closeSheet();
      el.querySelector("#rSave").onclick=()=>{
        const amount=parseFloat(String(el.querySelector("#rAmt").value).replace(/\s/g,"").replace(",",".")); 
        if(!amount||amount<=0){ toast("Введите сумму"); return; }
        if(!draft.categoryId){ toast("Выберите категорию"); return; }
        const label=el.querySelector("#rLabel").value.trim();
        if(draft.type==="expense" && subsOf(draft.categoryId).length && !draft.subId){ toast("Выберите подкатегорию — плановая должна уходить в конкретную подкатегорию"); return; }
        const subId = draft.type==="expense" ? (draft.subId||null) : null;
        let rec;
        if(draft.repeat){ let day=parseInt(el.querySelector("#rDay").value,10)||1; if(day<1)day=1; if(day>31)day=31; rec={type:draft.type,amount,categoryId:draft.categoryId,subId,repeat:true,day,date:null,label}; }
        else { const date=el.querySelector("#rDate").value||todayISOdate(); rec={type:draft.type,amount,categoryId:draft.categoryId,subId,repeat:false,day:null,date,label}; }
        if(id){ Object.assign(p,rec); }
        else { state.planned.push({id:uid(),memberId:curMember(),active:true,...rec}); }
        save(); closeSheet(); render_current(); toast("Плановая сохранена");
      };
      if(id){ el.querySelector("#rDel").onclick=()=>{ if(confirm("Удалить плановую операцию?")){ state.planned=state.planned.filter(x=>x.id!==id); save(); closeSheet(); render_current(); toast("Удалено"); } }; }
    });
  };
  render();
}

let opsFilter={type:null,cat:null,sub:null,member:null,q:"",planned:false,capital:false,period:{mode:"month",from:"",to:""}};
function opsPeriodLabel(){ const p=opsFilter.period; if(p.mode==="year")return curMonth.slice(0,4)+" год"; if(p.mode==="all")return "всё время"; if(p.mode==="range")return (p.from?fmtDate(p.from):"…")+" – "+(p.to?fmtDate(p.to):"…"); return ymLabel(curMonth); }
function opsBaseTxns(){
  const p=opsFilter.period||{mode:"month"};
  let list=state.txns.slice();
  if(p.mode==="month") list=list.filter(t=>t.date.slice(0,7)===curMonth);
  else if(p.mode==="year") list=list.filter(t=>t.date.slice(0,4)===curMonth.slice(0,4));
  else if(p.mode==="range"){ const f=p.from||"0000-01-01", to=p.to||"9999-12-31"; list=list.filter(t=>t.date>=f && t.date<=to); }
  return list;
}
function pgOps(v){

  perRow.querySelectorAll("[data-p]").forEach(b=>b.onclick=()=>{ opsFilter.period.mode=b.dataset.p; render_current(); });

  if(pm==="range"){

    rr.querySelector("#opsFrom").onchange=e=>{ opsFilter.period.from=e.target.value; render_current(); };
    rr.querySelector("#opsTo").onchange=e=>{ opsFilter.period.to=e.target.value; render_current(); };

  }
  // тип
  const typeRow=h(`<div class="chiprow" style="margin-bottom:6px"><button class="chip ${!opsFilter.type?'active':''}" data-t="">Все</button><button class="chip ${opsFilter.type==='income'?'active':''}" data-t="income">↑ Доходы</button><button class="chip ${opsFilter.type==='expense'?'active':''}" data-t="expense">↓ Расходы</button><button class="chip ${opsFilter.capital?'active':''}" data-cap="1">Капитал</button></div>`);
  typeRow.querySelectorAll("[data-t]").forEach(b=>b.onclick=()=>{ opsFilter.type=b.dataset.t||null; opsFilter.cat=null; opsFilter.sub=null; render_current(); });

  fbox.appendChild(typeRow);

  if(state.members.length){

  }
  // категории (с учётом типа)

    if(usedSubs.length){

      subRow.querySelectorAll("[data-s]").forEach(b=>b.onclick=()=>{ opsFilter.sub=b.dataset.s||null; render_current(); });
      fbox.appendChild(subRow);
    }
  }
  v.appendChild(fbox);
  const search=h(`<div class="field" style="margin:4px 0"><input id="opsQ" placeholder="🔎 Поиск по комментарию…" value="${esc(opsFilter.q)}"></div>`);
  v.appendChild(search);
  search.querySelector("#opsQ").oninput=e=>{opsFilter.q=e.target.value; renderOpsList();};
  const cont=h(`<div class="card" id="opsList"></div>`); v.appendChild(cont);
  function renderOpsList(){
    const box=document.getElementById("opsList"); box.innerHTML="";
    if(opsFilter.planned){
      let pl=(state.planned||[]).slice().sort((a,b)=>{ const ka=a.repeat?("A"+String(a.day||0).padStart(2,"0")):("B"+(a.date||"")); const kb=b.repeat?("A"+String(b.day||0).padStart(2,"0")):("B"+(b.date||"")); return ka<kb?-1:1; });
      if(opsFilter.type) pl=pl.filter(p=>p.type===opsFilter.type);
      if(opsFilter.member) pl=pl.filter(p=>(p.memberId||null)===opsFilter.member);

        row.onclick=()=>editPlanned(p.id); box.appendChild(row); });
      return;

    let l=opsBaseTxns().slice().sort((a,b)=>(b.date+(b.createdAt||"")).localeCompare(a.date+(a.createdAt||"")));

function fullDate(d){ const x=new Date(d); const wd=["вс","пн","вт","ср","чт","пт","сб"][x.getDay()]; return x.getDate()+" "+MONTHS_RU[x.getMonth()]+", "+wd; }

function plannedIncomeView(k){ return incForView().reduce((a,s)=>a+incomeSrcPlanned(k,s.id),0); }
function factIncomeView(k){ if(famView()) return monthIncome(k); return memberMonthIncome(activeMember(),k); }
function factExpenseView(k){ if(famView()) return monthExpense(k)+monthCapital(k); return memberMonthExpense(activeMember(),k); }

  v.appendChild(h(`<div class="card"><div class="row"><div><div class="eyebrow" style="margin:0">Плановый бюджет</div><div class="num" id="planBudgetBig" style="font-size:26px;font-weight:800;margin-top:4px">${fmt(total)}</div>

          relevant.forEach(su=>lines.push({label:su.name+(su.deleted?' (удалена)':''),pl:planSub(k,su.id),fc:subSpend(k,su.id),sub:true}));

        if(pl>0||fc>0) lines.push({label:(c.icon||'•')+' '+c.name+(c.deleted?' (удалена)':''),pl,fc});
      }
    });
    if(!lines.length)return;
    const card=h(`<div class="card"><h3><span style="width:9px;height:9px;border-radius:3px;background:${g.color};display:inline-block"></span>${esc(g.name)}</h3></div>`);

      </div>`));
    });
    v.appendChild(card);
  });
}

/* ============================================================
   CHARTS (inline SVG, без внешних библиотек)
   ============================================================ */
function donut(data,size){ // data:[{label,value,color}]
  size=size||150; const r=size/2, ir=r*0.62, cx=r, cy=r;
  const tot=data.reduce((a,d)=>a+d.value,0); if(tot<=0) return `<svg width="${size}" height="${size}"><circle cx="${cx}" cy="${cy}" r="${(r+ir)/2}" fill="none" stroke="var(--line)" stroke-width="${r-ir}"/></svg>`;
  let ang=-Math.PI/2, paths="";
  data.forEach(d=>{ const a2=ang+(d.value/tot)*Math.PI*2; const large=(a2-ang)>Math.PI?1:0;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi2=cx+ir*Math.cos(a2),yi2=cy+ir*Math.sin(a2),xi1=cx+ir*Math.cos(ang),yi1=cy+ir*Math.sin(ang);
    paths+=`<path d="M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} L${xi2} ${yi2} A${ir} ${ir} 0 ${large} 0 ${xi1} ${yi1} Z" fill="${d.color}"/>`; ang=a2; });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}<circle cx="${cx}" cy="${cy}" r="${ir-0.5}" fill="var(--panel)"/></svg>`;
}
function barsChart(rows,opt){ // rows:[{label, values:[{v,color}]}], stacked or grouped
  opt=opt||{}; const W=opt.w||640,H=opt.h||190, pad=28, bw=(W-pad*2)/rows.length;
  const max=Math.max(1,...rows.map(r=>opt.stacked? r.values.reduce((a,x)=>a+x.v,0) : Math.max(...r.values.map(x=>x.v),0)));
  let bars="",labels="";
  rows.forEach((r,i)=>{ const x0=pad+i*bw;
    if(opt.stacked){ let yAcc=H-24; r.values.forEach(val=>{ const hh=(val.v/max)*(H-46); yAcc-=hh; bars+=`<rect x="${x0+bw*0.18}" y="${yAcc}" width="${bw*0.64}" height="${Math.max(0,hh)}" fill="${val.color}"/>`; }); }
    else { const gw=bw*0.64/r.values.length; r.values.forEach((val,j)=>{ const hh=(val.v/max)*(H-46); bars+=`<rect x="${x0+bw*0.18+j*gw}" y="${H-24-hh}" width="${gw*0.85}" height="${Math.max(0,hh)}" fill="${val.color}" rx="1.5"/>`; }); }
    labels+=`<text x="${x0+bw/2}" y="${H-8}" fill="var(--ink3)" font-size="10" text-anchor="middle">${esc(r.label)}</text>`;
  });
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="overflow:visible"><line x1="${pad}" y1="${H-24}" x2="${W-pad}" y2="${H-24}" stroke="var(--line2)"/>${bars}${labels}</svg>`;
}
function lineChart(points,opt){ // points:[{label,v}]
  opt=opt||{}; const W=opt.w||640,H=opt.h||170,pad=30;
  const vals=points.map(p=>p.v); const min=Math.min(0,...vals),max=Math.max(1,...vals);
  const rng=max-min||1; const step=(W-pad*2)/Math.max(1,points.length-1);
  const xy=points.map((p,i)=>[pad+i*step, H-22-((p.v-min)/rng)*(H-40)]);
  const d=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=d+` L${xy[xy.length-1][0]} ${H-22} L${xy[0][0]} ${H-22} Z`;
  const zeroY=H-22-((0-min)/rng)*(H-40);
  let labels=points.map((p,i)=>(i%Math.ceil(points.length/6)===0)?`<text x="${xy[i][0]}" y="${H-6}" fill="var(--ink3)" font-size="10" text-anchor="middle">${esc(p.label)}</text>`:"").join("");
  let dots=xy.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.4" fill="var(--gold)"/>`).join("");
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"><line x1="${pad}" y1="${zeroY}" x2="${W-pad}" y2="${zeroY}" stroke="var(--line2)" stroke-dasharray="3 3"/><path d="${area}" fill="var(--gold)" opacity="0.10"/><path d="${d}" fill="none" stroke="var(--gold)" stroke-width="2"/>${dots}${labels}</svg>`;
}

function pgCashflow(v){
  v.appendChild(h(`<div class="page-title">Денежный поток</div><div class="page-sub">Скользящие 12 месяцев · ${ymShort(horizonStart())} – ${ymShort(addMonths(horizonStart(),state.settings.horizon-1))}</div>`));
  const months=[]; for(let i=0;i<state.settings.horizon;i++)months.push(addMonths(horizonStart(),i));
  const rm=realMonth();
  let cum=liquidAssets();
  const card=h(`<div class="card" style="overflow-x:auto"><h3>Приход, отток и накопления по месяцам</h3><table class="tbl"><thead><tr><th>Месяц</th><th class="right">Приход</th><th class="right">Ушло из кэша</th><th class="right">В накопления</th><th class="right">Δ кэша</th><th class="right">Остаток кэша</th></tr></thead><tbody id="cfBody"></tbody></table></div>`);
  const body=card.querySelector("#cfBody");
  months.forEach(mm=>{
    const inc=projIncome(mm)+(mm>rm?(typeof assetCashYieldForMonth==='function'?assetCashYieldForMonth(mm):0):0);
    const cashOut=projCashOut(mm);
    const toCapital=Math.max(0, projExpense(mm)-projCashOut(mm)); // накопления/инвестиции — остаются кэсом
    const delta=inc-cashOut; cum+=delta;
    body.appendChild(h(`<tr><td>${ymShort(mm)}</td><td class="right num" style="color:var(--green)">${inc?fmt(inc,{bare:true}):'—'}</td><td class="right num">${cashOut?fmt(cashOut,{bare:true}):'—'}</td><td class="right num" style="color:var(--gold)">${toCapital?fmt(toCapital,{bare:true}):'—'}</td><td class="right num" style="color:${delta<0?'var(--red)':'var(--ink)'}">${(inc||cashOut)?fmt(delta,{bare:true,plus:true}):'—'}</td><td class="right num" style="color:${cum<0?'var(--red)':'var(--ink2)'};font-weight:600">${fmt(cum,{bare:true})}</td></tr>`)); });
  v.appendChild(card);
  v.appendChild(h(`<div class="infobox">«Остаток кэша» стартует от текущего кэса ${fmt(liquidAssets())} и совпадает с «Прогнозом денег». <b>Δ кэша = приход − то, что уходит из кэша</b> (потребление, тело долга, десятина). Взносы <b>в накопления</b> кэс не покидают — показаны отдельной колонкой и не уменьшают остаток. Текущий месяц — факт по сегодня + остаток плана; будущие — план, а если плана нет — оценка.</div>`));
}

function estimatedMonthlyExpense(){
  const months=[...new Set(state.txns.map(t=>ym(t.date)))];
  if(!months.length) return Math.round(expectedIncome()*0.85);
  const tot=months.reduce((a,k)=>a+monthExpense(k)+monthCapital(k),0);
  return Math.round(tot/months.length);
}
let histYear=new Date().getFullYear();
let planEdit=false;

    const tag = r.snap? '<span class="dim" style="font-size:9px"> закрыт</span>' : (r.k===rm?'<span style="color:var(--gold);font-size:9px"> текущий</span>':'');

      <td class="right num" style="color:${r.cap?'var(--gold)':'var(--ink3)'}">${r.cap?fmt(r.cap,{bare:true}):'—'}</td>
      <td class="right num" style="font-weight:600">${r.net!=null?fmt(r.net,{bare:true}):'—'}</td></tr>`));
  });
  const lastNet=rows.filter(r=>r.net!=null).pop();
  tb.appendChild(h(`<tr style="border-top:2px solid var(--line2);font-weight:700"><td>Итого ${year}</td><td class="right num" style="color:var(--green)">${fmt(tInc,{bare:true})}</td><td class="right num">${fmt(tExp,{bare:true})}</td><td class="right num" style="color:var(--gold)">${fmt(tCap,{bare:true})}</td><td class="right num">${lastNet?fmt(lastNet.net,{bare:true}):'—'}</td></tr>`));
  v.appendChild(card);
  v.appendChild(h(`<div class="infobox">Доход, расход и «в капитал» — по фактическим операциям месяца. «Чистый капитал» фиксируется при <b>закрытии месяца</b> (снимок); для текущего — по сегодняшнему состоянию. Закрывайте месяц кнопкой на «Сегодня»/«Балансе», чтобы история капитала и подушки накапливалась точками.</div>`));
}

}

const SAVE_CAT="c_save";
function goalSub(g){ return state.subcategories.find(s=>s.goalId===g.id && !s.deleted); }
function syncGoalSubcats(){
  let changed=false;
  (state.goals||[]).forEach(g=>{
    const wantScope=g.ownerId?'personal':'shared';
    let su=state.subcategories.find(s=>s.goalId===g.id);
    if(!su){ su={id:uid(),categoryId:SAVE_CAT,name:g.name,goalId:g.id,scope:wantScope}; if(g.ownerId)su.ownerId=g.ownerId; state.subcategories.push(su); changed=true; }
    else { if(su.deleted){su.deleted=false;changed=true;} if(su.name!==g.name){su.name=g.name;changed=true;} if(su.categoryId!==SAVE_CAT){su.categoryId=SAVE_CAT;changed=true;} if((su.scope||'shared')!==wantScope){su.scope=wantScope;changed=true;} if(su.ownerId!==(g.ownerId||undefined)){ if(g.ownerId)su.ownerId=g.ownerId; else delete su.ownerId; changed=true; } }
  });
  state.subcategories.forEach(s=>{ if(s.goalId && !s.deleted && !(state.goals||[]).some(g=>g.id===s.goalId)){ s.deleted=true; changed=true; } });
  if(changed) save(false);
}
function goalsForView(){ const all=state.goals||[]; if(famView()) return all; const me=activeMember(); return all.filter(g=>me&&g.ownerId===me.id); }
function goalContrib(g){ const su=goalSub(g); if(!su)return 0; const cs=g.cycleStart||"1970-01-01"; return state.txns.filter(t=>t.type==="expense"&&t.subId===su.id&&t.date>=cs).reduce((a,t)=>a+(+t.amount||0),0); }

function goalMonthlyNeeded(g){ if(g.monthlyNeededManual)return +g.monthlyNeeded||0; const left=Math.max(0,(+g.target||0)-goalCurrent(g)); const mLeft=g.targetDate?Math.max(1,monthsDiff(curMonth,ym(g.targetDate))):60; g.monthlyNeeded=Math.ceil(left/mLeft); return g.monthlyNeeded; }

function rolloverSinkingFunds(){

/* Движок: разложить доход по группам с учётом целей */
function suggestPlanFromGoals(){
  const inc=plannedIncome(curMonth);
  const goalsMonthly=(state.goals||[]).reduce((a,g)=>a+goalMonthlyNeeded(g),0);
  const fixed=totalMinPayment(); // обязательные платежи по долгам как минимум
  // рекомендованные доли (после обязательных и целей — на переменные/семью/качество жизни)
  const afterGoals=inc-goalsMonthly;
  const rows=[];
  const alloc={};
  // 1. капитал = взносы по целям, раскидываем на подушку/накопления/инвест/долг
  alloc.g5=goalsMonthly;
  // остаток на потребление
  let rest=Math.max(0,afterGoals);
  // типовые доли потребления
  const split={g1:0.42,g2:0.30,g3:0.16,g4:0.12};
  const consNeed=rest;
  ["g1","g2","g3","g4"].forEach(gid=>alloc[gid]=Math.round(consNeed*split[gid]));
  const feasible=goalsMonthly<=inc*0.9;
  let html=`<h3>План из целей</h3>

function workingCapital(){ return state.assets.filter(a=>(a.class||(a.liquid?'reserve':'personal'))==='working').reduce((s,x)=>s+(+x.value||0),0); }
function reserveCapital(){ return state.assets.filter(a=>(a.class||(a.liquid?'reserve':'personal'))==='reserve').reduce((s,x)=>s+(+x.value||0),0); }
function personalCapital(){ return state.assets.filter(a=>(a.class||(a.liquid?'reserve':'personal'))==='personal').reduce((s,x)=>s+(+x.value||0),0); }
function capitalSourceIds(){ return state.incomeSources.filter(s=>s.kind==='capital').map(s=>s.id); }
function passiveIncomeMonth(k){ const ids=capitalSourceIds(); if(!ids.length)return 0;
  const actual=txnsOfMonth(k).filter(t=>t.type==='income'&&ids.includes(t.categoryId)).reduce((a,t)=>a+ +t.amount,0);
  if(actual>0)return actual;
  return state.incomeSources.filter(s=>s.kind==='capital').reduce((a,s)=>a+incomeSrcPlanned(k,s.id),0);
}
function capitalRatio(k){ const inc=incomeForMonth(k); return inc>0? passiveIncomeMonth(k)/inc : 0; }
function plannedEssentialMonthly(){
  const k=curMonth; let sum=0;
  ["g1","g2","g3"].forEach(gid=>catsOf(gid).forEach(c=>sum+=planCat(k,c.id)));
  return sum;
}
function avgEssentialMonthly(){ const mo={}; state.txns.forEach(t=>{ if(t.type==='expense')mo[t.date.slice(0,7)]=1; }); const keys=Object.keys(mo);
  let actual=0;
  if(keys.length){ let sum=0,n=0; keys.forEach(m=>{ const e=essentialSpend(m); if(e>0){sum+=e;n++;} }); if(n)actual=sum/n; }
  const best=Math.max(actual, plannedEssentialMonthly());
  if(best>0)return best;
  const cur=essentialSpend(curMonth); return cur>0?cur:(fixedSpend(curMonth)||0);
}
function annualEssential(){ return avgEssentialMonthly()*12; }
function withdrawRate(){ const p=(state.settings&&+state.settings.withdrawRatePct)||4; return p/100; }
function fiMultiplier(){ const r=withdrawRate(); return r>0? Math.round(1/r) : 25; }
function fiTarget(){ const r=withdrawRate(); return r>0? annualEssential()/r : annualEssential()*25; }
function fiProgress(){ const t=fiTarget(); return t>0? clamp(workingCapital()/t,0,1):0; }
function coverageByCapital(){ const ess=avgEssentialMonthly(); if(ess<=0)return 0; return (workingCapital()*withdrawRate()/12)/ess; }
function assetCashYieldForMonth(k){
  let sum=0; const mo=+k.slice(5,7);
  state.assets.forEach(a=>{ if((a.class||'')!=='working' || a.yieldType!=='cash') return;
    const annual=(+a.value||0)*(+a.yield||0)/100; const freq=a.payFreq||'monthly';
    if(freq==='monthly') sum+=annual/12;
    else if(freq==='quarterly'){ if(mo%3===0) sum+=annual/4; }
    else if(freq==='yearly'){ if(mo===12) sum+=annual; }
  });
  return Math.round(sum);
}
function assetCapitalizeForMonth(a){ if((a.class||'')!=='working'||a.yieldType!=='capitalize')return 0; return Math.round((+a.value||0)*(+a.yield||0)/100/12); }
function lifestyleInsight(){
  const mo={}; state.txns.forEach(t=>mo[t.date.slice(0,7)]=1);
  const keys=Object.keys(mo).sort(); if(keys.length<2)return null;
  const L=keys[keys.length-1], E=keys[Math.max(0,keys.length-4)]; if(E===L)return null;
  const incL=monthIncome(L), incE=monthIncome(E); if(incL<=0||incE<=0)return null;
  const expL=monthExpense(L), expE=monthExpense(E);
  const incG=incL-incE, expG=expL-expE; if(incG<=0)return null;
  return {incG,expG,savedG:incG-expG,warn:expG>=incG*0.7};
}

function capitalStage(){

const HELP=[
 {icon:"👋",title:"Добро пожаловать в ДомФин",body:`<p>ДомФин — ваш семейный финансовый штаб. В нём два слоя.</p>

 {icon:"🧱",title:"Шаг 1. Заведите основу",body:`<p>Один раз настройте отправные данные:</p>
   <p>• <b>Источники дохода</b> — на «Плане». Для каждого укажите тип: 💪 труд (зарплата) или 📈 капитал (дивиденды, аренда, проценты).</p>

   <p>• <b>Участники</b> — в Настройке → «Семья и участники». Это имена-метки (со значком-«фото»), чтобы отмечать автора операции.</p>`,links:[{label:"План",route:"plan"},{label:"Баланс",route:"balance"}]},
 {icon:"📝",title:"Шаг 2. Ежедневный учёт",body:`<p>Вносите операции сразу — это занимает 5 секунд. Нажмите ➕, выберите «Доход» или «Расход», сумму и категорию.</p>

 {icon:"🎚️",title:"Шаг 3. План месяца",body:`<p>План — это лимиты, которые вы ставите деньгам заранее. Впишите суммы по категориям и подкатегориям, а доход — по каждому источнику. Итог пересчитывается сразу при вводе.</p>

 {icon:"✅",title:"Шаг 4. Факт против плана",body:`<p>Видно, как реальные траты ложатся на план: по каждой группе и подкатегории — план, факт, остаток и полоска (жёлтая — близко к лимиту, красная — перерасход).</p>

 {icon:"🎯",title:"Экран «Сегодня»",body:`<p>Короткий взгляд: карточки <b>«Расход»</b> и <b>«Приход»</b> (план и факт за месяц), остаток кэша на сегодня и плановые платежи к подтверждению.</p>

 {icon:"👨‍👩‍👧",title:"Семья: общий бюджет",body:`<p>ДомФин ведёт один <b>общий</b> семейный бюджет, к которому можно подключить близких.</p>

 {icon:"📊",title:"Финансовое здоровье семьи",body:`<p>Здоровье семьи как единицы: <b>норма сбережений</b> (цель 15–20%), <b>долговая нагрузка</b> (безопасно &lt;30%), <b>подушка</b> в месяцах, свободный поток. У каждого показателя — ⓘ с методикой.</p>

 {icon:"🔮",title:"Поток и прогноз",body:`<p><b>Денежный поток</b> — приход и расход помесячно за год. <b>Прогноз</b> — накопленный остаток на 12 месяцев вперёд с ранним предупреждением о кассовых разрывах.</p>

 {icon:"⚖️",title:"Баланс и чистый капитал",body:`<p>Чистый капитал = активы − долги. Ведите активы и обязательства актуальными.</p>

 {icon:"🔻",title:"Долги: стратегия выхода",body:`<p>Выберите метод: <b>лавина</b> (гасить самый дорогой по ставке — минимум переплаты) или <b>снежный ком</b> (самый маленький — быстрые победы).</p>

 {icon:"🐷",title:"Цели и копилки",body:`<p>Задавайте цели (подушка, первый взнос) и <b>копилки</b> на редкие крупные траты (отпуск, страховки, налоги) — приложение посчитает, сколько откладывать в месяц. Годовые копилки повторяются сами.</p>

 {icon:"🌟",title:"Путь к капиталу",body:`<p>Главный стратегический экран: <b>работающий капитал</b>, пассивный доход, «капитал работает на X%» и прогресс к независимости.</p>

 {icon:"📈",title:"Доходность активов",body:`<p>У работающего актива в «Балансе» задайте <b>доходность % годовых</b> и как приходит доход:</p>
   <p>• <b>В кэш</b> (дивиденды, аренда) — выплаты падают в «Прогноз», факт заводите операцией-доходом от источника «Капитал».</p>

 {icon:"🔒",title:"Закрытие месяца",body:`<p>Раз в месяц на «Сегодня» появится «Закрыть месяц»: обновляете остатки по долгам, <b>остаток на счетах</b> и переоцениваете капитализирующие активы.</p>

 {icon:"🛡",title:"Защита и синхронизация",body:`<p>Вход — по <b>аккаунту</b> (email + пароль). Данные шифруются вашим паролем по принципу «нулевого знания»: на сервере лежит только зашифрованный вид, прочитать его не можем даже мы.</p>

 {icon:"💡",title:"Принципы благосостояния",body:`<p>Коротко о главном — простыми словами:</p>
   <p>• <b>Сначала отложите, потом тратьте.</b> Как только пришёл доход, сразу отправьте 15–20% в накопления, а живите на остальное. Не «что останется — отложу», а наоборот.</p>
   <p>• <b>Тратьте меньше, чем зарабатываете.</b> Это база: расходы за месяц ниже доходов — тогда появляется свободное.</p>
   <p>• <b>Порядок шагов:</b> сначала подушка на 3–6 месяцев → потом гасите дорогие долги → затем регулярно откладываете → и наращиваете работающий капитал (то, что приносит доход).</p>
   <p>• <b>Инвестируйте просто и надолго.</b> Регулярность и время важнее «удачного момента» — сложный процент делает основную работу за годы.</p>
   <p>• <b>Растёт доход — не спешите раздувать траты.</b> Разницу направляйте в капитал. Учите детей на своём примере.</p>
   <p><b>Спокойное поведение важнее сложных расчётов, а «достаточно» — это тоже богатство.</b></p>`,links:[{label:"Путь к капиталу",route:"capital"}]}

function pgHelp(v){
  const cards=HELP; helpIdx=Math.max(0,Math.min(helpIdx,cards.length-1)); const i=helpIdx, c=cards[i];
  v.appendChild(h(`<div><div class="page-title">❓ Помощь</div><div class="page-sub">Пошаговое руководство · карточка ${i+1} из ${cards.length}</div></div>`));
  const card=h(`<div class="card"><div style="font-size:34px;line-height:1">${c.icon}</div><h3 style="margin:8px 0 8px">${esc(c.title)}</h3><div class="helpBody">${c.body}</div>
    ${c.links&&c.links.length?`<div class="row" style="gap:8px;flex-wrap:wrap;margin-top:14px">${c.links.map(l=>`<button class="btn sm primary" data-nav="${l.route}">${esc(l.label)} →</button>`).join("")}</div>`:''}</div>`);
  v.appendChild(card);
  const dots=h(`<div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:14px 0">${cards.map((_,j)=>`<div style="width:${j===i?'20px':'7px'};height:7px;border-radius:4px;background:${j===i?'var(--gold)':'var(--line2)'};cursor:pointer;transition:width .2s" data-dot="${j}"></div>`).join("")}</div>`);
  dots.querySelectorAll("[data-dot]").forEach(d=>d.onclick=()=>{ helpIdx=+d.dataset.dot; render_current(); window.scrollTo(0,0); });
  v.appendChild(dots);
  const navb=h(`<div class="row" style="gap:10px"><button class="btn block" id="hPrev" ${i<=0?'disabled':''} style="flex:1">‹ Назад</button><button class="btn primary block" id="hNext" ${i>=cards.length-1?'disabled':''} style="flex:1">Далее ›</button></div>`);
  navb.querySelector("#hPrev").onclick=()=>{ if(helpIdx>0){helpIdx--;render_current();window.scrollTo(0,0);} };
  navb.querySelector("#hNext").onclick=()=>{ if(helpIdx<cards.length-1){helpIdx++;render_current();window.scrollTo(0,0);} };
  v.appendChild(navb);
  let x0=null; card.addEventListener("touchstart",e=>{x0=e.touches[0].clientX;},{passive:true});
  card.addEventListener("touchend",e=>{ if(x0==null)return; const dx=e.changedTouches[0].clientX-x0; if(dx<-45&&helpIdx<cards.length-1){helpIdx++;render_current();window.scrollTo(0,0);} else if(dx>45&&helpIdx>0){helpIdx--;render_current();window.scrollTo(0,0);} x0=null; },{passive:true});
}

function participantAccountCard(){
  const mid=participantMemberId(); const nm=(mid&&memberById(mid))?memberById(mid).name:null;
  const c=h(`<div class="card"><h3>Аккаунт участника</h3>
    <p class="muted" style="font-size:12.5px;margin-top:-4px">Вы ведёте операции в общем семейном бюджете. Аналитика и бюджет видны только владельцу.</p>
    <div class="okbox" style="margin-bottom:10px">Вход: <b>${esc(ACCT.email||'—')}</b>${nm?' · метка «'+esc(nm)+'»':''}</div>
    <div class="row" style="gap:8px;flex-wrap:wrap">
      <button class="btn" id="pPass">🔑 Сменить пароль</button>
      <button class="btn danger" id="pOut">Выйти</button>
    </div></div>`);
  c.querySelector("#pPass").onclick=openChangePassword;
  c.querySelector("#pOut").onclick=()=>{ if(confirm("Выйти из аккаунта на этом устройстве?")) ACCT.logout(); };
  return c;
}

    c.querySelector("#clSync").onclick=()=>SRV.forcePull();

    <p class="muted" style="font-size:12.5px;margin-top:-4px">Синхронизация между телефоном, планшетом и компьютером через ваш сервер. Строгое шифрование: данные запираются вашим паролем, сервер их прочитать не может.</p>
    <div class="row" style="gap:8px"><button class="btn primary" id="clReg" style="flex:1;padding:12px">Создать аккаунт</button><button class="btn" id="clLogin" style="flex:1;padding:12px">Войти</button></div></div>`);
  c.querySelector("#clReg").onclick=()=>showAuthGate('register');
