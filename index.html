/* ---------- защита входа: заглушка + опциональная блокировка + Face ID ---------- */
function bufToB64(buf){ return btoa(String.fromCharCode.apply(null,new Uint8Array(buf))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function b64ToBuf(b){ b=b.replace(/-/g,"+").replace(/_/g,"/"); const s=atob(b); const a=new Uint8Array(s.length); for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i); return a.buffer; }
async function faceIdAvailable(){ try{ return !!window.PublicKeyCredential && await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); }catch(e){ return false; } }
async function faceIdRegister(){
  const cred=await navigator.credentials.create({publicKey:{
    challenge:crypto.getRandomValues(new Uint8Array(32)),
    rp:{name:"Заметки",id:location.hostname},
    user:{id:crypto.getRandomValues(new Uint8Array(16)),name:"u",displayName:"u"},
    pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],
    authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",residentKey:"preferred"},
    timeout:60000,attestation:"none"}});
  localStorage.setItem(LS_FACEID,bufToB64(cred.rawId)); return true;
}
async function faceIdUnlock(){
  const id=localStorage.getItem(LS_FACEID); if(!id) throw new Error("no cred");
  await navigator.credentials.get({publicKey:{
    challenge:crypto.getRandomValues(new Uint8Array(32)),
    allowCredentials:[{type:"public-key",id:b64ToBuf(id)}],
    userVerification:"required",timeout:60000,rpId:location.hostname}});
  return true;
}
let booted=false;
function bootApp(){
  if(booted)return; booted=true;
  document.getElementById("gate").classList.remove("show");
  document.getElementById("app").style.visibility="visible";
  renderNav(); renderMe(); render_current();
  if(DBX.linked){ setSync("ok"); setTimeout(()=>DBX.syncNow(false),400); }
  setupAutoSync();
}
let autoSyncSet=false;
function setupAutoSync(){
  if(autoSyncSet)return; autoSyncSet=true;
  document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible"&&DBX.linked)DBX.syncNow(false); });
  window.addEventListener("focus",()=>{ if(DBX.linked)DBX.syncNow(false); });
  setInterval(()=>{ if(DBX.linked&&document.visibilityState!=="hidden")DBX.syncNow(false); },20000);
}
function showGate(mode){
  const g=document.getElementById("gate"), box=document.getElementById("gbox");
  g.classList.add("show");
  box.innerHTML=
    '<div style="font-size:15px;color:var(--ink2);text-align:center;font-weight:600">Введите код</div>'+
    '<input id="gcode" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="go" name="famfin_code" data-1p-ignore="true" data-lpignore="true" data-form-type="other" placeholder="код">'+
    '<div id="gmsg" class="gmsg"></div>'+
    '<button class="gbtn2" id="gok" type="button">Войти</button>'+
    (mode==="lock"?'<button class="gface" id="gface" style="display:none;margin-top:6px">Face ID</button>':'')+
    '<div class="gver">'+APP_VERSION+'</div>';
  const inp=box.querySelector("#gcode"), ok=box.querySelector("#gok"), msg=box.querySelector("#gmsg");
  inp.addEventListener("input",()=>{ msg.textContent=""; });
  function fail(){ msg.textContent="Неверный код"; g.classList.add("shake"); setTimeout(()=>g.classList.remove("shake"),400); inp.focus(); try{inp.select();}catch(e){} }
  function submit(){
    const raw=inp.value||""; const v=normCode(raw); const digits=raw.replace(/\D/g,"");
    const cand=[v, v.toLowerCase(), digits].filter(Boolean);
    if(mode==="gate"){ if(cand.some(x=>simpleHash(x)===GATE_HASH)){ try{localStorage.setItem(LS_GATE,"1");}catch(e){} afterGate(); } else fail(); }
    else { const t=state.lock&&state.lock.codeHash; if(t && cand.some(x=>simpleHash(x)===t)) bootApp(); else fail(); }
  }
  ok.onclick=submit; inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();submit();} });
  if(mode==="lock" && localStorage.getItem(LS_FACEID)){
    faceIdAvailable().then(av=>{ if(!av)return; const fb=box.querySelector("#gface"); if(!fb)return; fb.style.display="";
      fb.onclick=async()=>{ try{ await faceIdUnlock(); bootApp(); }catch(e){ fail(); } };
      faceIdUnlock().then(()=>bootApp()).catch(()=>{}); });
  }
  setTimeout(()=>inp.focus(),150);
}
function afterGate(){ if(state.lock&&state.lock.enabled) showGate("lock"); else bootApp(); }
function securityBoot(){
  let g="1"; try{g=localStorage.getItem(LS_GATE);}catch(e){}
  if(g==="1"){ afterGate(); return; }
  // Устройство уже доверенное: если Dropbox привязан, заглушку не спрашиваем
  if(DBX.linked){ try{localStorage.setItem(LS_GATE,"1");}catch(e){} afterGate(); return; }
  showGate("gate");
}

else { securityBoot(); }
